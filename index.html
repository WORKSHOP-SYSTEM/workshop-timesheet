<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>车间工时填报系统 V4.4.2</title>
<style>
:root{
  --primary:#1f4e79;--primary2:#2f75b5;--bg:#eef2f6;--card:#fff;--line:#cfd8e3;--head:#e8edf3;--sub:#f5f7fa;--danger:#d9534f;--ok:#198754;--warn:#f0ad4e;--text:#1f2937;--blue:#0078d4;
}
*{box-sizing:border-box;font-weight:normal}body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:14px}.header{background:linear-gradient(90deg,var(--primary),var(--primary2));color:#fff;text-align:center;padding:13px 10px;font-size:18px;letter-spacing:1px;position:sticky;top:0;z-index:20}.role-switch{display:flex;gap:8px;justify-content:center;padding:10px;background:#f8fafc;position:sticky;top:48px;z-index:19;border-bottom:1px solid var(--line)}button,select,input{font-family:inherit;font-size:14px}button{padding:7px 12px;border:none;border-radius:7px;background:#e7edf5;color:#123;cursor:pointer;min-height:34px}button.primary{background:var(--primary2);color:#fff}button.ok{background:var(--ok);color:#fff}button.danger{background:var(--danger);color:#fff}.card{background:var(--card);margin:10px;border-radius:10px;padding:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}.info{display:flex;gap:12px;flex-wrap:wrap;align-items:center;line-height:1.8}.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.bar select,.bar input{height:34px;border:1px solid var(--line);border-radius:7px;padding:0 8px;background:#fff}.table-wrap{overflow:auto;max-height:calc(100vh - 210px);padding:0;position:relative}table{border-collapse:separate;border-spacing:0;width:max-content;min-width:1680px;background:#fff;font-size:13px}th,td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:5px 5px;text-align:center;white-space:nowrap;height:34px}th:first-child,td:first-child{border-left:1px solid var(--line)}thead tr:first-child th{border-top:1px solid var(--line)}th{background:var(--head);position:sticky;top:0;z-index:5;color:#213547}thead tr:nth-child(2) th{top:34px;background:var(--sub);z-index:5}tfoot td{background:#f7f7f7;position:sticky;bottom:0;z-index:4;color:#111}.sum-row td{background:#f8fafc}.editing td{background:#fffdf0}.cell-input{width:58px;height:28px;border:1px solid #b8c4d2;border-radius:5px;text-align:center;padding:0 3px}.text-input{width:90px}.remark-input{width:140px}.action-btn{padding:5px 8px;min-height:28px;border-radius:6px;font-size:12px}.badge{display:inline-block;padding:2px 7px;border-radius:99px;background:#e8f3ff;color:#1f4e79;font-size:12px}.notice{color:#607080;font-size:13px;line-height:1.6}.total-ok{color:var(--ok)}.total-warn{color:#b36b00}.empty{padding:25px;text-align:center;color:#6b7280}

/* V4.2 手机工时直接输入优化 */
.time-cell{width:56px;height:30px;border:1px solid #b8c4d2;border-radius:6px;text-align:center;font-size:14px;background:#fff;}
.time-cell:focus{outline:2px solid #1e90ff;background:#eef8ff;}
@media(max-width:768px){.time-cell{width:54px;height:34px;font-size:15px;}.action-btn{min-width:46px;height:32px;}}



/* V4.3.1 周卡片 + 自动保存状态 */
.week-section{background:#fff;margin:8px 10px;border-radius:10px;padding:8px 10px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.week-title{font-weight:bold;color:#1f4e79;border-left:4px solid #2f75b5;padding-left:7px;margin-bottom:7px;line-height:1.2;}
.week-card-row{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:6px;}
.week-card{height:30px;border-radius:7px;border:1px solid #b7d4f1;background:#e8f3ff;color:#1f4e79;display:flex;align-items:center;justify-content:center;font-weight:bold;cursor:pointer;box-shadow:none;min-height:30px;padding:0 8px;}
.week-card.current{background:#0b86df;color:#fff;border-color:#0b86df;box-shadow:0 6px 14px rgba(11,134,223,.25);}
.week-card.locked{background:#ffe1e1;color:#9a1b1b;border-color:#ffc6c6;}
.week-card.current.locked{background:#c2410c;color:#fff;border-color:#c2410c;box-shadow:0 6px 14px rgba(194,65,12,.25);}
.autosave-badge{display:inline-flex;align-items:center;gap:5px;height:28px;padding:0 10px;border-radius:999px;background:#eafaf0;color:#15803d;font-size:13px;font-weight:bold;}
.autosave-badge.saving{background:#fff7ed;color:#c2410c;}
.autosave-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;}
.autosave-badge.saving .autosave-dot{background:#f97316;}
@media(max-width:768px){.week-section{margin:7px;padding:7px}.week-card-row{grid-template-columns:repeat(4,minmax(72px,1fr));gap:5px}.week-card{height:32px;font-size:13px;padding:0 4px}.week-title{font-size:13px}.autosave-badge{font-size:12px;height:26px;padding:0 8px}}

/* V4.3.1 周选择与输入限制 */
.week-btn{height:28px;min-height:28px;padding:3px 9px;border-radius:7px;background:#eef4fb;color:#1f4e79;border:1px solid #cddbeb;}
.week-btn.active{background:#1e90ff;color:#fff;border-color:#1e90ff;font-weight:bold;}

.remain-hint{display:none!important;}
.time-cell.locked-limit{background:#fff7cc!important;}

/* V4.2.2 每日工时逻辑提醒 */
.time-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:58px;}
.remain-hint{font-size:10px;line-height:1;color:#64748b;}
.remain-hint.over{color:#dc2626;font-weight:bold;}
.day-ok{background:#ffffff!important;}
.day-zero{background:#ffe4e6!important;}
.day-warn{background:#fff7cc!important;}
.day-over{background:#ffd6d6!important;color:#991b1b;font-weight:bold;}
tfoot .day-ok{background:#f8fafc!important;}
tfoot .day-zero{background:#ffe4e6!important;}
tfoot .day-warn{background:#fff7cc!important;}
tfoot .day-over{background:#ffd6d6!important;color:#991b1b;font-weight:bold;}
@media(max-width:768px){.time-wrap{min-width:56px}.remain-hint{font-size:10px}.time-cell{height:36px;}}

/* 新增弹窗：按用户截图样式 */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.46);display:none;z-index:1000;align-items:center;justify-content:center;padding:8px}.modal-panel{width:min(880px,96vw);max-height:92vh;background:#fff;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.25);overflow:hidden;display:flex;flex-direction:column}.modal-head{height:58px;background:#eaf1f8;display:flex;align-items:center;justify-content:space-between;padding:0 14px;font-weight:700}.modal-close{background:#eef0f3;color:#111;border-radius:10px;min-width:48px}.modal-body{padding:12px;overflow:auto}.modal-summary{border:1px solid #aee0ff;background:#eefaff;color:#005a8d;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-weight:700}.section-title{border-left:4px solid var(--blue);padding-left:8px;margin:10px 0 8px;color:#0b4778;font-weight:700}.choice-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.choice-btn{border:1px solid #d8e2ec;background:#f7fbff;color:#0b5286;border-radius:8px;padding:9px 8px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06);min-height:38px}.choice-btn.active{background:#d9f7e4;border:2px solid #16a34a;color:#137333;padding:8px 7px}.unit-tools{display:flex;gap:8px;align-items:center;margin:5px 0 8px}.small-pill{background:#eaf6ff;color:#0b5286;border-radius:8px;padding:6px 12px;min-height:30px}.unit-columns{display:grid;grid-template-columns:1fr 1fr;gap:10px}.unit-panel{border:1px solid #d6e2ee;border-radius:12px;overflow:hidden;background:#fff;min-height:220px}.unit-panel-title{padding:9px;text-align:center;background:#e8f5ff;color:#005a8d;font-weight:700;border-bottom:1px solid #d6e2ee}.unit-panel.container .unit-panel-title{background:#fff3df;color:#b45f00}.unit-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding:8px}.unit-empty{padding:25px;text-align:center;color:#8aa0b8}.remark-line{display:flex;gap:8px}.remark-line input{flex:1;border:1px solid #c7d7e7;border-radius:9px;padding:0 10px;height:38px;font-weight:700}.apply-btn{background:#0078d4;color:#fff;border-radius:9px;min-width:72px}.modal-foot{display:flex;gap:10px;padding:10px 12px;background:#fff;border-top:1px solid #eef2f6}.modal-foot button{flex:1;height:42px}.generate-btn{background:#16a34a;color:#fff;font-weight:700}.cancel-btn{background:#f3f4f6;color:#111}.split-box{border:1px solid #d6e2ee;border-radius:12px;padding:10px;background:#fbfdff}.split-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.split-row select,.split-row input{height:36px;border:1px solid #d6e2ee;border-radius:8px;padding:0 10px;background:#fff}.muted{font-size:12px;color:#607080;margin-top:6px}
@media(max-width:768px){body{font-size:13px}.header{font-size:16px;padding:11px 8px}.role-switch{top:42px;padding:8px}.card{margin:7px;border-radius:8px;padding:8px}button{padding:7px 9px;font-size:13px;min-height:33px}.bar{gap:6px}table{font-size:12px;min-width:1540px}th,td{padding:4px 4px;height:32px}thead tr:nth-child(2) th{top:32px}.cell-input{width:50px;height:27px;font-size:12px}.text-input{width:78px}.remark-input{width:115px}.table-wrap{max-height:calc(100vh - 205px)}.modal-mask{align-items:flex-start;padding:44px 10px 8px}.modal-panel{width:100%;max-height:90vh;border-radius:14px}.modal-head{height:52px}.choice-grid{grid-template-columns:repeat(3,1fr);gap:7px}.choice-btn{font-size:14px;padding:9px 4px}.unit-columns{grid-template-columns:1fr 1fr;gap:8px}.unit-grid{grid-template-columns:repeat(2,1fr);gap:6px;padding:6px}.unit-panel{min-height:285px}.modal-foot{position:sticky;bottom:0}.remark-line input{height:40px}.section-title{margin-top:10px}}

/* ===== V4.4 手机密集优化（核心） ===== */
.table-wrap{overflow-x:auto;}

/* 左侧4列冻结 */
td:nth-child(1),th:nth-child(1){position:sticky;left:0;background:#fff;z-index:3}
td:nth-child(2),th:nth-child(2){position:sticky;left:70px;background:#fff;z-index:3}
td:nth-child(3),th:nth-child(3){position:sticky;left:140px;background:#fff;z-index:3}
td:nth-child(4),th:nth-child(4){position:sticky;left:200px;background:#fff;z-index:3}

/* 前4列压缩 */
td:nth-child(1),th:nth-child(1){width:70px}
td:nth-child(2),th:nth-child(2){width:70px}
td:nth-child(3),th:nth-child(3){width:60px}
td:nth-child(4),th:nth-child(4){width:80px}

/* 工时压缩 */
.time-cell{width:42px;height:28px;font-size:13px;padding:0}

/* 表格紧凑 */
table td,table th{padding:2px}

/* 手机再压缩 */
@media(max-width:768px){
  .time-cell{width:36px;height:26px;font-size:12px}
  table td,table th{padding:1px}
}



/* ===== V4.4.2 桌面宽度 + 手机冻结列加强 ===== */
@media (min-width: 1024px){
  .header,
  .role-switch,
  #empView,
  #adminView{
    max-width:1440px;
    margin-left:auto;
    margin-right:auto;
  }
  .header{border-radius:0 0 0 0;}
}

/* 表格整体宽度收敛：桌面不无限拉宽，手机仍可横滑 */
table{
  min-width:1280px !important;
  table-layout:fixed;
}

/* 前置信息四列统一宽度：类别/项目/单元/备注 */
table th:nth-child(1), table td:nth-child(1){
  width:64px!important;min-width:64px!important;max-width:64px!important;
}
table th:nth-child(2), table td:nth-child(2){
  width:66px!important;min-width:66px!important;max-width:66px!important;
}
table th:nth-child(3), table td:nth-child(3){
  width:58px!important;min-width:58px!important;max-width:58px!important;
}
table th:nth-child(4), table td:nth-child(4){
  width:72px!important;min-width:72px!important;max-width:72px!important;
}

/* 冻结左侧四列：包含表头、内容、底部汇总 */
table th:nth-child(1), table td:nth-child(1){
  position:sticky!important;left:0!important;z-index:20;background:#fff;
}
table th:nth-child(2), table td:nth-child(2){
  position:sticky!important;left:64px!important;z-index:20;background:#fff;
}
table th:nth-child(3), table td:nth-child(3){
  position:sticky!important;left:130px!important;z-index:20;background:#fff;
}
table th:nth-child(4), table td:nth-child(4){
  position:sticky!important;left:188px!important;z-index:20;background:#fff;
  box-shadow:3px 0 4px rgba(0,0,0,.06);
}

/* 冻结列的表头要压住普通表头 */
table thead th:nth-child(1),
table thead th:nth-child(2),
table thead th:nth-child(3),
table thead th:nth-child(4){
  z-index:35!important;
  background:#e8edf3!important;
}

/* 冻结列的底部汇总要压住普通汇总 */
table tfoot td:nth-child(1),
table tfoot td:nth-child(2),
table tfoot td:nth-child(3),
table tfoot td:nth-child(4){
  z-index:34!important;
  background:#f8fafc!important;
}

/* 周一到周日工时列进一步压缩 */
table td:nth-child(n+5), table th:nth-child(n+5){
  min-width:48px;
}
.time-cell{
  width:38px!important;
  height:26px!important;
  font-size:12px!important;
  padding:0!important;
}
.time-wrap{min-width:38px!important;}

/* 表头和底部汇总保持冻结，不被横滑破坏 */
thead th{
  position:sticky!important;
  top:0!important;
  z-index:15;
}
thead tr:nth-child(2) th{
  top:30px!important;
  z-index:14;
}
tfoot td{
  position:sticky!important;
  bottom:0!important;
  z-index:13;
}

/* 手机端继续压缩，同时保证固定列更稳定 */
@media(max-width:768px){
  table{min-width:1080px!important;font-size:11px!important;}
  .table-wrap{max-height:calc(100vh - 245px);}
  table th,table td{height:30px!important;padding:1px!important;}
  table th:nth-child(1), table td:nth-child(1){width:60px!important;min-width:60px!important;max-width:60px!important;left:0!important;}
  table th:nth-child(2), table td:nth-child(2){width:62px!important;min-width:62px!important;max-width:62px!important;left:60px!important;}
  table th:nth-child(3), table td:nth-child(3){width:54px!important;min-width:54px!important;max-width:54px!important;left:122px!important;}
  table th:nth-child(4), table td:nth-child(4){width:66px!important;min-width:66px!important;max-width:66px!important;left:176px!important;}
  table td:nth-child(n+5), table th:nth-child(n+5){min-width:42px!important;}
  .time-cell{width:34px!important;height:24px!important;font-size:12px!important;}
  .time-wrap{min-width:34px!important;}
  thead tr:nth-child(2) th{top:30px!important;}
}


/* V4.4.2 滑动最终稳定修复 */
thead th{z-index:60 !important;}
td:nth-child(-n+4),th:nth-child(-n+4){z-index:50 !important;}
tfoot td{z-index:40 !important;}
tfoot td:nth-child(-n+4){z-index:55 !important;}

/* 极限压缩 */
td:nth-child(1){width:58px !important}
td:nth-child(2){width:60px !important}
td:nth-child(3){width:50px !important}
td:nth-child(4){width:62px !important}
.time-cell{width:32px !important;height:24px !important;font-size:11px !important}

</style>
</head>
<body>
<div class="header">车间工时填报系统 V4.4.2</div>
<div class="role-switch"><button class="primary" onclick="showEmp()">员工界面</button><button onclick="showAdmin()">管理员界面</button></div>
<div id="empView">
  <div class="card info"><span>员工：<b id="empName">测试</b></span><span>工号：<b id="empNo">000001</b></span><span class="badge">已验证</span></div>
  <div class="week-section"><div class="week-title">Week</div><div class="week-card-row" id="weekCardRow"></div></div>
  <div class="card bar"><button class="ok" onclick="openAddModal()">新增一行</button><span class="autosave-badge" id="autosaveBadge"><span class="autosave-dot"></span><span class="autosaveText">已自动保存</span></span><span class="notice">V4.4.2：桌面宽度优化｜手机固定列加强｜表头/汇总冻结｜压缩布局</span></div>
  <div class="card table-wrap"><table id="empTable"></table></div>
</div>
<div id="adminView" style="display:none;">
  <div class="card info"><span>管理员：Manager</span><span class="badge">本地数据后台</span></div>
  <div class="week-section"><div class="week-title">Week</div><div class="week-card-row" id="adminWeekCardRow"></div></div>
  <div class="card bar"><button onclick="lockWeek()">锁定</button><button onclick="unlockWeek()">解锁</button><button onclick="exportCSV()">导出CSV</button><span class="autosave-badge"><span class="autosave-dot"></span><span class="autosaveText">已自动保存</span></span><select id="typeFilter" onchange="renderAdmin()"><option value="all">全部工时类别</option></select><input id="projectFilter" placeholder="项目筛选" oninput="renderAdmin()"><input id="unitFilter" placeholder="单元筛选" oninput="renderAdmin()"><button onclick="clearFilter()">清除筛选</button></div>
  <div class="card table-wrap"><table id="adminTable"></table></div>
</div>
<!-- 新增弹窗 -->
<div class="modal-mask" id="addModal">
  <div class="modal-panel">
    <div class="modal-head"><div>新增单条或多条工时</div><button class="modal-close" onclick="closeAddModal()">关闭</button></div>
    <div class="modal-body">
      <div class="modal-summary" id="modalSummary">工时类别：- ｜ 项目：- ｜ 单元：0个 ｜ 备注：-</div>
      <div class="section-title">1. 工时类别（单选）</div><div class="choice-grid" id="modalTypeBox"></div>
      <div class="section-title">2. 项目号（单选）</div><div class="choice-grid" id="modalProjectBox"></div>
      <div class="section-title">3. 单元号（多选）</div><div class="unit-tools"><button class="small-pill" onclick="selectAllUnits()">全选</button><button class="small-pill" onclick="clearUnits()">清空</button><span id="selectedCount">已选 0 个</span></div>
      <div class="unit-columns"><div class="unit-panel"><div class="unit-panel-title">单元类（可多选）</div><div class="unit-grid" id="unitNormalBox"></div></div><div class="unit-panel container"><div class="unit-panel-title">容器类（可多选）</div><div class="unit-grid" id="unitContainerBox"></div></div></div>
      <div class="section-title">4. 备注（单选/自定义）</div><div class="remark-line"><input id="customRemark" placeholder="可选择备注，也可输入自定义备注"><button class="apply-btn" onclick="applyCustomRemark()">应用</button></div><div class="choice-grid" id="modalRemarkBox" style="margin-top:8px"></div>
      <div class="section-title">5. 可选：平均总工时</div><div class="split-box"><div class="split-row"><label><input type="checkbox" id="splitEnabled"> 平分工时？</label><select id="splitType"><option value="normal">正常工时</option><option value="weekdayOT">工作日加班</option><option value="weekendOT">周末加班</option></select><select id="splitDay"><option value="mon">周一</option><option value="tue">周二</option><option value="wed">周三</option><option value="thu">周四</option><option value="fri">周五</option><option value="sat">周六</option><option value="sun">周日</option></select><input id="splitTotal" type="number" step="0.5" min="0" placeholder="总工时≤8"></div><div class="muted">可选：选择工时类型、日期和总工时后，系统按剩余上限自动分摊。</div></div>
    </div>
    <div class="modal-foot"><button class="cancel-btn" onclick="closeAddModal()">取消</button><button class="generate-btn" id="generateBtn" onclick="generateRowsFromModal()">确定生成 1 条</button></div>
  </div>
</div>
<script>
const STORAGE_PREFIX="workHours_V4_3_2";const LOCK_PREFIX="workHours_V4_3_2_locked";let records=[];let currentWeekOffset=0;
function getISOWeek(d){const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dayNum=date.getUTCDay()||7;date.setUTCDate(date.getUTCDate()+4-dayNum);const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));return Math.ceil((((date-yearStart)/86400000)+1)/7)}
function getWeekNo(offset=0){const d=new Date();d.setDate(d.getDate()+offset*7);return "W"+String(getISOWeek(d)).padStart(2,"0")}
function storageKey(){return STORAGE_PREFIX+"_"+getWeekNo(currentWeekOffset)}
function lockKey(){return LOCK_PREFIX+"_"+getWeekNo(currentWeekOffset)}
const workTypes=["机械组装","保温作业","电气安装","额外工时","其它作业","请假","仓库作业"];
const remarkMap={"仓库作业":["点料入库","发料退料","装箱发货","仓库帮忙"],"机械组装":["下料组装","焊接","压力测试","配件打磨","气管安装"],"保温作业":["管道补漆","保温下料","保温安装","保温发泡","保温清理"],"电气安装":["桥架安装","布线","端子接线"],"额外工时":["设计问题","特殊支架","供应商问题","FAT帮忙","内部问题"],"其它作业":["整理5S等","培训","早会","精益改善","其它","车间管理"],"请假":["年假","病假","事假","出差"]};
const projectUnits={"P0351706":["U503","U451","U381","U361","U344","U343","U335","U123-1","U115-1","U114-1","U112-3","U112-1","U110-1","U104","U103"],"P0384374":["U641D","U641C","U641B","U641A","U451","U387","U381","U373","U371","U368-3","U368-1","U368","U361","U343","U335","U201A","U126-1","U126","U120","NIN-52981"],"P0373305":["U641","U611-D","U611-C","U611-B","U611-A","U611","U503","U387","U381","U368-3","U368-1","U368","U361","U342","U335","U142","U123-1","U123","U121"],"P88359":["U451","U381","U371","U361","U341","U335","U201-2","NIN-53054"],"P0382530":["U501","U401","U381","U361","U344","U335","U201B","U201A","U125","U114-1","NIN-53076","NIN-53073","NIN-53072","NIN-53071","NIN-53070","NIN-53069","NIN-53068","NIN-53067","NIN-53066","NIN-53065","NIN-53064","NIN-53061","NIN-53060","NIN-53053"],"P0407596":["U641C-1","U641C","U641B-1","U641B","U641A-1","U641A","U503","U451","U387","U382","U381","U373","U371","U368-3","U368-1","U368","U361","U343","U335","U123-1","U123","NIN-53063","NIN-53062"],"销售订单":["NIN-53111","NIN-53086","NIN-53085","NIN-53084","NIN-53083","NIN-53082"]};
let modalState={type:"",project:"",units:[],remark:""};
function defaultRecord(){return {employee:"测试",empNo:"000001",week:"W27",type:"机械组装",project:"",unit:"",remark:"",monN:0,monO:0,tueN:0,tueO:0,wedN:0,wedO:0,thuN:0,thuO:0,friN:0,friO:0,satO:0,sunO:0}}
function loadData(){try{const raw=localStorage.getItem(storageKey());records=raw?JSON.parse(raw):[];if(!Array.isArray(records))records=[]}catch(e){records=[]}}
function setAutoSaveStatus(text,cls=""){
  document.querySelectorAll(".autosave-badge").forEach(b=>b.classList.toggle("saving",cls==="saving"));
  document.querySelectorAll(".autosaveText").forEach(el=>el.innerText=text);
}
function saveData(){
  setAutoSaveStatus("保存中...","saving");
  localStorage.setItem(storageKey(),JSON.stringify(records));
  const now=new Date();
  const hh=String(now.getHours()).padStart(2,"0"),mm=String(now.getMinutes()).padStart(2,"0"),ss=String(now.getSeconds()).padStart(2,"0");
  setAutoSaveStatus(`已自动保存 ${hh}:${mm}:${ss}`);
}function isLocked(){return localStorage.getItem(lockKey())==="1"}function num(v){let n=parseFloat(v);return isNaN(n)?0:n}function normalTotal(r){return num(r.monN)+num(r.tueN)+num(r.wedN)+num(r.thuN)+num(r.friN)}function weekdayOT(r){return num(r.monO)+num(r.tueO)+num(r.wedO)+num(r.thuO)+num(r.friO)}function weekendOT(r){return num(r.satO)+num(r.sunO)}function toast(msg){alert(msg)}
function tableHead(extra=false){return `<thead><tr>${extra?"<th rowspan='2'>员工</th><th rowspan='2'>工号</th><th rowspan='2'>周数</th>":""}<th rowspan="2">工时类别</th><th rowspan="2">项目号</th><th rowspan="2">单元号</th><th rowspan="2">备注</th><th colspan="2">周一</th><th colspan="2">周二</th><th colspan="2">周三</th><th colspan="2">周四</th><th colspan="2">周五</th><th rowspan="2">周六<br>加班</th><th rowspan="2">周日<br>加班</th><th colspan="3">汇总</th>${extra?"":"<th rowspan='2'>编辑</th><th rowspan='2'>删除</th>"}</tr><tr class="sub"><th>正常</th><th>加班</th><th>正常</th><th>加班</th><th>正常</th><th>加班</th><th>正常</th><th>加班</th><th>正常</th><th>加班</th><th>正常</th><th>工作日加班</th><th>周末加班</th></tr></thead>`}
const DAY_FIELDS={
  monN:{day:"mon",type:"N",limit:8},monO:{day:"mon",type:"O",limit:4},
  tueN:{day:"tue",type:"N",limit:8},tueO:{day:"tue",type:"O",limit:4},
  wedN:{day:"wed",type:"N",limit:8},wedO:{day:"wed",type:"O",limit:4},
  thuN:{day:"thu",type:"N",limit:8},thuO:{day:"thu",type:"O",limit:4},
  friN:{day:"fri",type:"N",limit:8},friO:{day:"fri",type:"O",limit:4}
};
function sumField(field,list=records){return list.reduce((a,r)=>a+num(r[field]),0)}
function normalDayClass(v){
  v=num(v);
  if(v===8) return "day-ok";
  if(v===0) return "day-zero";
  if(v>0 && v<8) return "day-warn";
  if(v>8) return "day-over";
  return "day-ok";
}
function weekdayOTClass(v){
  v=num(v);
  if(v===0 || v===4) return "day-ok";
  if(v>0 && v<4) return "day-warn";
  if(v>4) return "day-over";
  return "day-ok";
}
function totalNormalClass(v){
  v=num(v);
  if(v===40) return "day-ok";
  if(v===0) return "day-zero";
  if(v>0 && v<40) return "day-warn";
  if(v>40) return "day-over";
  return "day-ok";
}
function totalWeekdayOTClass(s){
  const fields=["monO","tueO","wedO","thuO","friO"];
  if(fields.some(f=>sumField(f)>4)) return "day-over";
  if(fields.some(f=>{const v=sumField(f);return v>0 && v<4})) return "day-warn";
  return "day-ok";
}
function timeCellClass(key){
  const d=DAY_FIELDS[key];
  if(!d) return "";
  const total=sumField(key);
  if(isFutureWorkdayKey(key) && total===0) return "day-ok";
  return d.type==="N"?normalDayClass(total):weekdayOTClass(total);
}
function remainingInfo(key){
  const d=DAY_FIELDS[key];
  if(!d) return "";
  const remain = Math.round((d.limit - sumField(key))*100)/100;
  if(remain>=0) return `<div class="remain-hint">余${remain}</div>`;
  return `<div class="remain-hint over">超${Math.abs(remain)}</div>`;
}
function timeInputCell(idx,key,val,admin=false){
  if(admin) return `<td class="${timeCellClass(key)}">${num(val)}</td>`;
  return `<td class="${timeCellClass(key)}"><div class="time-wrap"><input class="time-cell" type="number" inputmode="decimal" step="0.5" min="0" value="${num(val)}" onchange="updateCell(${idx},'${key}',this.value)" onfocus="this.select()"></div></td>`;
}
function updateCell(idx,field,value){
  if(isLocked()) return toast("本周已锁定，不能修改工时");
  let v=num(value);
  const d=DAY_FIELDS[field];
  if(d){
    const used=records.reduce((a,r,i)=>i===idx?a:a+num(r[field]),0);
    const remain=Math.max(0,Math.round((d.limit-used)*100)/100);
    if(v>remain) v=remain;
  }
  records[idx][field]=v;
  saveData();
  renderEmp();
}
function rowCells(r,idx,admin=false){
  const totalN=normalTotal(r),totalW=weekdayOT(r),totalEnd=weekendOT(r);
  return `${admin?`<td>${r.employee||""}</td><td>${r.empNo||""}</td><td>${r.week||""}</td>`:""}<td>${r.type||""}</td><td>${r.project||""}</td><td>${r.unit||""}</td><td>${r.remark||""}</td>${timeInputCell(idx,"monN",r.monN,admin)}${timeInputCell(idx,"monO",r.monO,admin)}${timeInputCell(idx,"tueN",r.tueN,admin)}${timeInputCell(idx,"tueO",r.tueO,admin)}${timeInputCell(idx,"wedN",r.wedN,admin)}${timeInputCell(idx,"wedO",r.wedO,admin)}${timeInputCell(idx,"thuN",r.thuN,admin)}${timeInputCell(idx,"thuO",r.thuO,admin)}${timeInputCell(idx,"friN",r.friN,admin)}${timeInputCell(idx,"friO",r.friO,admin)}${timeInputCell(idx,"satO",r.satO,admin)}${timeInputCell(idx,"sunO",r.sunO,admin)}<td class="${totalN===40?'total-ok':'total-warn'}">${totalN}</td><td>${totalW}</td><td>${totalEnd}</td>${admin?"":`<td><button class="action-btn" onclick="editRow(${idx})">编辑</button></td><td><button class="action-btn danger" onclick="delRow(${idx})">删除</button></td>`}`;
}
function renderEmp(){const table=document.getElementById("empTable");let body="<tbody>";if(records.length===0)body+=`<tr><td colspan="22" class="empty">暂无数据，请点击“新增一行”</td></tr>`;records.forEach((r,i)=>body+=`<tr>${rowCells(r,i,false)}</tr>`);body+="</tbody>";table.innerHTML=tableHead(false)+body+sumFoot(false)}
function renderAdmin(){const type=document.getElementById("typeFilter")?.value||"all",project=(document.getElementById("projectFilter")?.value||"").trim().toLowerCase(),unit=(document.getElementById("unitFilter")?.value||"").trim().toLowerCase();let list=records.filter(r=>(type==="all"||String(r.type)===type)&&(!project||String(r.project||"").toLowerCase().includes(project))&&(!unit||String(r.unit||"").toLowerCase().includes(unit)));const table=document.getElementById("adminTable");let body="<tbody>";if(list.length===0)body+=`<tr><td colspan="24" class="empty">没有符合条件的数据</td></tr>`;list.forEach((r,i)=>body+=`<tr>${rowCells(r,i,true)}</tr>`);body+="</tbody>";table.innerHTML=tableHead(true)+body+sumFoot(true,list)}
function sumFoot(admin=false,list=records){
  const s={monN:0,monO:0,tueN:0,tueO:0,wedN:0,wedO:0,thuN:0,thuO:0,friN:0,friO:0,satO:0,sunO:0,n:0,w:0,e:0};
  list.forEach(r=>{["monN","monO","tueN","tueO","wedN","wedO","thuN","thuO","friN","friO","satO","sunO"].forEach(k=>s[k]+=num(r[k]));s.n+=normalTotal(r);s.w+=weekdayOT(r);s.e+=weekendOT(r)});
  const clsN=k=>(isFutureWorkdayKey(k)&&s[k]===0)?"day-ok":normalDayClass(s[k]);
  const clsO=k=>(isFutureWorkdayKey(k)&&s[k]===0)?"day-ok":weekdayOTClass(s[k]);
  return `<tfoot><tr class="sum-row">${admin?"<td></td><td></td><td></td>":""}<td></td><td></td><td></td><td>汇总</td><td class="${clsN('monN')}">${s.monN}</td><td class="${clsO('monO')}">${s.monO}</td><td class="${clsN('tueN')}">${s.tueN}</td><td class="${clsO('tueO')}">${s.tueO}</td><td class="${clsN('wedN')}">${s.wedN}</td><td class="${clsO('wedO')}">${s.wedO}</td><td class="${clsN('thuN')}">${s.thuN}</td><td class="${clsO('thuO')}">${s.thuO}</td><td class="${clsN('friN')}">${s.friN}</td><td class="${clsO('friO')}">${s.friO}</td><td>${s.satO}</td><td>${s.sunO}</td><td class="${totalNormalClass(s.n)}">${s.n}</td><td class="${totalWeekdayOTClass(s)}">${s.w}</td><td>${s.e}</td>${admin?"":"<td></td><td></td>"}</tr></tfoot>`;
}
function editRow(idx){
  if(isLocked()) return toast("本周已锁定，不能编辑");
  const r=records[idx];
  modalState={type:r.type||"机械组装",project:r.project||Object.keys(projectUnits)[0],units:r.unit?[r.unit]:[],remark:r.remark||"",editIndex:idx};
  document.getElementById("customRemark").value=modalState.remark;
  document.getElementById("addModal").style.display="flex";
  renderModalAll();
}
function numInput(k,r){return `<td><input class="cell-input" type="number" step="0.5" min="0" id="e_${k}" value="${num(r[k])}"></td>`}function saveRow(idx){const r=records[idx];r.type=document.getElementById("e_type").value.trim();r.project=document.getElementById("e_project").value.trim();r.unit=document.getElementById("e_unit").value.trim();r.remark=document.getElementById("e_remark").value.trim();["monN","monO","tueN","tueO","wedN","wedO","thuN","thuO","friN","friO","satO","sunO"].forEach(k=>r[k]=num(document.getElementById("e_"+k).value));saveData();renderEmp()}function delRow(idx){if(isLocked())return toast("本周已锁定，不能删除");if(!confirm("确认删除这一行？"))return;records.splice(idx,1);saveData();renderEmp()}function showEmp(){document.getElementById("empView").style.display="block";document.getElementById("adminView").style.display="none";renderEmp()}function showAdmin(){document.getElementById("empView").style.display="none";document.getElementById("adminView").style.display="block";renderAdmin()}function clearFilter(){document.getElementById("typeFilter").value="all";document.getElementById("projectFilter").value="";document.getElementById("unitFilter").value="";renderAdmin()}function lockWeek(){localStorage.setItem(lockKey(),"1");refreshWeekDisplay();setAutoSaveStatus("已锁定 🔒");toast("已锁定")}function unlockWeek(){localStorage.setItem(lockKey(),"0");refreshWeekDisplay();setAutoSaveStatus("已解锁");toast("已解锁")}
function exportCSV(){const headers=["员工","工号","周数","工时类别","项目号","单元号","备注","周一正常","周一加班","周二正常","周二加班","周三正常","周三加班","周四正常","周四加班","周五正常","周五加班","周六加班","周日加班","正常汇总","工作日加班","周末加班"];const lines=[headers];records.forEach(r=>lines.push([r.employee,r.empNo,r.week,r.type,r.project,r.unit,r.remark,r.monN,r.monO,r.tueN,r.tueO,r.wedN,r.wedO,r.thuN,r.thuO,r.friN,r.friO,r.satO,r.sunO,normalTotal(r),weekdayOT(r),weekendOT(r)]));const csv="\ufeff"+lines.map(a=>a.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\n");const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="车间工时_V4.3.1.csv";a.click();URL.revokeObjectURL(a.href)}
/* 弹窗逻辑 */
function resetModal(){modalState={type:"机械组装",project:Object.keys(projectUnits)[0],units:[],remark:""};modalState.remark=remarkMap[modalState.type][0]||"";document.getElementById("customRemark").value=modalState.remark;document.getElementById("splitEnabled").checked=false;document.getElementById("splitTotal").value=""}
function openAddModal(){if(isLocked())return toast("本周已锁定，不能新增");resetModal();delete modalState.editIndex;document.getElementById("addModal").style.display="flex";renderModalAll()}
function closeAddModal(){document.getElementById("addModal").style.display="none"}
function renderModalAll(){renderModalTypes();renderModalProjects();renderModalUnits();renderModalRemarks();updateModalSummary()}
function updateModalSummary(){document.getElementById("modalSummary").innerText=`工时类别：${modalState.type||"-"} ｜ 项目：${modalState.project||"-"} ｜ 单元：${modalState.units.length}个 ｜ 备注：${modalState.remark||"-"}`;document.getElementById("selectedCount").innerText=`已选 ${modalState.units.length} 个`;document.getElementById("generateBtn").innerText=(modalState.editIndex!==undefined?"保存前置信息":`确定生成 ${modalState.units.length} 条`)}
function makeBtn(text,active,fn){const b=document.createElement("button");b.className="choice-btn"+(active?" active":"");b.innerText=text;b.onclick=fn;return b}
function renderModalTypes(){const box=document.getElementById("modalTypeBox");box.innerHTML="";workTypes.forEach(t=>box.appendChild(makeBtn(t,modalState.type===t,()=>{modalState.type=t;modalState.remark=(remarkMap[t]||[])[0]||"";document.getElementById("customRemark").value=modalState.remark;renderModalTypes();renderModalRemarks();updateModalSummary()})))}
function renderModalProjects(){const box=document.getElementById("modalProjectBox");box.innerHTML="";Object.keys(projectUnits).forEach(p=>box.appendChild(makeBtn(p,modalState.project===p,()=>{modalState.project=p;modalState.units=[];renderModalProjects();renderModalUnits();updateModalSummary()})))}
function renderModalUnits(){const normal=document.getElementById("unitNormalBox"),container=document.getElementById("unitContainerBox");normal.innerHTML="";container.innerHTML="";const units=projectUnits[modalState.project]||[];const normalUnits=units.filter(u=>!String(u).startsWith("NIN-"));const containerUnits=units.filter(u=>String(u).startsWith("NIN-"));function add(box,u){box.appendChild(makeBtn(u,modalState.units.includes(u),()=>{modalState.units.includes(u)?modalState.units=modalState.units.filter(x=>x!==u):modalState.units.push(u);renderModalUnits();updateModalSummary()}))}normalUnits.forEach(u=>add(normal,u));containerUnits.forEach(u=>add(container,u));if(!normalUnits.length)normal.innerHTML='<div class="unit-empty">暂无</div>';if(!containerUnits.length)container.innerHTML='<div class="unit-empty">暂无</div>'}
function renderModalRemarks(){const box=document.getElementById("modalRemarkBox");box.innerHTML="";(remarkMap[modalState.type]||[]).forEach(r=>box.appendChild(makeBtn(r,modalState.remark===r,()=>{modalState.remark=r;document.getElementById("customRemark").value=r;renderModalRemarks();updateModalSummary()})))}
function applyCustomRemark(){modalState.remark=document.getElementById("customRemark").value.trim();renderModalRemarks();updateModalSummary()}
function selectAllUnits(){modalState.units=[...(projectUnits[modalState.project]||[])];renderModalUnits();updateModalSummary()}function clearUnits(){modalState.units=[];renderModalUnits();updateModalSummary()}
function applySplitToRows(newRows){if(!document.getElementById("splitEnabled").checked)return;const total=num(document.getElementById("splitTotal").value);if(total<=0||newRows.length===0)return;let each=total/newRows.length;const day=document.getElementById("splitDay").value,type=document.getElementById("splitType").value;const map={mon:{normal:"monN",weekdayOT:"monO"},tue:{normal:"tueN",weekdayOT:"tueO"},wed:{normal:"wedN",weekdayOT:"wedO"},thu:{normal:"thuN",weekdayOT:"thuO"},fri:{normal:"friN",weekdayOT:"friO"},sat:{weekendOT:"satO"},sun:{weekendOT:"sunO"}};const key=map[day]&&map[day][type];if(!key)return;newRows.forEach(r=>r[key]=Math.round(each*100)/100)}
function generateRowsFromModal(){
  applyCustomRemark();
  if(!modalState.type) return toast("请选择工时类别");
  if(!modalState.project) return toast("请选择项目号");
  if(modalState.units.length===0) return toast("请选择至少一个单元");
  if(modalState.editIndex!==undefined){
    const i=modalState.editIndex;
    records[i].type=modalState.type;
    records[i].project=modalState.project;
    records[i].unit=modalState.units[0];
    records[i].remark=modalState.remark;
    saveData();
    renderEmp();
    closeAddModal();
    return;
  }
  let newRows=modalState.units.map(u=>({...defaultRecord(),employee:document.getElementById("empName").innerText,empNo:document.getElementById("empNo").innerText,week:getWeekNo(currentWeekOffset),type:modalState.type,project:modalState.project,unit:u,remark:modalState.remark}));
  applySplitToRows(newRows);
  records.push(...newRows);
  saveData();
  renderEmp();
  closeAddModal();
}

function weekDisplayName(offset){
  const w=getWeekNo(offset);
  const locked=localStorage.getItem(LOCK_PREFIX+"_"+w)==="1";
  const suffix=(offset===0?"（本周）":"")+(locked?" 🔒":"");
  return w+suffix;
}
function renderWeekCards(containerId){
  const box=document.getElementById(containerId);
  if(!box) return;
  box.innerHTML="";
  [-3,-2,-1,0].forEach(off=>{
    const w=getWeekNo(off);
    const locked=localStorage.getItem(LOCK_PREFIX+"_"+w)==="1";
    const btn=document.createElement("button");
    btn.className="week-card"+(off===currentWeekOffset?" current":"")+(locked?" locked":"");
    btn.innerText=weekDisplayName(off);
    btn.onclick=()=>setWeekOffset(off);
    box.appendChild(btn);
  });
}
function refreshWeekDisplay(){
  renderWeekCards("weekCardRow");
  renderWeekCards("adminWeekCardRow");
}
function setWeekOffset(offset){
  saveData();
  currentWeekOffset=offset;
  refreshWeekDisplay();
  loadData();
  renderEmp();
  if(document.getElementById("adminView").style.display!=="none") renderAdmin();
}
function isFutureWorkdayKey(key){
  const d=DAY_FIELDS[key];
  if(!d || currentWeekOffset!==0) return false;
  const order={mon:1,tue:2,wed:3,thu:4,fri:5};
  const today=new Date().getDay();
  const todayWorkday=today===0?7:today;
  return order[d.day] && order[d.day]>todayWorkday;
}

function initFilters(){const sel=document.getElementById("typeFilter");workTypes.forEach(t=>{const o=document.createElement("option");o.value=t;o.innerText=t;sel.appendChild(o)})}
refreshWeekDisplay();loadData();initFilters();renderEmp();
</script>
