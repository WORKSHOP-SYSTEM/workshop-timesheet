<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工时系统 V1.0</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f7fa;
}

.header {
    padding: 12px;
    background: #1e2a38;
    color: #fff;
    text-align: center;
    font-size: 16px;
}

.container {
    padding: 10px;
}

.table-wrap {
    overflow-x: auto;
    background: #fff;
    border-radius: 6px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}

th, td {
    border: 1px solid #ddd;
    padding: 6px;
    text-align: center;
}

th {
    background: #2f3e52;
    color: #fff;
}

/* 移动端优化 */
td input {
    width: 60px;
    height: 32px;
    font-size: 14px;
    text-align: center;
}

</style>
</head>

<body>

<div class="header">
    工时填报系统 V1.0（基础版）
</div>

<div class="container">
    <div class="table-wrap">
        <table id="mainTable">
            <thead>
                <tr>
                    <th>项目号</th>
                    <th>单元</th>
                    <th>类型</th>
                    <th>周一</th>
                    <th>周二</th>
                    <th>周三</th>
                    <th>周四</th>
                    <th>周五</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- 行数据 -->
            </tbody>
        </table>
    </div>
</div>

<script>

// ✅ 数据模型（V1核心）
let rows = [
    {
        project: "",
        unit: "",
        type: "",
        mon: "",
        tue: "",
        wed: "",
        thu: "",
        fri: ""
    }
];

// ✅ 渲染表格
function renderTable() {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    rows.forEach((row, i) => {
        let tr = document.createElement("tr");

        tr.innerHTML = `
            <td><input value="${row.project}" onchange="onInput(${i}, 'project', this.value)"></td>
            <td><input value="${row.unit}" onchange="onInput(${i}, 'unit', this.value)"></td>
            <td><input value="${row.type}" onchange="onInput(${i}, 'type', this.value)"></td>
            <td><input value="${row.mon}" onchange="onInput(${i}, 'mon', this.value)"></td>
            <td><input value="${row.tue}" onchange="onInput(${i}, 'tue', this.value)"></td>
            <td><input value="${row.wed}" onchange="onInput(${i}, 'wed', this.value)"></td>
            <td><input value="${row.thu}" onchange="onInput(${i}, 'thu', this.value)"></td>
            <td><input value="${row.fri}" onchange="onInput(${i}, 'fri', this.value)"></td>
        `;

        tbody.appendChild(tr);
    });
}

// ✅ 输入处理（V1基础）
function onInput(rowIndex, field, value) {
    rows[rowIndex][field] = value;
    console.log(rows);
}

// ✅ 初始化
renderTable();

</script>

</body>
</html>
