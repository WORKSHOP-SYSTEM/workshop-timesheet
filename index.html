async function apiCall(action,payload={}){const res=await fetch(API_BASE,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action,payload})});if(!res.ok)throw new Error("HTTP "+res.status);const data=await res.json();if(!data.ok)throw new Error(data.error||"云函数返回失败");return data.data||{}}
function num(v){let n=parseFloat(v);return isNaN(n)?0:n}function getISOWeek(d){const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())),dayNum=date.getUTCDay()||7;date.setUTCDate(date.getUTCDate()+4-dayNum);const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));return Math.ceil((((date-yearStart)/86400000)+1)/7)}function getWeekNo(o=0){const d=new Date();d.setDate(d.getDate()+o*7);return "W"+String(getISOWeek(d)).padStart(2,"0")}function defaultRecord(){return {employee:currentUserName||employeeMap[currentLoginId]||"",empNo:currentLoginId,week:getWeekNo(currentWeekOffset),type:"机械组装",project:"",unit:"",remark:"",monN:0,monO:0,tueN:0,tueO:0,wedN:0,wedO:0,thuN:0,thuO:0,friN:0,friO:0,satO:0,sunO:0}}function toast(m){alert(m)}

async function saveData(){document.querySelectorAll('.autosave-badge').forEach(b=>b.classList.add('saving'));try{if(!currentLoginId)throw new Error('未登录');if(currentUserRole==='admin')return;const week=getWeekNo(currentWeekOffset);await apiCall('saveRecords',{empNo:currentLoginId,employee:currentUserName||employeeMap[currentLoginId]||'',week,records});const now=new Date();document.querySelectorAll('.autosaveText').forEach(e=>e.innerText=`已云端保存 ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`)}catch(e){console.error(e);toast(String(e.message||e).includes('LOCKED')?'本周已锁定，后台拒绝保存':'云端保存失败')}finally{document.querySelectorAll('.autosave-badge').forEach(b=>b.classList.remove('saving'))}}
async function doLogin(){const empNo=document.getElementById('loginEmpNo').value.trim(),key=document.getElementById('loginKey').value.trim(),err=document.getElementById('loginError');err.innerText='';try{if(!employeeMap[empNo])return err.innerText='工号不存在';if(employeeKeyMap[empNo]!==key)return err.innerText='密码错误';currentLoginId=empNo;currentUserName=employeeMap[empNo];currentUserRole=empNo==='1237794'?'admin':'employee';document.getElementById('empNo').innerText=empNo;document.getElementById('empName').innerText=currentUserName;document.getElementById('loginScreen').style.display='none';document.getElementById('mainApp').classList.remove('locked');await refreshVisibleLockStates();refreshWeekDisplay();await loadData();currentUserRole==='admin'?showAdmin():showEmp()}catch(e){console.error(e);err.innerText='登录失败'}}

function timeInputCell(i,k,v,admin=false,r=null){if(admin)return `<td class="${adminCellClass(r,k)}">${num(v)} </td>`;return `<td class="${cellClass(k)}"><div class="time-wrap"><input class="time-cell no-password-manager" type="text" inputmode="decimal" pattern="[0-9.]*" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" data-lpignore="true" data-form-type="other" value="${num(v)===0?'':num(v)}" ${isLocked()?'disabled':''} onchange="updateCell(${i},'${k}',this.value)" onfocus="this.select();setActiveCell(this)"></div></td>`}async function updateCell(i,k,value){if(isLocked())return toast('本周已锁定，不能修改工时');let v=num(value);if(v<0)v=0;const limits={monN:8,tueN:8,wedN:8,thuN:8,friN:8,monO:4,tueO:4,wedO:4,thuO:4,friO:4};if(limits[k]!==undefined){const used=records.reduce((a,r,idx)=>idx===i?a:a+num(r[k]),0);const remain=Math.max(0,Math.round((limits[k]-used)*100)/100);if(v>remain){v=remain;toast('超出当天可填上限，已自动校正为剩余可填工时：'+remain)}}records[i][k]=v;await saveData();renderEmp()}function setActiveCell(input){document.querySelectorAll('.active-input').forEach(e=>e.classList.remove('active-input'));input.classList.add('active-input')}

  return `<tfoot><tr><td></td><td></td><td></td><td>汇总</td><td class="${clsN('monN')}">${s.monN}</td><td class="${clsO('monO')}">${s.monO}</td><td class="${clsN('tueN')}">${s.tueN}</td><td class="${clsO('tueO')}">${s.tueO}</td><td class="${clsN('wedN')}">${s.wedN}</td><td class="${clsO('wedO')}">${s.wedO}</td><td class="${clsN('thuN')}">${s.thuN}</td><td class="${clsO('thuO')}">${s.thuO}</td><td class="${clsN('friN')}">${s.friN}</td><td class="${clsO('friO')}">${s.friO}</td><td>${s.satO}</td><td>${s.sunO}</td><td class="${totalNormalClass(s.n)}">${s.n}</td><td>${s.w}</td><td>${s.e}</td><td></td><td></td></tr></tfoot>`;
}
function renderAdminStats(list=records){const box=document.getElementById('adminStats');if(!box)return;const empSet=new Set(list.map(r=>r.empNo).filter(Boolean));let n=0,w=0,e=0;list.forEach(r=>{n+=normalTotal(r);w+=weekdayOT(r);e+=weekendOT(r)});box.innerHTML=`<div class="stat-grid"><div class="stat-card"><div class="stat-num">${empSet.size}</div><div class="stat-label">员工数</div></div><div class="stat-card"><div class="stat-num">${list.length}</div><div class="stat-label">明细行</div></div><div class="stat-card"><div class="stat-num">${n}</div><div class="stat-label">正常工时</div></div><div class="stat-card"><div class="stat-num">${w}</div><div class="stat-label">工作日加班</div></div><div class="stat-card"><div class="stat-num">${e}</div><div class="stat-label">周末加班</div></div></div>`}async function reloadData(){try{await loadData();renderEmp();if(document.getElementById('adminView').style.display!=='none')renderAdmin()}catch(e){toast('刷新失败')}}
async function checkLockRealtime(silent=false){try{if(!currentLoginId)return;const weeks=[-2,-1,0].map(o=>getWeekNo(o));const currentWeek=getWeekNo(currentWeekOffset);const oldLocked=currentWeekLocked===true;const oldCache=JSON.stringify(lockCache||{});const d=await apiCall('getLocks',{weeks,_t:Date.now()});weeks.forEach(w=>{lockCache[w]=d.locks&&d.locks[w]===true});const newLocked=lockCache[currentWeek]===true;currentWeekLocked=newLocked;refreshWeekDisplay();if(newLocked!==oldLocked){if(currentUserRole==='employee'){renderEmp();if(!silent)toast(newLocked?'本周已被管理员锁定，已禁止新增、修改和删除':'本周已解锁，可以继续填写')}else{renderAdminStats(records)}}else if(JSON.stringify(lockCache||{})!==oldCache){refreshWeekDisplay()}}catch(e){console.error(e)}}function startLockRefresh(){stopLockRefresh();checkLockRealtime(true);lockRefreshTimer=setInterval(()=>checkLockRealtime(false),2000)}function stopLockRefresh(){if(lockRefreshTimer){clearInterval(lockRefreshTimer);lockRefreshTimer=null}}function startAutoRefresh(){stopAutoRefresh();autoRefreshTimer=setInterval(async()=>{if(document.getElementById('adminView').style.display==='none')return;await loadData();renderAdmin()},30000)}function stopAutoRefresh(){if(autoRefreshTimer){clearInterval(autoRefreshTimer);autoRefreshTimer=null}}function showEmp(){document.getElementById('empView').style.display='block';document.getElementById('adminView').style.display='none';stopAutoRefresh();renderEmp();startLockRefresh()}function showAdmin(){if(currentUserRole!=='admin')return toast('只有管理员可以进入后台');document.getElementById('empView').style.display='none';document.getElementById('adminView').style.display='block';renderAdmin();startAutoRefresh();startLockRefresh()}
async function delRow(i){if(isLocked())return toast('本周已锁定');const r=records[i]||{};const msg=`确认删除该条工时记录吗？\n\n工时类别：${r.type||''}\n项目号：${r.project||'无'}\n单元号：${r.unit||'无'}\n备注：${r.remark||''}\n正常汇总：${normalTotal(r)}\n工作日加班：${weekdayOT(r)}\n周末加班：${weekendOT(r)}`;if(!confirm(msg))return;records.splice(i,1);await saveData();renderEmp()}function editRow(i){const r=records[i];modalState={type:r.type,project:r.project||Object.keys(projectUnits)[0],units:r.unit?[r.unit]:[],remark:r.remark,editIndex:i};document.getElementById('customRemark').value=modalState.remark;document.getElementById('addModal').style.display='flex';renderModalAll()}function resetModal(){modalState={type:workTypes[0],project:Object.keys(projectUnits)[0],units:[],remark:remarkMap[workTypes[0]][0]};document.getElementById('customRemark').value=modalState.remark;document.getElementById('splitEnabled').checked=false;document.getElementById('splitTotal').value=''}function openAddModal(){if(isLocked())return toast('本周已锁定，不能新增');resetModal();document.getElementById('addModal').style.display='flex';renderModalAll()}function closeAddModal(){document.getElementById('addModal').style.display='none'}
function syncProjectUnitVisibility(){const noProject=isNoProjectType();['projectSection','unitSection'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.toggle('hidden-by-type',noProject)});const tip=document.getElementById('noProjectTip');if(tip)tip.style.display=noProject?'block':'none'}
function renderModalAll(){syncProjectUnitVisibility();renderModalTypes();renderModalProjects();renderModalUnits();renderModalRemarks();updateModalSummary();updateSplitRemaining();hardenMobileInputs()}function updateModalSummary(){const noProject=isNoProjectType();const sc=document.getElementById('selectedCount');if(sc)sc.innerText=`已选 ${modalState.units.length} 个`;const btn=document.getElementById('generateBtn');if(btn)btn.innerText=modalState.editIndex!==undefined?'保存前置信息':`确定生成 ${noProject?1:modalState.units.length} 条`;syncProjectUnitVisibility();updateSplitRemaining()}function makeBtn(t,a,fn){const b=document.createElement('button');b.className='choice-btn'+(a?' active':'');b.innerText=t;b.onclick=fn;return b}function renderModalTypes(){const box=document.getElementById('modalTypeBox');box.innerHTML='';workTypes.forEach(t=>box.appendChild(makeBtn(t,modalState.type===t,()=>{modalState.type=t;modalState.remark=(remarkMap[t]||[])[0]||'';if(isNoProjectType(t)){modalState.project='';modalState.units=[]}else if(!modalState.project){modalState.project=Object.keys(projectUnits)[0]}document.getElementById('customRemark').value=modalState.remark;renderModalAll()})))}function renderModalProjects(){const box=document.getElementById('modalProjectBox');box.innerHTML='';Object.keys(projectUnits).forEach(p=>box.appendChild(makeBtn(p,modalState.project===p,()=>{modalState.project=p;modalState.units=[];renderModalAll()})))}function renderModalUnits(){const n=document.getElementById('unitNormalBox'),c=document.getElementById('unitContainerBox');n.innerHTML='';c.innerHTML='';if(isNoProjectType()){n.innerHTML='<div class="empty">无需选择</div>';c.innerHTML='<div class="empty">无需选择</div>';return}const us=projectUnits[modalState.project]||[],normal=us.filter(u=>!String(u).startsWith('NIN-')),cont=us.filter(u=>String(u).startsWith('NIN-'));function add(box,u){box.appendChild(makeBtn(u,modalState.units.includes(u),()=>{modalState.units.includes(u)?modalState.units=modalState.units.filter(x=>x!==u):modalState.units.push(u);renderModalUnits();updateModalSummary()}))}normal.forEach(u=>add(n,u));cont.forEach(u=>add(c,u));if(!normal.length)n.innerHTML='<div class="empty">暂无</div>';if(!cont.length)c.innerHTML='<div class="empty">暂无</div>'}function renderModalRemarks(){const box=document.getElementById('modalRemarkBox');box.innerHTML='';(remarkMap[modalState.type]||[]).forEach(r=>box.appendChild(makeBtn(r,modalState.remark===r,()=>{modalState.remark=r;document.getElementById('customRemark').value=r;renderModalRemarks();updateModalSummary()})))}function applyCustomRemark(){modalState.remark=document.getElementById('customRemark').value.trim();renderModalRemarks();updateModalSummary()}function selectAllUnits(){if(isNoProjectType())return;modalState.units=[...(projectUnits[modalState.project]||[])];renderModalUnits();updateModalSummary()}function clearUnits(){modalState.units=[];renderModalUnits();updateModalSummary()}
function getSplitKey(){const day=document.getElementById('splitDay').value,type=document.getElementById('splitType').value,map={mon:{normal:'monN',weekdayOT:'monO'},tue:{normal:'tueN',weekdayOT:'tueO'},wed:{normal:'wedN',weekdayOT:'wedO'},thu:{normal:'thuN',weekdayOT:'thuO'},fri:{normal:'friN',weekdayOT:'friO'},sat:{weekendOT:'satO'},sun:{weekendOT:'sunO'}};return map[day]&&map[day][type]}function getSplitLimit(){const type=document.getElementById('splitType').value;if(type==='normal')return 8;if(type==='weekdayOT')return 4;if(type==='weekendOT')return 24;return 0}function getSplitRemaining(){const key=getSplitKey(),limit=getSplitLimit();if(!key||!limit)return 0;const used=records.reduce((a,r)=>a+num(r[key]),0);return Math.max(0,Math.round((limit-used)*100)/100)}function updateSplitRemaining(){const remain=getSplitRemaining(),txt=document.getElementById('splitRemainText'),inp=document.getElementById('splitTotal');if(txt)txt.innerText='最大可填：'+remain;if(inp&&num(inp.value)>remain)inp.value=remain}function guardSplitTotal(){const inp=document.getElementById('splitTotal');const remain=getSplitRemaining();if(num(inp.value)>remain)inp.value=remain;if(num(inp.value)<0)inp.value=0}function applySplit(rows){if(!document.getElementById('splitEnabled').checked)return;const total=num(document.getElementById('splitTotal').value);const key=getSplitKey();const remain=getSplitRemaining();if(!key||!rows.length||remain<=0)return;let finalTotal=total<=0?remain:Math.min(total,remain);const unit=0.25,totalUnits=Math.round(finalTotal/unit),base=Math.floor(totalUnits/rows.length),extra=totalUnits%rows.length;rows.forEach((r,i)=>{let units=base+(i<extra?1:0);r[key]=units*unit})}
async function generateRowsFromModal(){applyCustomRemark();if(!modalState.type)return toast('请选择工时类别');const noProject=isNoProjectType();if(!noProject){if(!modalState.project)return toast('请选择项目号');if(!modalState.units.length)return toast('请选择至少一个单元')}if(modalState.editIndex!==undefined){const i=modalState.editIndex;Object.assign(records[i],{type:modalState.type,project:noProject?'':modalState.project,unit:noProject?'':(modalState.units[0]||''),remark:modalState.remark});await saveData();renderEmp();closeAddModal();return}let rows=noProject?[{...defaultRecord(),type:modalState.type,project:'',unit:'',remark:modalState.remark}]:modalState.units.map(u=>({...defaultRecord(),type:modalState.type,project:modalState.project,unit:u,remark:modalState.remark}));applySplit(rows);records.push(...rows);await saveData();renderEmp();closeAddModal()}function exportCSV(){const headers=['员工','工号','周数','工时类别','项目号','单元号','备注','周一正常','周一加班','周二正常','周二加班','周三正常','周三加班','周四正常','周四加班','周五正常','周五加班','周六加班','周日加班','正常汇总','工作日加班','周末加班'],lines=[headers];records.forEach(r=>lines.push([r.employee,r.empNo,r.week,r.type,r.project,r.unit,r.remark,r.monN,r.monO,r.tueN,r.tueO,r.wedN,r.wedO,r.thuN,r.thuO,r.friN,r.friO,r.satO,r.sunO,normalTotal(r),weekdayOT(r),weekendOT(r)]));const csv='\ufeff'+lines.map(a=>a.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='车间工时_V5.7.8.csv';a.click();URL.revokeObjectURL(a.href)}

function hardenMobileInputs(){
  document.querySelectorAll('input').forEach(inp=>{
    inp.setAttribute('autocomplete', inp.id==='loginKey' ? 'one-time-code' : 'off');
    inp.setAttribute('autocorrect','off');
    inp.setAttribute('autocapitalize','off');
    inp.setAttribute('spellcheck','false');
    inp.setAttribute('data-lpignore','true');
    inp.setAttribute('data-form-type','other');
    inp.classList.add('no-password-manager');
  });
}
