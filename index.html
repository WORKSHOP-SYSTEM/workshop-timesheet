<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<title>车间工时填报系统 V5.8.1</title>
<style>
body{font-family:Arial;background:#163b5f;color:#fff;text-align:center}
.card{background:#fff;color:#000;width:320px;margin:100px auto;padding:20px;border-radius:12px}
button{background:#16a34a;color:#fff;padding:10px 20px;border:none;border-radius:8px}
</style>
</head>
<body>
<div class='card'>
<h3>车间工时填报系统 V5.8.1</h3>
<input id='emp' placeholder='工号'><br><br>
<input id='pwd' type='password' placeholder='密码'><br><br>
<button onclick='doLogin()'>登录</button>
<p id='msg'></p>
</div>
<script>
const users={"991005":"100578","1177215":"721583"};
function doLogin(){
  var id=document.getElementById('emp').value;
  var pwd=document.getElementById('pwd').value;
  if(!users[id]){document.getElementById('msg').innerText='工号不存在';return;}
  if(users[id]!==pwd){document.getElementById('msg').innerText='密码错误';return;}
  alert('登录成功 ✅');
}

function applySplit(rows){
  var total=8,unit=0.25;
  var totalUnits=Math.round(total/unit);
  var base=Math.floor(totalUnits/rows.length);
  var extra=totalUnits%rows.length;
  rows.forEach(function(r,i){
    var units=base+(i<extra?1:0);
    r.val=units*unit;
  });
}

function delRow(){
  var ok=confirm('确认删除？');
  if(ok) alert('已删除');
}
</script>
</body>
</html>
