    if(!map.has(key)){
      const nr={...r};

    }else{
      const nr=map.get(key);
      fields.forEach(f=>nr[f]=Math.round((num(nr[f])+num(r[f]))*100)/100);

  });

}

const WORKDAY_FIELD_INDEX={monN:1,monO:1,tueN:2,tueO:2,wedN:3,wedO:3,thuN:4,thuO:4,friN:5,friO:5};
function weekNumberOnly(w){const n=parseInt(String(w||'').replace(/[^0-9]/g,''),10);return isNaN(n)?0:n}
function shouldCheckFieldForAnomaly(k){
  const dayIndex=WORKDAY_FIELD_INDEX[k];
  if(!dayIndex)return true;
  const selected=weekNumberOnly(getWeekNo(currentWeekOffset));
  const current=weekNumberOnly(getWeekNo(0));
  if(selected<current)return true;
  if(selected>current)return false;
  const today=new Date().getDay();
  if(today===0||today===6)return true;
  return dayIndex<today;
}

function employeeFieldTotalFromList(emp,k,list=records){return (list||records).filter(x=>String(x.empNo||'')===String(emp||'')).reduce((a,x)=>a+num(x[k]),0)}
function isEmployeeAnomalous(emp,list=records){
  emp=String(emp||'');
  if(!emp)return false;
  const nFields=['monN','tueN','wedN','thuN','friN'].filter(k=>shouldCheckFieldForAnomaly(k));
  const oFields=['monO','tueO','wedO','thuO','friO'].filter(k=>shouldCheckFieldForAnomaly(k));
  if(!nFields.length&&!oFields.length)return false;
  const normalSum=nFields.reduce((a,k)=>a+employeeFieldTotalFromList(emp,k,list),0);
  const expected=nFields.length*8;
  if(normalSum!==expected)return true;
  for(const k of nFields){
    if(employeeFieldTotalFromList(emp,k,list)!==8)return true;
  }
  for(const k of oFields){
    const v=employeeFieldTotalFromList(emp,k,list);
    if(v!==0&&v!==4)return true;
  }
  return false;
}

function adminEmployeeSeverity(emp,list=records){

  const hasReal=(list||[]).some(r=>String(r.empNo||'')===emp&&!r.__empty);
  if(!hasReal)return 2;
  let warn=0;
  const nFields=['monN','tueN','wedN','thuN','friN'].filter(k=>shouldCheckFieldForAnomaly(k));
  const oFields=['monO','tueO','wedO','thuO','friO'].filter(k=>shouldCheckFieldForAnomaly(k));

async function checkLockRealtime(silent=false){try{if(!currentLoginId)return;const weeks=[-2,-1,0].map(o=>getWeekNo(o));const currentWeek=getWeekNo(currentWeekOffset);const oldLocked=currentWeekLocked===true;const oldCache=JSON.stringify(lockCache||{});const d=await apiCall('getLocks',{weeks,_t:Date.now()});weeks.forEach(w=>{lockCache[w]=d.locks&&d.locks[w]===true});const newLocked=lockCache[currentWeek]===true;currentWeekLocked=newLocked;refreshWeekDisplay();if(newLocked!==oldLocked){if(currentUserRole==='employee'){renderEmp();if(!silent)toast(newLocked?'本周已被管理员锁定，已禁止新增、修改和删除':'本周已解锁，可以继续填写')}else{renderAdminStats(records)}}else if(JSON.stringify(lockCache||{})!==oldCache){refreshWeekDisplay()}}catch(e){console.error(e)}}function startLockRefresh(){stopLockRefresh();checkLockRealtime(true);lockRefreshTimer=setInterval(()=>checkLockRealtime(false),2000)}function stopLockRefresh(){if(lockRefreshTimer){clearInterval(lockRefreshTimer);lockRefreshTimer=null}}function startAutoRefresh(){stopAutoRefresh();autoRefreshTimer=setInterval(async()=>{if(document.getElementById('adminView').style.display==='none')return;await loadData();renderAdmin()},30000)}function stopAutoRefresh(){if(autoRefreshTimer){clearInterval(autoRefreshTimer);autoRefreshTimer=null}}function showEmp(){document.getElementById('mainApp').classList.remove('admin-mode');document.getElementById('empView').style.display='block';document.getElementById('adminView').style.display='none';stopAutoRefresh();renderEmp();startLockRefresh()}function showAdmin(){if(currentUserRole!=='admin')return toast('只有管理员可以进入后台');document.getElementById('mainApp').classList.add('admin-mode');document.getElementById('empView').style.display='none';document.getElementById('adminView').style.display='block';renderAdmin();startAutoRefresh();startLockRefresh()}
async function delRow(i){if(isLocked())return toast('本周已锁定');const r=records[i]||{};const msg=`确认删除该条工时记录吗？\n\n工时类别：${r.type||''}    项目号：${r.project||'无'}\n单元号：${r.unit||'无'}    备注：${r.remark||''}\n正常汇总：${normalTotal(r)}    工作日加班：${weekdayOT(r)}\n周末加班：${weekendOT(r)}`;if(!confirm(msg))return;records.splice(i,1);await saveData();renderEmp()}function editRow(i){const r=records[i];modalState={type:r.type,project:r.project||Object.keys(projectUnits)[0],units:r.unit?[r.unit]:[],remark:r.remark,editIndex:i};document.getElementById('customRemark').value=modalState.remark;document.getElementById('addModal').style.display='flex';renderModalAll()}const LAST_MODAL_SELECTION_KEY='timesheet_last_modal_selection_v5111';function loadLastModalSelection(){try{const d=JSON.parse(localStorage.getItem(LAST_MODAL_SELECTION_KEY)||'{}');if(d&&workTypes.includes(d.type)){return d}}catch(e){}return null}function saveLastModalSelection(){try{if(modalState.editIndex!==undefined)return;localStorage.setItem(LAST_MODAL_SELECTION_KEY,JSON.stringify({type:modalState.type,project:modalState.project,remark:modalState.remark}))}catch(e){}}function resetModal(){const saved=loadLastModalSelection();const t=saved&&workTypes.includes(saved.type)?saved.type:workTypes[0];const p=saved&&saved.project&&projectUnits[saved.project]?saved.project:Object.keys(projectUnits)[0];const rm=saved&&saved.remark?saved.remark:(remarkMap[t]||[])[0]||'';modalState={type:t,project:noProjectTypes.includes(t)?'':p,units:[],remark:rm};document.getElementById('customRemark').value=modalState.remark;document.getElementById('splitEnabled').checked=false;document.getElementById('splitTotal').value=''}function openAddModal(){if(isLocked())return toast('本周已锁定，不能新增');resetModal();document.getElementById('addModal').style.display='flex';renderModalAll()}function closeAddModal(){document.getElementById('addModal').style.display='none'}
function syncProjectUnitVisibility(){const noProject=isNoProjectType();['projectSection','unitSection'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.toggle('hidden-by-type',noProject)});const tip=document.getElementById('noProjectTip');if(tip)tip.style.display=noProject?'block':'none'}
function renderModalAll(){syncProjectUnitVisibility();renderModalTypes();renderModalProjects();renderModalUnits();renderModalRemarks();updateModalSummary();updateSplitRemaining();hardenMobileInputs()}function updateModalSummary(){const noProject=isNoProjectType();const sc=document.getElementById('selectedCount');if(sc)sc.innerText=`已选 ${modalState.units.length} 个`;const btn=document.getElementById('generateBtn');if(btn)btn.innerText=modalState.editIndex!==undefined?'保存前置信息':`确定生成 ${noProject?1:modalState.units.length} 条`;syncProjectUnitVisibility();updateSplitRemaining()}function makeBtn(t,a,fn){const b=document.createElement('button');b.className='choice-btn'+(a?' active':'');b.innerText=t;b.onclick=fn;return b}function renderModalTypes(){const box=document.getElementById('modalTypeBox');box.innerHTML='';workTypes.forEach(t=>box.appendChild(makeBtn(t,modalState.type===t,()=>{modalState.type=t;modalState.remark=(remarkMap[t]||[])[0]||'';if(isNoProjectType(t)){modalState.project='';modalState.units=[]}else if(!modalState.project){modalState.project=Object.keys(projectUnits)[0]}document.getElementById('customRemark').value=modalState.remark;renderModalAll()})))}function renderModalProjects(){const box=document.getElementById('modalProjectBox');box.innerHTML='';Object.keys(projectUnits).forEach(p=>box.appendChild(makeBtn(p,modalState.project===p,()=>{modalState.project=p;modalState.units=[];renderModalAll()})))}function renderModalUnits(){const n=document.getElementById('unitNormalBox'),c=document.getElementById('unitContainerBox');n.innerHTML='';c.innerHTML='';const columns=document.querySelector('.unit-columns'),containerPanel=c?c.closest('.unit-panel'):null;if(isNoProjectType()){if(columns)columns.classList.add('single-unit-panel');if(containerPanel)containerPanel.style.display='none';n.innerHTML='<div class="empty">无需选择</div>';c.innerHTML='';return}const us=projectUnits[modalState.project]||[],normal=us.filter(u=>!String(u).startsWith('NIN-')),cont=us.filter(u=>String(u).startsWith('NIN-')),hideContainer=cont.length<=2;if(columns)columns.classList.toggle('single-unit-panel',hideContainer);if(containerPanel)containerPanel.style.display=hideContainer?'none':'';function add(box,u){box.appendChild(makeBtn(u,modalState.units.includes(u),()=>{modalState.units.includes(u)?modalState.units=modalState.units.filter(x=>x!==u):modalState.units.push(u);renderModalUnits();updateModalSummary()}))}const normalList=hideContainer?us:normal;normalList.forEach(u=>add(n,u));if(!hideContainer)cont.forEach(u=>add(c,u));if(!normalList.length)n.innerHTML='<div class="empty">暂无</div>';if(!hideContainer&&!cont.length)c.innerHTML='<div class="empty">暂无</div>'}function renderModalRemarks(){const box=document.getElementById('modalRemarkBox');box.innerHTML='';(remarkMap[modalState.type]||[]).forEach(r=>box.appendChild(makeBtn(r,modalState.remark===r,()=>{modalState.remark=r;document.getElementById('customRemark').value=r;renderModalRemarks();updateModalSummary()})))}function applyCustomRemark(){modalState.remark=document.getElementById('customRemark').value.trim();renderModalRemarks();updateModalSummary()}function selectAllUnits(){if(isNoProjectType())return;modalState.units=[...(projectUnits[modalState.project]||[])];renderModalUnits();updateModalSummary()}function clearUnits(){modalState.units=[];renderModalUnits();updateModalSummary()}
function getSplitKey(){const day=document.getElementById('splitDay').value,type=document.getElementById('splitType').value,map={mon:{normal:'monN',weekdayOT:'monO'},tue:{normal:'tueN',weekdayOT:'tueO'},wed:{normal:'wedN',weekdayOT:'wedO'},thu:{normal:'thuN',weekdayOT:'thuO'},fri:{normal:'friN',weekdayOT:'friO'},sat:{weekendOT:'satO'},sun:{weekendOT:'sunO'}};return map[day]&&map[day][type]}function getSplitLimit(){const type=document.getElementById('splitType').value;if(type==='normal')return 8;if(type==='weekdayOT')return 4;if(type==='weekendOT')return 24;return 0}function getSplitRemaining(){const key=getSplitKey(),limit=getSplitLimit();if(!key||!limit)return 0;const used=records.reduce((a,r)=>a+num(r[key]),0);return Math.max(0,Math.round((limit-used)*100)/100)}function updateSplitRemaining(){const remain=getSplitRemaining(),txt=document.getElementById('splitRemainText'),inp=document.getElementById('splitTotal');if(txt)txt.innerText='最大可填：'+remain;if(inp&&num(inp.value)>remain)inp.value=remain}function guardSplitTotal(){const inp=document.getElementById('splitTotal');const remain=getSplitRemaining();if(num(inp.value)>remain)inp.value=remain;if(num(inp.value)<0)inp.value=0}function applySplit(rows){if(!document.getElementById('splitEnabled').checked)return;const total=num(document.getElementById('splitTotal').value);const key=getSplitKey();const remain=getSplitRemaining();if(!key||!rows.length||remain<=0)return;let finalTotal=total<=0?remain:Math.min(total,remain);const unit=0.25,totalUnits=Math.round(finalTotal/unit),base=Math.floor(totalUnits/rows.length),extra=totalUnits%rows.length;rows.forEach((r,i)=>{let units=base+(i<extra?1:0);r[key]=units*unit})}
async function generateRowsFromModal(){applyCustomRemark();if(!modalState.type)return toast('请选择工时类别');const noProject=isNoProjectType();if(!noProject){if(!modalState.project)return toast('请选择项目号');if(!modalState.units.length)return toast('请选择至少一个单元')}if(modalState.editIndex!==undefined){const i=modalState.editIndex;Object.assign(records[i],{type:modalState.type,project:noProject?'':modalState.project,unit:noProject?'':(modalState.units[0]||''),remark:modalState.remark});records=mergeRecordsByFrontInfo(records);await saveData();renderEmp();closeAddModal();return}let rows=noProject?[{...defaultRecord(),type:modalState.type,project:'',unit:'',remark:modalState.remark}]:modalState.units.map(u=>({...defaultRecord(),type:modalState.type,project:modalState.project,unit:u,remark:modalState.remark}));applySplit(rows);records.push(...rows);records=mergeRecordsByFrontInfo(records);saveLastModalSelection();await saveData();renderEmp();closeAddModal()}function exportCSV(){
  const list=getAdminDisplayRecords();
  const esc=v=>String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const bgByClass=cls=>cls==='day-over'?'#ffd6d6':(cls==='day-warn'?'#fff3bf':'#ffffff');
  const td=(v,bg='#ffffff')=>`<td style="mso-number-format:'\@';border:1px solid #d7e0ea;background:${bg};padding:4px;text-align:center;">${esc(v)}</td>`;
  const headers=['姓名','周数','工时类别','项目号','单元号','正常汇总','工作日加班','周末加班','备注'];
  let rows=`<tr>${headers.map(h=>`<th style="border:1px solid #d7e0ea;background:#e8edf3;padding:5px;text-align:center;">${h}</th>`).join('')}</tr>`;
  list.forEach(r=>{
    const sev=adminEmployeeSeverity(r.empNo,getAdminBaseRecords());
    const frontBg=sev>=2?'#ffd6d6':(sev===1?'#fff3bf':'#ffffff');
    const n=normalTotal(r),w=weekdayOT(r),e=weekendOT(r);
    rows+=`<tr>${td(r.employee||'',frontBg)}${td(r.week||'',frontBg)}${td(r.type||'',frontBg)}${td(r.project||'',frontBg)}${td(r.unit||'',frontBg)}${td(n,bgByClass(totalNormalClass(n)))}${td(w,bgByClass(otClass(w)))}${td(e,'#e0f2fe')}${td(r.remark||'',frontBg)}</tr>`;
  });
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body><table>${rows}</table></body></html>`;
  const blob=new Blob(['\ufeff'+html],{type:'application/vnd.ms-excel;charset=utf-8;'}),a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='车间工时_V5.11.1_管理导出.xls';a.click();URL.revokeObjectURL(a.href)
}

function hardenMobileInputs(){
  document.querySelectorAll('input').forEach(inp=>{
    if(inp.id==='loginEmpNo'){
      inp.setAttribute('autocomplete','username');
      inp.setAttribute('autocorrect','off');
      inp.setAttribute('autocapitalize','off');
      inp.setAttribute('spellcheck','false');
      inp.removeAttribute('data-lpignore');
      inp.removeAttribute('data-form-type');
      inp.classList.remove('no-password-manager');
      return;
    }
    if(inp.id==='loginKey'){
      inp.setAttribute('type','password');
      inp.setAttribute('autocomplete','current-password');
      inp.setAttribute('autocorrect','off');
      inp.setAttribute('autocapitalize','off');
      inp.setAttribute('spellcheck','false');
      inp.removeAttribute('data-lpignore');
      inp.removeAttribute('data-form-type');
      inp.classList.remove('no-password-manager');
      return;
    }
    inp.setAttribute('autocomplete','off');
    inp.setAttribute('autocorrect','off');
    inp.setAttribute('autocapitalize','off');
    inp.setAttribute('spellcheck','false');
    inp.setAttribute('aria-autocomplete','none');
    inp.setAttribute('data-lpignore','true');
    inp.setAttribute('data-1p-ignore','true');
    inp.setAttribute('data-bwignore','true');
    inp.setAttribute('data-form-type','other');
    inp.setAttribute('data-np-autofill','false');
    if(inp.type!=='password')inp.setAttribute('inputmode',inp.type==='number'?'decimal':(inp.getAttribute('inputmode')||'text'));
    inp.classList.add('no-password-manager');
  });
}
function initLoginEnterKey(){
  ['loginEmpNo','loginKey'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el || el.dataset.enterBound==='1')return;
    el.dataset.enterBound='1';
    el.addEventListener('keydown',e=>{
      if(e.key==='Enter'){
        e.preventDefault();
        doLogin();
      }
    });
  });
}
function adjustAdminStickyHeader(){
  const app=document.getElementById('mainApp');
  const adminView=document.getElementById('adminView');
  if(!app || !adminView || adminView.style.display==='none')return;
  const header=document.querySelector('.header');
  const top=document.querySelector('#adminView .admin-top-sticky');
  const headerH=header?Math.ceil(header.getBoundingClientRect().height):0;
  const topH=top?Math.ceil(top.getBoundingClientRect().height):0;
  app.style.setProperty('--admin-table-head-top',(headerH+topH)+'px');
}
initLogin();hardenMobileInputs();initLoginEnterKey();window.addEventListener('resize',adjustAdminStickyHeader);window.addEventListener('load',adjustAdminStickyHeader);
