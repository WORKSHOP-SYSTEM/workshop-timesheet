<!-- VERSION: V6.4 FINAL - CARD PICKER TASK REMARK -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>车间工时填报系统</title>
  <style>
    :root{
      --brand:#0078d4;
      --ok:#16833b;
      --danger:#b91c1c;
      --warn:#b45309;
      --line:#d1d5db;
      --chip:#eaf4ff;
      --chip-border:#b7d5fb;
      --text:#111827;
      --sub:#6b7280;
      --shadow:0 8px 24px rgba(0,0,0,.08);
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial,"Microsoft YaHei",sans-serif;
      background:linear-gradient(180deg,#eef7ff,#f4f6f8);
      color:var(--text);
    }

    .header{
      background:var(--brand);
      color:#fff;
      text-align:center;
      padding:14px;
      font-size:22px;
      font-weight:900;
    }

    .wrap{
      max-width:1120px;
      margin:14px auto;
      padding:0 10px 24px;
    }

    .card{
      background:#fff;
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:10px 8px 8px;
    }

    .sec-title{
      margin:6px 0 6px;
      color:var(--brand);
      font-weight:900;
      border-left:4px solid var(--brand);
      padding-left:8px;
    }

/* ✅ 身份整体 */
.id-row{
  display:flex;
  background:#ffffff;              /* ✅ 白底 */
  padding:10px 8px;
  border-radius:12px;
  gap:8px;
  min-height:60px;

  /* ✅ 卡片效果 */
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
  border:1px solid #e5e7eb;
}

/* ✅ 每个块 */
.id-card{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#111;     /* ✅ 文字恢复黑色 */
}

/* ✅ 标签 */
.id-label{
  font-size:11px;
  color:#aaa;
}

/* ✅ 核心信息（大字） */
.id-value{
  font-size:20px;
  font-weight:900;
  line-height:1.2;
  margin-top:2px;
}

/* ✅ 状态颜色（醒目） */
.id-value.ok{
  color:#2ecc71;
}

.id-value.err{
  color:#ff4d4f;
}

.id-value.warn{
  color:#ffa940;
}

/* ✅ 状态加图标（高级版重点） */
.id-value.ok::before{
  content:"✅ ";
}

.id-value.err::before{
  content:"❌ ";
}

.id-value.warn::before{
  content:"⚠ ";
}

/* ✅ 管理员特殊高亮 */
.id-value.admin{
  color:#ff4d4f;
  background:rgba(255,77,79,0.15);
  padding:2px 6px;
  border-radius:6px;
}


    .tip{
      margin:12px 0;
      padding:10px 12px;
      border-radius:12px;
      background:#f8fbff;
      border:1px solid #dbeafe;
      color:#1f4b7a;
      font-size:13px;
      line-height:1.7;
    }

    .field{
      margin-bottom:12px;
    }

    .field label{
      display:block;
      font-weight:900;
      font-size:14px;
      margin-bottom:6px;
    }

    .req{
      color:#d97706;
      margin-left:4px;
    }

    .chip-grid{
      display:grid;
      gap:4px;
    }

    .week-grid{
      grid-template-columns:repeat(5,1fr);
    }

    .weekday-grid{
      grid-template-columns:repeat(7,1fr);
    }

    .task-grid{
      grid-template-columns:repeat(4,1fr);
    }

    .project-grid{
      grid-template-columns:repeat(6,1fr);
    }

    .unit-grid{
      grid-template-columns:repeat(5,1fr);
    }

    .chip{
      border:1px solid var(--chip-border);
      background:var(--chip);
      color:#174b80;
      border-radius:8px;
      padding:4px 2px;
      min-height:34px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-weight:900;
      font-size:13px;
      cursor:pointer;
      user-select:none;
      word-break:break-word;
    }
/* ✅ U类（单元） */
.unit-u{
  background:#e8f4ff;
  border:1px solid #9cc9f5;
  color:#0f4c81;
}

/* ✅ NIN类（容器） */
.unit-n{
  background:#fff4e6;
  border:1px solid #f7c58a;
  color:#b45309;
}

/* ✅ hover增强（更明显） */
.unit-u:hover{
  background:#d6ecff;
}

.unit-n:hover{
  background:#ffe8cc;
}

/* ✅ 工时类别区域放大 */
.task-grid .chip{
  font-size:15px;
  min-height:40px;
}

/* ✅ 项目号区域放大 */
.project-grid .chip{
  font-size:15px;
  min-height:42px;
}

/* ✅ 专门压缩 Week 按钮 */
.week-grid .chip{
  min-height:30px;
  padding:3px 2px;
  font-size:12px;
}
/* ✅ 星期按钮再压一点 */
.weekday-grid .chip{
  min-height:28px;
  font-size:12px;
}


/* ✅ 单元号按钮更大、更适合手机点击 */
.unit-grid .chip{
  font-size:17px;
  min-height:46px;
  line-height:1.2;
  padding:6px 4px;
  word-break:break-all;
}

/* ✅ 单元号分组标题 */
.unit-group-title{
  grid-column:1 / -1;
  font-size:12px;
  font-weight:900;
  color:#64748b;
  background:#f8fafc;
  border:1px solid #e5e7eb;
  border-radius:8px;
  padding:5px 8px;
  margin-top:4px;
}

.unit-group-title.unit-group-u{
  color:#0f4c81;
  background:#e8f4ff;
  border-color:#9cc9f5;
}

.unit-group-title.unit-group-n{
  color:#b45309;
  background:#fff4e6;
  border-color:#f7c58a;
}

/* ✅ 手机端单元号每行3个，更清楚 */
@media(max-width:560px){
  .unit-grid{
    grid-template-columns:repeat(3,1fr)!important;
  }

  .unit-grid .chip{
    font-size:18px;
    min-height:48px;
  }
}

    .chip.active{
      background:var(--brand);
      border-color:var(--brand);
      color:#fff;
      box-shadow:0 6px 16px rgba(0,120,212,.22);
    }

    .chip.disabled{
      background:#f3f4f6;
      color:#9ca3af;
      border-color:#e5e7eb;
      cursor:not-allowed;
      box-shadow:none;
    }

    .hours-box{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .hour-card{
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      background:#fcfcfd;
    }

    .hour-title{
      font-weight:900;
      font-size:14px;
      margin-bottom:8px;
    }

    .count-row{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .count-btn{
      width:42px;
      height:42px;
      border:none;
      border-radius:12px;
      background:#e8f1fb;
      color:#0f4c81;
      font-size:24px;
      font-weight:900;
      cursor:pointer;
      flex:0 0 42px;
    }

    .count-btn:disabled{
      background:#f3f4f6;
      color:#aaa;
      cursor:not-allowed;
    }

    .count-value{
      flex:1;
      text-align:center;
      font-size:24px;
      font-weight:900;
    }

    .quick-row{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .quick-btn{
      border:1px solid #dbeafe;
      background:#fff;
      color:#2563eb;
      border-radius:9px;
      padding:5px 8px;
      font-size:12px;
      font-weight:900;
      cursor:pointer;
      min-height:30px;
    }

    .quick-btn:disabled{
      background:#f3f4f6;
      color:#aaa;
      cursor:not-allowed;
    }

    .remark-template-title{
      font-size:12px;
      color:#6b7280;
      font-weight:900;
      margin:6px 0 3px;
      width:100%;
    }

    textarea,
    input{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      font-size:15px;
      font-family:inherit;
    }

    textarea{
      min-height:72px;
      resize:vertical;
    }

    .btn-area{
      margin-top:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:15px;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
    }

    .btn-primary{
      background:var(--brand);
      color:#fff;
    }

    .btn-primary:disabled{
      background:#aaa;
      cursor:not-allowed;
    }

    .btn-secondary{
      background:#e5e7eb;
      color:#111827;
    }

    .admin-panel{
      display:none;
      gap:8px;
      margin:10px 0 14px;
      grid-template-columns:repeat(3,1fr);
    }

    .admin-panel.show{
      display:grid;
    }

    .admin-btn{
      border:none;
      border-radius:12px;
      padding:12px;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
    }

    .lock-btn{
      background:#fee2e2;
      color:#991b1b;
    }

    .unlock-btn{
      background:#dcfce7;
      color:#166534;
    }
    .export-btn{
      background:#dbeafe;
      color:#1d4ed8;
    }

    .msg{
      display:none;
      margin-top:12px;
      padding:12px;
      border-radius:12px;
      font-size:14px;
      line-height:1.6;
    }

    .msg.ok{
      display:block;
      background:#ecfdf5;
      border:1px solid #bbf7d0;
      color:#166534;
    }

    .msg.err{
      display:block;
      background:#fef2f2;
      border:1px solid #fecaca;
      color:#991b1b;
    }

    .anomaly-box{
      margin:10px 0 14px;
      border:1px solid #fecaca;
      background:#fff1f2;
      color:#991b1b;
      border-radius:12px;
      padding:10px 12px;
      font-size:13px;
      line-height:1.7;
      display:none;
    }

    .anomaly-title{
      font-weight:900;
      margin-bottom:5px;
      color:#7f1d1d;
    }

    .anomaly-item{
      display:inline-block;
      background:#fee2e2;
      border:1px solid #fecaca;
      color:#991b1b;
      border-radius:999px;
      padding:4px 8px;
      margin:3px;
      font-weight:900;
    }

    .table-scroll{
      overflow-x:auto;
      border:1px solid #d7dde5;
      border-radius:12px;
      background:#fff;
      margin-bottom:12px;
    }

    table{
      border-collapse:collapse;
      min-width:100%;
      width:max-content;
      font-size:13px;
    }

    th,
    td{
      border:1px solid #444;
      padding:2px 4px;
      text-align:center;
      min-width:52px;
      height:26px;
      line-height:1.2;
    }

    th{
      background:#f3f4f6;
    }

    .cell-left{
      text-align:left;
      font-weight:900;
    }

    .warn-cell{
      background:#fee2e2!important;
      color:#991b1b!important;
      font-weight:900;
      border:1px solid #fca5a5!important;
    }
    .warn-soft{
      background:#fff3cd!important;
      color:#92400e!important;
      font-weight:900;
    }

    .locked-cell{
      background:#fef3c7;
      color:#92400e;
      font-weight:900;
    }

    .record-empty{
      padding:14px;
      border:1px dashed #cbd5e1;
      border-radius:12px;
      text-align:center;
      color:#64748b;
      background:#f8fafc;
      font-size:14px;
    }

    .small-btn{
      border:none;
      border-radius:8px;
      padding:4px 8px;
      font-size:12px;
      font-weight:900;
      margin:0;
      cursor:pointer;
      line-height:1.2;
    }
    .filter-area{
      margin:8px 0 10px;
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }
    .filter-btn::before{
  content:none !important;
}
    .filter-btn{
      width:auto;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      border:none;
      border-radius:10px;
      padding:8px 12px;
      font-size:13px;
      font-weight:900;
      cursor:pointer;
      background:#dbeafe;
      color:#1d4ed8;
    }
    .filter-btn.active{
      background:#fde68a;
      color:#92400e;
      box-shadow:0 2px 8px rgba(146,64,14,.18);
    }

    .missing-row td{  
      background:#fff1f2!important;  
      color:#991b1b!important;  
      font-weight:900;  
    }  
    .filter-area.hidden{  
      display:none!important;  
    }  
    .filter-note{
      font-size:12px;
      color:#64748b;
      font-weight:900;
    }

    .edit-btn{
      background:#e0f2fe;
      color:#075985;
    }

    .delete-btn{
      background:#fee2e2;
      color:#991b1b;
    }

    .row-lock-btn{
      background:#fee2e2;
      color:#991b1b;
    }

    .row-unlock-btn{
      background:#dcfce7;
      color:#166534;
    }

    .hidden{
      display:none!important;
    }

    .modal-mask{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      z-index:99;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:12px;
    }

    .modal{
      background:#fff;
      border-radius:18px 18px 12px 12px;
      max-width:760px;
      width:100%;
      padding:14px;
      max-height:92vh;
      overflow:auto;
    }

    .modal-title{
      font-size:18px;
      font-weight:900;
      margin-bottom:10px;
    }

    .modal-actions{
      display:flex;
      gap:10px;
    }

    .foot{
      text-align:center;
      color:#9ca3af;
      font-size:12px;
      margin-top:16px;
    }


    .integrated-action-bar{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      margin:8px 0 10px;
    }
    .integrated-note{
      color:#64748b;
      font-size:12px;
      font-weight:900;
      line-height:1.5;
    }
    .integrated-input-row td{
      background:#f8fbff!important;
      vertical-align:middle;
    }
    .integrated-input-row select,
    .integrated-input-row input{
      width:100%;
      min-width:48px;
      border:1px solid #bcd0e5;
      border-radius:7px;
      padding:5px 4px;
      font-size:12px;
      font-family:inherit;
      background:#ffffff;
    }
    .integrated-input-row input.hour-input{
      width:48px;
      text-align:center;
      font-weight:900;
      padding:4px 2px;
    }
    .integrated-input-row input.remark-input{
      min-width:130px;
    }
    .integrated-input-row select:focus,
    .integrated-input-row input:focus{
      outline:2px solid #16a34a;
      border-color:#16a34a;
    }
    .integrated-meta-cell{min-width:105px;}
    .integrated-project-cell{min-width:128px;}
    .integrated-unit-cell{min-width:82px;}
    .integrated-remark-cell{min-width:160px;}
    .integrated-total-cell{
      background:#eef6ff!important;
      font-weight:900;
      color:#111827;
    }
    .integrated-row-tag{
      display:inline-block;
      background:#dcfce7;
      color:#166534;
      border-radius:999px;
      padding:2px 6px;
      margin-bottom:4px;
      font-size:11px;
      font-weight:900;
    }
    .integrated-mini-btn{
      border:none;
      border-radius:8px;
      padding:7px 10px;
      font-size:12px;
      font-weight:900;
      cursor:pointer;
    }
    .integrated-add-btn{background:#dbeafe;color:#1d4ed8;}
    .integrated-del-btn{background:#fee2e2;color:#991b1b;margin-top:4px;}
    @media(max-width:560px){
      .integrated-input-row select,
      .integrated-input-row input{font-size:11px;padding:4px 3px;}
      .integrated-input-row input.hour-input{width:44px;}
    }
    @media(max-width:560px){
      .wrap{padding:0 8px 18px;}
      .week-grid{grid-template-columns:repeat(4,1fr);}
      .task-grid,.project-grid,.unit-grid{grid-template-columns:repeat(3,1fr);}
      .hours-box{grid-template-columns:1fr 1fr;}
      .id-row{grid-template-columns:repeat(3,1fr);}
      .id-value{font-size:15px;}
      .chip{font-size:12px;min-height:38px;}
      .admin-panel{grid-template-columns:1fr;}
      .modal-actions{flex-direction:row;}
      table{font-size:11px;}
      th,td{min-width:42px;height:28px;padding:2px;}
    }
  
    /* V5.9.3：压缩前置列 + 已提交行可直接点击输入 */
    .integrated-input-row td:nth-child(1),
    .integrated-input-row td:nth-child(2),
    .integrated-input-row td:nth-child(3),
    .integrated-input-row td:nth-child(4){padding:2px 3px!important;}
    .integrated-input-row td:nth-child(1){min-width:82px!important;max-width:96px!important;}
    .integrated-input-row td:nth-child(2){min-width:92px!important;max-width:110px!important;}
    .integrated-input-row td:nth-child(3){min-width:62px!important;max-width:78px!important;}
    .integrated-input-row td:nth-child(4){min-width:112px!important;max-width:136px!important;}
    .integrated-input-row select,
    .integrated-input-row input{padding:4px 3px!important;font-size:11px!important;}
    .integrated-input-row input.hour-input{width:42px!important;min-width:42px!important;}
    .inline-hour-input{
      width:44px;
      min-width:44px;
      border:1px solid #cbd5e1;
      border-radius:6px;
      padding:3px 2px;
      text-align:center;
      font-size:12px;
      font-weight:900;
      background:#ffffff;
      color:#111827;
    }
    .inline-hour-input:focus{
      outline:2px solid #16a34a;
      border-color:#16a34a;
      background:#f0fdf4;
    }
    .inline-hour-input.pending{
      background:#dcfce7;
      border-color:#16a34a;
    }
    .inline-edit-note{
      color:#64748b;
      font-size:12px;
      font-weight:900;
      line-height:1.5;
    }

    .integrated-remark-cell datalist{display:none;}

    /* V5.9.8：修复版 - 手机端紧凑固定列、保持滚动位置、单元/容器分组 */
    .today-badge{
      display:inline-block;
      margin-top:2px;
      padding:1px 5px;
      border-radius:999px;
      background:#0078d4;
      color:#fff;
      font-size:11px;
      font-weight:900;
      line-height:1.2;
      white-space:nowrap;
    }
    .main-timesheet-table .inline-hour-input,
    .main-timesheet-table .integrated-input-row input.hour-input{
      width:38px!important;
      min-width:38px!important;
      max-width:38px!important;
    }
    .unit-option.unit-type{background:#eaf4ff;color:#0f4c81;}
    .unit-option.container-type{background:#fff3e0;color:#8a4b00;}
    @media(max-width:760px){
      .main-timesheet-table{border-collapse:separate!important;border-spacing:0!important;table-layout:fixed!important;}
      .main-timesheet-table th,.main-timesheet-table td{white-space:nowrap!important;padding:2px!important;font-size:11px!important;}

      .main-timesheet-table thead tr:first-child th:nth-child(3),.main-timesheet-table tbody td:nth-child(3){position:sticky!important;left:104px!important;z-index:20!important;width:40px!important;min-width:40px!important;max-width:40px!important;background:#fff!important;overflow:hidden!important;text-overflow:ellipsis!important;}
      .main-timesheet-table thead tr:first-child th:nth-child(4),.main-timesheet-table tbody td:nth-child(4){position:sticky!important;left:144px!important;z-index:20!important;width:66px!important;min-width:66px!important;max-width:66px!important;background:#fff!important;overflow:hidden!important;text-overflow:ellipsis!important;}
      .main-timesheet-table thead tr:first-child th:nth-child(-n+4){z-index:30!important;background:#f5f7fa!important;}
      .main-timesheet-table tbody tr.integrated-input-row td:nth-child(-n+4){background:#f8fbff!important;}

  const msg = "身份验证码验证失败，禁止操作。";
  if(alertMode) alert(msg);
  else showMsg(msg,false);
  return false;
}
function getCurrentWeek(){
  const d = new Date();
  const tmp = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = tmp.getUTCDay() || 7;
  tmp.setUTCDate(tmp.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(tmp.getUTCFullYear(),0,1));
  const week = Math.ceil((((tmp-yearStart)/86400000)+1)/7);
  return "W" + week;
}
function weekNum(w){
  const n = Number(String(w).replace(/[^0-9]/g,""));
  return Number.isFinite(n) ? n : 0;
}
function detectLockField(row){
  if(row && Object.prototype.hasOwnProperty.call(row,"Lock Status")) return "Lock Status";
  if(row && Object.prototype.hasOwnProperty.call(row,"Locked")) return "Locked";
  return LOCK_FIELD;
}
function isLocked(record){
  const f = detectLockField(record);
  return record[f] === true || record[f] === "true" || record[f] === 1 || record[f] === "1";
}
function refreshLockedWeeks(rows){
  lockedWeeks = new Set();
  (rows || []).forEach(row=>{
    if(row && row.week && isLocked(row)) lockedWeeks.add(String(row.week));
  });
}
function isWeekLocked(week){
  return lockedWeeks.has(String(week || ""));
}
async function fetchRowsFromUrl(url){
  let all = [];
  while(url){
    const res = await fetch(url, { headers:headers() });
    if(!res.ok) throw new Error("读取记录失败：" + res.status);
    const data = await res.json();
    if(Array.isArray(data)){
      all = all.concat(data);
      break;
    }
    const rows = data.results || [];
    all = all.concat(rows);
    url = data.next || "";
  }
  return all;
}
async function fetchRows(){
  return fetchRowsFromUrl(apiUrl());
}
async function fetchRowsByWeek(week){
  // ✅ 性能优化：优先让 Baserow 只返回当前 Week；失败则自动回退全量读取后前端过滤
  try{
    const rows = await fetchRowsFromUrl(apiUrlWithParams({["filter__week__equal"]: String(week || "")}));
    return rows.filter(row=>String(row.week || "") === String(week));
  }catch(e){
    const rows = await fetchRows();
    return rows.filter(row=>String(row.week || "") === String(week));
  }
}
async function fetchAllWeekRows(week){
  return fetchRowsByWeek(week);
}
async function loadAllWeeks(){
  try{
    const rows = await fetchRows();
    if(rows.length) LOCK_FIELD = detectLockField(rows[0]);
    refreshLockedWeeks(rows);
    const set = new Set();
    rows.forEach(r=>{ if(r.week) set.add(r.week); });
    const current = getCurrentWeek();
    const currentNum = Number(current.replace("W", ""));
    // ✅ 只显示当前周及之前3周；不显示本周后面的 Week
    for(let i=-3;i<=0;i++){
      const w = currentNum + i;
      if(w > 0) set.add("W" + w);
    }
    allWeeks = Array.from(set)
      .filter(w=>weekNum(w) <= currentNum)
      .sort((a,b)=>weekNum(a)-weekNum(b));
  }catch(e){
    const current = getCurrentWeek();
    const currentNum = Number(current.replace("W", ""));
    const arr = [];
    for(let i=-4;i<=0;i++){
      const w = currentNum + i;
      if(w > 0) arr.push("W" + w);
    }
    allWeeks = arr;
    showMsg("读取历史周失败，仅显示当前周及之前4周：" + e.message, false);
  }
}

function sortUnitsByType(units){
  const uList = [];
  const nList = [];
  const other = [];

  (units || []).forEach(unit=>{
    const val = String(unit || "").toUpperCase();
    if(val.startsWith("U")){
      uList.push(unit);
    }else if(val.startsWith("NIN")){
      nList.push(unit);
    }else{
      other.push(unit);
    }
  });

  const sorter = (a,b)=>String(a).localeCompare(String(b), undefined, {numeric:true, sensitivity:"base"});
  uList.sort(sorter);
  nList.sort(sorter);
  other.sort(sorter);

  return {uList,nList,other};
}

function maxHours(field){
  if(field === "regularHours") return 8;
  if(field === "otWeekday") return 4;
  if(field === "otWeekend") return 8;
  return 8;
}
function submittedRegularHoursForCurrentDay(){
  if(!state.week || !state.weekday || !empId) return 0;
  return (currentWeekRecords || []).reduce((sum, record)=>{
    if(String(record.employeeId || "") !== String(empId)) return sum;
    if(String(record.week || "") !== String(state.week)) return sum;
    if(String(record.weekday || "") !== String(state.weekday)) return sum;
    return sum + num(record.regularHours);
  }, 0);
}
function remainingRegularHoursForCurrentDay(){
  if(!state.weekday || isWeekendDay(state.weekday)) return 0;
  const remain = 8 - submittedRegularHoursForCurrentDay();
  return Math.max(0, Math.min(8, Math.round(remain * 2) / 2));
}
function maxSubmitHours(field){
  if(field === "regularHours") return remainingRegularHoursForCurrentDay();
  return maxHours(field);
}
function changeNumber(field, delta){
  const max = maxSubmitHours(field);
  let next = Math.round((num(state[field]) + delta) * 2) / 2;
  state[field] = Math.max(0, Math.min(next, max));
  refreshDisplays();
}
function setNumber(field, value){
  const max = maxSubmitHours(field);
  state[field] = Math.max(0, Math.min(num(value), max));
  refreshDisplays();
}

function getTodayWeekday(){

function applyAutoHoursByWeekday(){
  if(!state.weekday){
    refreshDisplays();
    return;
  }

  if(isWeekendDay(state.weekday)){
    // ✅ 周末：正常工时和工作日加班自动归零，只显示周末加班
    state.regularHours = 0;
    state.otWeekday = 0;
    state.otWeekend = Math.max(0, Math.min(num(state.otWeekend), maxHours("otWeekend")));
    $("weekdayOTCard").classList.add("hidden");
    $("weekendOTCard").classList.remove("hidden");
    disableRegularInputs(true);
  }else{
    // ✅ 工作日：正常工时自动填“当天剩余可填工时”
    // 例：当天已提交3h，则默认填5h；当天已提交8h，则默认填0h。
    state.regularHours = remainingRegularHoursForCurrentDay();
    state.otWeekend = 0;
    state.otWeekday = Math.max(0, Math.min(num(state.otWeekday), maxHours("otWeekday")));
    $("weekdayOTCard").classList.remove("hidden");
    $("weekendOTCard").classList.add("hidden");
    disableRegularInputs(false);
  }

  refreshDisplays();
}

function calcEmployeeDailyTotals(rows){
  const map = {};
  Object.keys(employeeMap).forEach(id=>{
    if(id === ADMIN_ID) return;
    map[id] = {
      employeeId:id,
      employeeName:employeeMap[id],
      days:{}
    };
    weekdayOptions.forEach(day=>{
      map[id].days[day] = {
        regular:0,
        otWeekday:0,
        otWeekend:0,
        overtime:0,
        hasRecord:false
      };
    });
  });
  rows.forEach(record=>{
    const id = String(record.employeeId || "");
    if(!map[id]){
      map[id] = {
        employeeId:id,
        employeeName:record.employeeName || employeeMap[id] || id,
        days:{}
      };
      weekdayOptions.forEach(day=>{
        map[id].days[day] = {
          regular:0,
          otWeekday:0,
          otWeekend:0,
          overtime:0,
          hasRecord:false
        };
      });
    }
    const day = record.weekday;
    if(map[id].days[day]){
      map[id].days[day].regular += num(record.regularHours);
      map[id].days[day].otWeekday += num(record.otWeekday);
      map[id].days[day].otWeekend += num(record.otWeekend);
      map[id].days[day].overtime += num(record.otWeekday) + num(record.otWeekend);
      map[id].days[day].hasRecord = true;
    }
  });
  return map;
}
function calcEmployeeAnomalies(rows){
  const totals = calcEmployeeDailyTotals(rows);
  const anomalies = {};
  const checkMissingWorkdays = shouldCheckMissingWorkdays();

  Object.keys(employeeMap).forEach(id=>{
    if(id === ADMIN_ID) return;
    const item = totals[id];
    if(!item) return;

    let hasAnyRecord = false;
    weekdayOptions.forEach(day=>{
      const d = item.days[day];
      if(d && d.hasRecord) hasAnyRecord = true;
    });

    // ✅ 名单里有，但所选 Week 整周一条都没提交 = 严重异常
    if(!hasAnyRecord){
      anomalies[id] = {
        employeeId:id,
        employeeName:item.employeeName,
        days:["整周未提交"],
        levels:{},
        level:2,
        missingAllWeek:true
      };
      return;
    }

    const badDays = [];
    const levels = {};
    let maxBadLevel = 0;

    ["一","二","三","四","五"].forEach(day=>{
      const d = item.days[day];
      // ✅ 已过去的 Week：工作日没填也算严重异常；本周不提前标红未来未填日期
      if(!d || !d.hasRecord){
        if(checkMissingWorkdays){
          badDays.push(day);
          levels[day] = 2;
          maxBadLevel = 2;
        }
        return;
      }
      const regularLevel = getRegularLevel(d.regular);
      const overtimeLevel = getOTLevel(d.otWeekday);
      const level = maxLevel(regularLevel, overtimeLevel);
      if(level > 0){
        badDays.push(day);
        levels[day] = level;
        maxBadLevel = Math.max(maxBadLevel, level);
      }
    });

    if(badDays.length){
      anomalies[id] = {
        employeeId:id,
        employeeName:item.employeeName,
        days:badDays,
        levels:levels,
        level:maxBadLevel,
        missingAllWeek:false
      };
    }
  });

  return anomalies;
}

    if(String(record.weekday || "") !== String(day)) return sum;

function parseInlineKey(k){
  const parts = String(k || "").split("||");

  return num(meta && meta.originals && meta.originals[day] ? meta.originals[day][field] : 0);
}
function inlineDraftAdjustmentTotal(day, field, excludeInlineKey=""){
  return Object.keys(inlineEditDrafts || {}).reduce((sum,k)=>{
    if(String(k) === String(excludeInlineKey || "")) return sum;
    const p = parseInlineKey(k);
    if(p.day !== day || p.field !== field) return sum;
    const original = inlineOriginalValue(p.rowKey, p.day, p.field);
    const next = num(inlineEditDrafts[k]);
    return sum + (next - original);
  }, 0);
}
function integratedDraftFieldTotal(day, field, excludeRowId="", excludeField=""){
  if(typeof integratedDraftTotals !== "function") return 0;
  const totals = integratedDraftTotals(day, excludeRowId, excludeField);
  return num(totals[field]);
}
function inlineMaxValue(rowKey, day, field, originalValue){
  const limit = fieldLimit(day, field);
  const inlineKey = inlineEditKey(rowKey, day, field);
  const totalExceptThisCell = inlineDayTotal(day, field) - num(originalValue) + inlineDraftAdjustmentTotal(day, field, inlineKey) + integratedDraftFieldTotal(day, field);
  return Math.max(0, Math.min(limit, Math.round((limit - totalExceptThisCell) * 2) / 2));
}
function unifiedMaxForIntegratedCell(day, field, rowId){
  const limit = fieldLimit(day, field);
  const max = limit - inlineDayTotal(day, field) - inlineDraftAdjustmentTotal(day, field) - integratedDraftFieldTotal(day, field, rowId, field);
  return Math.max(0, Math.min(limit, Math.round(max * 2) / 2));
}
function unifiedEffectiveTotal(day, field){
  return Math.round((inlineDayTotal(day, field) + inlineDraftAdjustmentTotal(day, field) + integratedDraftFieldTotal(day, field)) * 2) / 2;
}
function validateUnifiedDraftTotals(){
  for(const day of weekdayOptions){
    for(const field of ["regular","otWeekday","otWeekend"]){
      const limit = fieldLimit(day, field);
      const total = unifiedEffectiveTotal(day, field);
      if(total > limit + 0.0001){
        const label = field === "regular" ? "正常出勤" : (field === "otWeekday" ? "工作日加班" : "周末加班");
        return "周" + day + " " + label + " 合计 " + total + "h，超过上限 " + limit + "h，请检查后再提交。";
      }
    }
  }
  return "";
}
function inlineCellInput(rowKey, day, field, originalValue, className){
  if(isAdmin()) return '<td'+className+'>'+(originalValue || "")+'</td>';
  const max = inlineMaxValue(rowKey, day, field, originalValue);
  const k = inlineEditKey(rowKey, day, field);
  const v = inlineDraftValue(rowKey, day, field, originalValue);
  const pending = Object.prototype.hasOwnProperty.call(inlineEditDrafts, k) && num(inlineEditDrafts[k]) !== num(originalValue);
  const maxed = max <= 0 && num(originalValue) <= 0;
  return '<td'+className+'><input class="inline-hour-input '+(pending?'pending ':'')+(maxed?'maxed':'')+'" type="number" step="0.5" min="0" max="'+max+'" value="'+safe(v || "")+'" placeholder="0" '+(maxed?'disabled':'')+' oninput="updateInlineEdit(\''+safe(rowKey)+'\',\''+day+'\',\''+field+'\',this.value,'+num(originalValue)+')"></td>';
}
function updateInlineEdit(rowKey, day, field, value, originalValue){
  const k = inlineEditKey(rowKey, day, field);
  const max = inlineMaxValue(rowKey, day, field, originalValue);
  let v = Math.round(num(value) * 2) / 2;
  if(v < 0) v = 0;
  if(v > max) v = max;
  inlineEditDrafts[k] = v === 0 ? "" : String(v);
  renderWeekRecordsKeepScroll();
}
function registerInlineMeta(rowKey, meta){
  inlineEditMeta[String(rowKey)] = meta;
}
function collectInlineChanges(){
  const items = [];
  Object.keys(inlineEditDrafts).forEach(k=>{
    const parts = k.split("||");
    const field = parts.pop();
    const day = parts.pop();
    const rowKey = parts.join("||");
    const meta = inlineEditMeta[rowKey];
    if(!meta) return;
    const dayMeta = meta.originals && meta.originals[day] ? meta.originals[day] : {};
    const original = num(dayMeta[field]);
    const next = num(inlineEditDrafts[k]);
    if(next === original) return;
    const recs = dayMeta[field + "Records"] || [];
    if(recs.length === 1){
      const patch = {};
      if(field === "regular") patch.regularHours = next;
      if(field === "otWeekday") patch.otWeekday = next;
      if(field === "otWeekend") patch.otWeekend = next;
      items.push({patchId:recs[0].id, patchBody:patch, weekday:day});
      return;
    }
    if(recs.length > 1){
      items.push({error:"该格子由多条原始记录合并而来，请在下方“原始记录管理”中修改具体记录。"});
      return;
    }
    if(next <= 0) return;
    const payload = {
      submitTime:new Date().toISOString(),
      employeeId:empId,
      employeeName:empName,
      week:state.week,
      weekday:day,
      task:meta.task,
      project:meta.project,
      unit:meta.unit,
      regularHours:0,
      otWeekday:0,
      otWeekend:0,
      remark:meta.remark || ""
    };
    if(field === "regular") payload.regularHours = next;
    if(field === "otWeekday") payload.otWeekday = next;
    if(field === "otWeekend") payload.otWeekend = next;
    items.push({payload});
  });
  return items;
}
async function submitInlineAndIntegratedRows(){
  if(isAdmin()) return showMsg("管理员账号不允许填报工时。",false);
  if(isSubmitting) return showMsg("正在提交中，请勿重复点击。",false);
  if(!requireAuth(false)) return;
  if(isWeekLocked(state.week)) return showMsg("该 Week 已被管理员锁定，禁止新增、修改或删除。",false);
  const inlineItems = collectInlineChanges();
  const errItem = inlineItems.find(x=>x.error);
  if(errItem) return showMsg(errItem.error, false);
  const inputItems = typeof buildIntegratedPayloads === "function" ? buildIntegratedPayloads() : [];
  const all = inlineItems.concat(inputItems);
  const totalErr = validateUnifiedDraftTotals();
  if(totalErr) return showMsg(totalErr, false);
  if(!all.length) return showMsg("请先在表格中填写需要提交的工时。", false);
  const seen = new Set();
  for(const item of all){
    if(item.patchId) continue;
    const payload = item.payload;
    const err = validatePayload(payload, "");
    if(err) return showMsg("周" + payload.weekday + "：" + err, false);
    const sig = signature(payload);
    if(seen.has(sig)) return showMsg("存在重复记录，请合并或删除重复输入。", false);
    seen.add(sig);
  }
  try{
    isSubmitting = true;
    showMsg("正在提交，请稍候…", true);
    for(const item of all){
      let res;
      if(item.patchId){
        res = await fetch(rowUrl(item.patchId), {method:"PATCH",headers:headers(),body:JSON.stringify(item.patchBody)});
        if(!res.ok) throw new Error("周" + item.weekday + " 修改失败：" + res.status);
      }else{
        res = await fetch(apiUrl(), {method:"POST",headers:headers(),body:JSON.stringify(item.payload)});
        if(!res.ok) throw new Error("周" + item.payload.weekday + " 提交失败：" + res.status);
      }
    }
    showMsg("✅ 提交成功，共提交 " + all.length + " 条记录。", true);
    inlineEditDrafts = {};
    inlineEditMeta = {};
    if(typeof integratedRows !== "undefined") integratedRows = [];
    await loadWeekRecords();
  }catch(e){
    showMsg("❌ 提交失败：" + e.message, false);
  }finally{
    isSubmitting = false;
  }
}

function buildIntegratedPayloads(){
  const items = [];
  integratedRows.forEach((row, index)=>{

    weekdayOptions.forEach(day=>{

      const weekend = isWeekendDay(day);

          week:state.week,

          regularHours:regular,
          otWeekday:otWeekday,

        }

async function submitIntegratedRows(){
  if(isAdmin()) return showMsg("管理员账号不允许填报工时。",false);
  if(isSubmitting) return showMsg("正在提交中，请勿重复点击。",false);
  if(!requireAuth(false)) return;
  if(isWeekLocked(state.week)) return showMsg("该 Week 已被管理员锁定，禁止新增、修改或删除。",false);
  const items = buildIntegratedPayloads();
  if(!items.length) return showMsg("请至少填写一个工时格。", false);
  const seen = new Set();
  for(const item of items){
    const err = validatePayload(item.payload, "");
    if(err) return showMsg("填写行 " + item.rowIndex + " / 周" + item.payload.weekday + "：" + err, false);
    const sig = signature(item.payload);
    if(seen.has(sig)) return showMsg("填写行 " + item.rowIndex + " / 周" + item.payload.weekday + "：存在重复记录，请合并或删除重复输入。", false);
    seen.add(sig);
  }
  try{
    isSubmitting = true;
    showMsg("正在提交，请稍候…", true);
    for(const item of items){
      const res = await fetch(apiUrl(), {method:"POST",headers:headers(),body:JSON.stringify(item.payload)});
      if(!res.ok) throw new Error("填写行 " + item.rowIndex + " / 周" + item.payload.weekday + " 提交失败：" + res.status);
    }
    showMsg("✅ 提交成功，共提交 " + items.length + " 条记录。", true);
    integratedRows = [createIntegratedRow()];
    await loadWeekRecords();
  }catch(e){
    showMsg("❌ 提交失败：" + e.message, false);
  }finally{
    isSubmitting = false;
  }
}
function dayTotals(week, day, excludeRowId){
  const totals = {regular:0,otWeekday:0,otWeekend:0};
  currentWeekRecords.forEach(record=>{
    if(String(record.id) === String(excludeRowId || "")) return;
    if(String(record.employeeId) !== String(empId)) return;
    if(record.week !== week || record.weekday !== day) return;
    totals.regular += num(record.regularHours);
    totals.otWeekday += num(record.otWeekday);
    totals.otWeekend += num(record.otWeekend);
  });
  return totals;
}
function hasLockedSameDay(payload){
  if(isAdmin()) return false;
  return currentWeekRecords.some(record=>String(record.employeeId) === String(empId) && String(record.week) === String(payload.week) && String(record.weekday) === String(payload.weekday) && isLocked(record));
}
function signature(payload){
  return JSON.stringify({employeeId:payload.employeeId,week:payload.week,weekday:payload.weekday,task:payload.task,project:payload.project,unit:payload.unit,regularHours:num(payload.regularHours),otWeekday:num(payload.otWeekday),otWeekend:num(payload.otWeekend),remark:String(payload.remark || "").trim()});
}
function duplicate(signatureText, excludeRowId){
  return currentWeekRecords.some(record=>String(record.id) !== String(excludeRowId || "") && String(record.employeeId) === String(empId) && signature(record) === signatureText);
}
function validatePayload(payload, excludeRowId){
  if(isAdmin()) return "管理员账号不允许填报或修改工时数据。";
  if(isWeekLocked(payload.week)) return "该 Week 已被管理员锁定，禁止新增、修改或删除。";
  if(!payload.employeeId || !employeeMap[payload.employeeId]) return "未识别到有效员工信息，请使用员工专属二维码扫码。";
  if(!payload.week) return "请选择 Week。";
  if(!payload.weekday) return "请选择星期。";
  if(!payload.task) return "请选择工时类别。";
if(!payload.remark || !payload.remark.trim()) return "备注不能为空，请填写或选择备注。";
  if(needsProjectByTask(payload.task) && !payload.project) return "请选择项目号。";
  if(needsUnitByTask(payload.task) && !payload.unit) return "请选择单元号。";
  if(hasLockedSameDay(payload)) return "当天数据已被管理员锁定，不能新增、修改或删除。";
  const regular = num(payload.regularHours);
  const otWeekday = num(payload.otWeekday);
  const otWeekend = num(payload.otWeekend);
  const weekend = isWeekendDay(payload.weekday);
  if(regular < 0 || regular > 8) return "正常工时单条记录必须在 0~8 小时之间。";
  if(otWeekday < 0 || otWeekday > 4) return "工作日加班单条记录必须在 0~4 小时之间。";
  if(otWeekend < 0 || otWeekend > 8) return "周末加班单条记录必须在 0~8 小时之间。";
  if(weekend && (regular !== 0 || otWeekday !== 0)) return "周末不能填写正常工时或工作日加班。";
  if(!weekend && otWeekend !== 0) return "工作日不能填写周末加班。";
  const totals = dayTotals(payload.week, payload.weekday, excludeRowId);
  if(totals.regular + regular > 8) return "提交后当天正常工时汇总为 " + (totals.regular + regular) + "h，超过 8h，禁止提交。";
  if(!weekend && totals.otWeekday + otWeekday > 4) return "提交后当天工作日加班汇总为 " + (totals.otWeekday + otWeekday) + "h，超过 4h，禁止提交。";
  if(weekend && totals.otWeekend + otWeekend > 8) return "提交后当天周末加班汇总为 " + (totals.otWeekend + otWeekend) + "h，超过 8h，禁止提交。";
  if(duplicate(signature(payload), excludeRowId)) return "已存在一条完全相同的记录，无需重复提交。";
  return "";
}

  if(isLocked(record)) return showMsg("该记录已被管理员锁定，不能修改。",false);
  editingRowId = String(id);
  editState = {week:record.week || state.week,weekday:record.weekday || "",task:record.task || "",project:record.project || "",unit:record.unit || "",regularHours:num(record.regularHours),otWeekday:num(record.otWeekday),otWeekend:num(record.otWeekend),remark:record.remark || ""};
  normalizeEditState();
  $("editRemark").value = editState.remark;
  renderEditAll();
  renderRemarkQuick("edit");
  $("editModal").classList.remove("hidden");
}
function closeEditModal(){
  editingRowId = "";
  $("editModal").classList.add("hidden");
}
async function saveEdit(){
  if(isAdmin()) return alert("管理员账号不允许修改工时明细。");
  if(!editingRowId) return alert("未找到要修改的记录。");
  if(!requireAuth(true)) return;
  const oldRecord = currentWeekRecords.find(x=>String(x.id)===String(editingRowId));
  if(oldRecord && String(oldRecord.employeeId) !== String(empId)) return alert("非法操作：只能修改自己的记录。");
  if(isWeekLocked((oldRecord && oldRecord.week) || editState.week)) return alert("该 Week 已被管理员锁定，禁止新增、修改或删除。");
  if(oldRecord && isLocked(oldRecord)) return alert("该记录已被管理员锁定，不能修改。");
  normalizeEditState();
  const weekend = isWeekendDay(editState.weekday);
  const payload = {employeeId:empId,employeeName:empName,week:editState.week,weekday:editState.weekday,task:editState.task,project:needsProjectByTask(editState.task)?editState.project:"",unit:needsUnitByTask(editState.task)?editState.unit:"",regularHours:weekend?0:num(editState.regularHours),otWeekday:weekend?0:num(editState.otWeekday),otWeekend:weekend?num(editState.otWeekend):0,remark:$("editRemark").value || ""};
  const err = validatePayload(payload, editingRowId);
  if(err) return alert(err);
  if(!confirm("确认修改这条记录吗？")) return;
  try{
    const res = await fetch(rowUrl(editingRowId), {method:"PATCH",headers:headers(),body:JSON.stringify(payload)});
    if(!res.ok) throw new Error(res.status);
    closeEditModal();
    showMsg("✅ 修改成功。",true);
    await loadWeekRecords();
  }catch(e){
    alert("❌ 修改失败：" + e.message);
  }
}
async function deleteRecord(id){
  if(isAdmin()) return showMsg("管理员账号不允许删除员工工时，只能锁定或解锁。",false);
  if(!requireAuth(false)) return;
  const record = currentWeekRecords.find(x=>String(x.id)===String(id));
  if(!record) return showMsg("未找到要删除的记录。",false);
  if(String(record.employeeId) !== String(empId)) return showMsg("非法操作：只能删除自己的记录。",false);
  if(isWeekLocked(record.week || state.week)) return showMsg("该 Week 已被管理员锁定，禁止新增、修改或删除。",false);
  if(isLocked(record)) return showMsg("该记录已被管理员锁定，不能删除。",false);
  if(!confirm("确认删除这条记录吗？\n\n星期："+(record.weekday||"")+"\n工时类别："+(record.task||"")+"\n项目号："+(record.project||"")+"\n单元号："+(record.unit||"")+"\n正常工时："+num(record.regularHours)+"h\n工作日加班："+num(record.otWeekday)+"h\n周末加班："+num(record.otWeekend)+"h")) return;
  if(!confirm("删除后无法在本页面恢复。请再次确认：是否永久删除？")) return;
  try{
    const res = await fetch(rowUrl(id), {method:"DELETE",headers:headers(false)});
    if(!res.ok) throw new Error(res.status);
    showMsg("✅ 删除成功。",true);
    await loadWeekRecords();
  }catch(e){
    showMsg("❌ 删除失败：" + e.message,false);
  }
}

function excelEscape(value){
  return String(value ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
function excelCell(value, className=""){
  return '<td class="' + className + '">' + excelEscape(value) + '</td>';
}
function excelHeader(value){
  return '<th>' + excelEscape(value) + '</th>';
}
function exportDateText(){
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  const hh = String(d.getHours()).padStart(2,"0");
  const mi = String(d.getMinutes()).padStart(2,"0");
  return yyyy + mm + dd + "_" + hh + mi;
}
function buildSelectedWeekExportSummary(rows){
  const result = {};

  // ✅ 管理员导出：先把名单内所有员工放进去，整周未提交也会导出
  Object.keys(employeeMap).forEach(id=>{
    if(id === ADMIN_ID) return;
    result[id] = {
      employeeId:id,
      employeeName:employeeMap[id],
      days:{},
      totalRegular:0,
      totalOtWeekday:0,
      totalOtWeekend:0,
      anomaly:[],
      levels:{},
      level:0,
      hasAnyRecord:false
    };
    weekdayOptions.forEach(day=>{
      result[id].days[day] = {regular:0, otWeekday:0, otWeekend:0, hasRecord:false};
    });
  });

  rows.forEach(record=>{
    const id = String(record.employeeId || "");
    const name = record.employeeName || employeeMap[id] || id;
    if(!result[id]){
      result[id] = {
        employeeId:id,
        employeeName:name,
        days:{},
        totalRegular:0,
        totalOtWeekday:0,
        totalOtWeekend:0,
        anomaly:[],
        levels:{},
        level:0,
        hasAnyRecord:false
      };
      weekdayOptions.forEach(day=>{
        result[id].days[day] = {regular:0, otWeekday:0, otWeekend:0, hasRecord:false};
      });
    }
    result[id].hasAnyRecord = true;
    const day = record.weekday;
    if(result[id].days[day]){
      result[id].days[day].regular += num(record.regularHours);
      result[id].days[day].otWeekday += num(record.otWeekday);
      result[id].days[day].otWeekend += num(record.otWeekend);
      result[id].days[day].hasRecord = true;
    }
    result[id].totalRegular += num(record.regularHours);
    result[id].totalOtWeekday += num(record.otWeekday);
    result[id].totalOtWeekend += num(record.otWeekend);
  });

  Object.keys(result).forEach(id=>{
    const emp = result[id];
    if(!emp.hasAnyRecord){
      emp.anomaly.push("整周未提交");
      emp.level = 2;
      return;
    }
    ["一","二","三","四","五"].forEach(day=>{
      const d = emp.days[day];
      if(!d || !d.hasRecord) return;
      const regularLevel = getRegularLevel(d.regular);
      const otLevel = getOTLevel(d.otWeekday);
      const dayLevel = maxLevel(regularLevel, otLevel);
      if(dayLevel > 0){
        emp.levels[day] = dayLevel;
        emp.level = Math.max(emp.level, dayLevel);
      }
      if(regularLevel > 0) emp.anomaly.push("周" + day + "正常=" + d.regular + "h" + (regularLevel === 1 ? "（轻微）" : "（严重）"));
      if(otLevel > 0) emp.anomaly.push("周" + day + "工作日加班=" + d.otWeekday + "h" + (otLevel === 1 ? "（轻微）" : "（严重）"));
    });
  });
  return result;
}
function exportSelectedWeekExcel(){
  if(!isAdmin()){
    alert("只有管理员可以导出所选 Week 数据。");
    return;
  }
  if(!state.week){
    alert("请先选择 Week。");
    return;
  }

  const rows = currentWeekRecords || [];
  const adminAnomalies = calcEmployeeAnomalies(rows);
  const summary = {};
  weekdayOptions.forEach(day=>summary[day]={regular:0,overtime:0});
  const grouped = new Map();
  let totalRegular = 0;
  let totalEveningOt = 0;
  let totalWeekendOt = 0;

  // ✅ 与页面“本周已提交工时明细”完全一致的分组：员工 + 工时类别 + 项目号 + 单元号 + 备注
  rows.forEach(record=>{
    const empPart = String(record.employeeId || "") + "||" + String(record.employeeName || employeeMap[record.employeeId] || "");
    const key = [empPart, record.task || "", record.project || "", record.unit || "", String(record.remark || "").trim()].join("||");
    if(!grouped.has(key)){
      const days = {};
      weekdayOptions.forEach(day=>days[day]={regular:0,overtime:0});
      grouped.set(key,{
        employeeId:record.employeeId || "",
        employeeName:record.employeeName || employeeMap[record.employeeId] || "",
        task:record.task || "",
        project:record.project || "",
        unit:record.unit || "",
        remark:String(record.remark || "").trim(),
        days:days,
        totalRegular:0,
        totalEveningOt:0,
        totalWeekendOt:0,
        missingAllWeek:false
      });
    }
    const row = grouped.get(key);
    const day = record.weekday;
    const regular = num(record.regularHours);
    const overtime = num(record.otWeekday) + num(record.otWeekend);
    if(row.days[day]){
      row.days[day].regular += regular;
      row.days[day].overtime += overtime;
    }
    row.totalRegular += regular;
    row.totalEveningOt += num(record.otWeekday);
    row.totalWeekendOt += num(record.otWeekend);
    if(summary[day]){
      summary[day].regular += regular;
      summary[day].overtime += overtime;
    }
    totalRegular += regular;
    totalEveningOt += num(record.otWeekday);
    totalWeekendOt += num(record.otWeekend);
  });

  // ✅ 整周未提交保持页面同款红色行
  Object.keys(adminAnomalies).forEach(id=>{
    const a = adminAnomalies[id];
    if(!a || !a.missingAllWeek) return;
    const key = String(id) + "||__MISSING_ALL_WEEK__";
    if(grouped.has(key)) return;
    const days = {};
    weekdayOptions.forEach(day=>days[day]={regular:"",overtime:""});
    grouped.set(key,{
      employeeId:id,
      employeeName:a.employeeName,
      task:"未提交",
      project:"",
      unit:"",
      remark:"整周未提交",
      days:days,
      totalRegular:0,
      totalEveningOt:0,
      totalWeekendOt:0,
      missingAllWeek:true
    });
  });

  function excelClassForLevel(level){
    level = num(level);
    if(level === 1) return "soft";
    if(level >= 2) return "bad";
    return "";
  }
  function exportCell(value, className=""){
    return '<td class="' + className + '">' + excelEscape(value) + '</td>';
  }

  let html = '';
  html += '<!DOCTYPE html><html><head><meta charset="UTF-8">';
  html += '<style>';
  html += 'body{font-family:Arial,"Microsoft YaHei",sans-serif;color:#111827;margin:0;}';
  html += 'table{border-collapse:collapse;font-size:12px;}';
  // ✅ 按你截图：黑色细线、不加粗、颜色和页面接近
  html += 'th,td{border:1px solid #000000;padding:3px 5px;text-align:center;font-weight:400;white-space:nowrap;}';
  html += 'th{background:#ffffff;font-weight:400;}';
  html += '.title{font-size:16px;font-weight:400;text-align:left;background:#ffffff;}';
  html += '.subTitle{font-size:12px;font-weight:400;text-align:left;background:#ffffff;}';
  html += '.left{text-align:left;}';
  html += '.soft{background:#fff2cc;color:#7c4a03;font-weight:400;}';
  html += '.bad{background:#ffdede;color:#b91c1c;font-weight:400;}';
  html += '.missing td{background:#fff1f2;color:#b91c1c;font-weight:400;}';
  html += '</style></head><body>';
  html += '<table>';
  html += '<tr><td class="title" colspan="21">车间工时明细 - ' + excelEscape(state.week) + '</td></tr>';
  html += '<tr><td class="subTitle" colspan="21">导出时间：' + excelEscape(new Date().toLocaleString()) + '</td></tr>';
  html += '<tr><td colspan="21"></td></tr>';

  html += '<tr>';
  html += '<th rowspan="2">员工</th><th rowspan="2">工号</th><th rowspan="2">工时类别</th><th rowspan="2">项目号</th><th rowspan="2">单元号</th><th rowspan="2">备注</th>';
  ['周一','周二','周三','周四','周五'].forEach(day=>{ html += '<th colspan="2">' + day + '</th>'; });
  html += '<th>周六</th><th>周日</th><th colspan="3">汇总</th></tr>';
  html += '<tr>';
  for(let i=0;i<5;i++) html += '<th>正常<br>出勤</th><th>实际<br>加班</th>';
  html += '<th>实际<br>加班</th><th>实际<br>加班</th><th>正常<br>出勤</th><th>实际晚<br>上加班</th><th>实际周<br>末加班</th></tr>';

  Array.from(grouped.values()).sort((a,b)=>{
    const am = a.missingAllWeek ? 1 : 0;
    const bm = b.missingAllWeek ? 1 : 0;
    if(am !== bm) return bm - am;
    return String(a.employeeName || "").localeCompare(String(b.employeeName || ""), "zh-Hans-CN");
  }).forEach(row=>{
    const anomaly = adminAnomalies[String(row.employeeId || "")];
    if(onlyShowAnomaly && !anomaly) return;
    const empLevel = anomaly ? anomaly.level : 0;
    const empClass = excelClassForLevel(empLevel);
    html += '<tr' + (row.missingAllWeek ? ' class="missing"' : '') + '>';
    html += exportCell(row.employeeName, empClass);
    html += exportCell(row.employeeId, empClass);
    html += exportCell(row.task, row.missingAllWeek ? "bad left" : "left");
    html += exportCell(row.project);
    html += exportCell(row.unit);
    html += exportCell(row.remark, row.missingAllWeek ? "bad left" : "left");
    ['一','二','三','四','五'].forEach(day=>{
      const level = anomaly && anomaly.levels ? (anomaly.levels[day] || 0) : 0;
      const cls = excelClassForLevel(level);
      html += exportCell(row.days[day].regular || "", cls);
      html += exportCell(row.days[day].overtime || "", cls);
    });
    html += exportCell(row.days['六'].overtime || "");
    html += exportCell(row.days['日'].overtime || "");
    html += exportCell(row.totalRegular || "");
    html += exportCell(row.totalEveningOt || "");
    html += exportCell(row.totalWeekendOt || "");
    html += '</tr>';
  });

  html += '<tr><td></td><td></td><td></td><td></td><td></td><td>汇总</td>';
  ['一','二','三','四','五'].forEach(day=>{
    html += exportCell(summary[day].regular || 0);
    html += exportCell(summary[day].overtime || 0);
  });
  html += exportCell(summary['六'].overtime || 0);
  html += exportCell(summary['日'].overtime || 0);
  html += exportCell(totalRegular || 0);
  html += exportCell(totalEveningOt || 0);
  html += exportCell(totalWeekendOt || 0);
  html += '</tr></table></body></html>';

  // ✅ 关键：改成 .html，不再把HTML伪装成 .xls，Excel 打开不会再弹“格式和扩展名不匹配”提醒
  const blob = new Blob(["\ufeff" + html], {type:"text/html;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "车间工时明细_" + state.week + "_" + exportDateText() + ".html";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

  $("adminPanel").classList.remove("show");

  renderRemarkQuick();
