/* ===== V5.1 Siemens-inspired MES UI Override - clean visual layer only ===== */
:root{
  --s-bg:#f3f7f8;
  --s-panel:#ffffff;
  --s-panel-2:#f7fbfb;
  --s-line:#d5e0e3;
  --s-line-2:#b9c9ce;
  --s-text:#263238;
  --s-muted:#6b7c83;
  --s-dark:#002b36;
  --s-head:#12343b;
  --s-head-2:#174650;
  --s-teal:#00a0a8;
  --s-teal-dark:#007c83;
  --s-teal-soft:#e1f7f8;
  --s-cyan:#00d4d8;
  --s-green:#10a56f;
  --s-red:#d64545;
  --s-yellow:#f2a900;
}
html,body{background:var(--s-bg)!important;color:var(--s-text)!important;font-family:"Segoe UI","Microsoft YaHei",Arial,sans-serif!important;}
body:before{content:"";position:fixed;left:0;right:0;top:0;height:4px;background:linear-gradient(90deg,#003b46,var(--s-teal),#62d8d9);z-index:9999;}
.card{background:var(--s-panel)!important;border:1px solid var(--s-line)!important;border-radius:6px!important;box-shadow:0 1px 5px rgba(0,43,54,.08)!important;}
.info{border-left:5px solid var(--s-teal)!important;min-height:34px!important;display:flex!important;align-items:center!important;gap:10px!important;background:linear-gradient(90deg,#fff,#f3fbfb)!important;}
.badge{background:var(--s-teal-soft)!important;color:#006b70!important;border:1px solid #a3e6e8!important;border-radius:999px!important;font-weight:800!important;}
.week-section{background:var(--s-panel)!important;border:1px solid var(--s-line)!important;border-radius:6px!important;padding:8px!important;margin:8px 0!important;}
.week-title{font-weight:900!important;color:#004b52!important;border-left:4px solid var(--s-teal)!important;padding-left:7px!important;letter-spacing:.4px!important;}
.week-card-row{gap:6px!important;}
.week-card,.week-card button,.week-card-row button{border:1px solid #a8cfd2!important;background:linear-gradient(180deg,#ffffff,#eefafa)!important;color:#00565d!important;border-radius:5px!important;font-weight:800!important;box-shadow:none!important;}
.week-card.current,.week-card.current button,.week-card-row button.current{background:linear-gradient(180deg,#00b8c1,#008c94)!important;color:white!important;border-color:#007980!important;}
.bar{display:flex!important;align-items:center!important;gap:6px!important;flex-wrap:wrap!important;padding:8px!important;border-left:5px solid var(--s-teal)!important;background:linear-gradient(90deg,#ffffff,#f4fbfb)!important;}
button,.btn,.action-btn,.logout-btn{height:30px!important;min-height:30px!important;padding:0 12px!important;border-radius:5px!important;border:1px solid #a9c3c8!important;background:linear-gradient(180deg,#ffffff,#eef3f4)!important;color:#163238!important;font-weight:800!important;box-shadow:none!important;}
button:hover,.btn:hover,.action-btn:hover{background:linear-gradient(180deg,#f1ffff,#dff6f7)!important;border-color:var(--s-teal)!important;color:#005e64!important;}
button:active{transform:translateY(1px)!important;}
.logout-btn{background:linear-gradient(180deg,#fff,#f8e9e9)!important;border-color:#e3b1b1!important;color:#9f1f1f!important;}
.autosave-badge{border:1px solid #a7e7d1!important;background:#ecfff8!important;color:#087a58!important;border-radius:999px!important;height:28px!important;display:inline-flex!important;align-items:center!important;padding:0 10px!important;font-weight:800!important;}
.autosave-dot{background:var(--s-green)!important;}
.stat-grid{display:grid!important;grid-template-columns:repeat(5,minmax(105px,1fr))!important;gap:8px!important;margin:0!important;}
.stat-card{background:linear-gradient(180deg,#ffffff,#f2fbfb)!important;border:1px solid var(--s-line)!important;border-top:3px solid var(--s-teal)!important;border-radius:6px!important;padding:9px 8px!important;text-align:center!important;box-shadow:0 1px 3px rgba(0,43,54,.06)!important;}
.stat-num{font-size:20px!important;line-height:22px!important;font-weight:900!important;color:#005e64!important;}
.stat-label{font-size:11px!important;color:var(--s-muted)!important;margin-top:4px!important;font-weight:800!important;letter-spacing:.2px!important;}
.notice{color:#667b80!important;font-size:12px!important;}
.table-wrap{overflow:auto!important;max-height:calc(100vh - 260px)!important;border-radius:6px!important;padding:0!important;border:1px solid var(--s-line)!important;}
.work-table{border-collapse:separate!important;border-spacing:0!important;width:100%!important;background:white!important;font-size:12px!important;}
.work-table th{position:sticky!important;top:0!important;z-index:5!important;background:linear-gradient(180deg,var(--s-head-2),var(--s-head))!important;color:#f4ffff!important;border-right:1px solid #28545d!important;border-bottom:1px solid #0d2a30!important;height:34px!important;padding:5px 7px!important;font-weight:900!important;white-space:nowrap!important;}
.work-table td{border-right:1px solid #dce7ea!important;border-bottom:1px solid #dce7ea!important;height:30px!important;padding:4px 7px!important;white-space:nowrap!important;background:#fff!important;}
.work-table tbody tr:nth-child(even) td{background:#f8fcfc!important;}
.work-table tbody tr:hover td{background:#e2f8f9!important;}
.work-table td:first-child,.work-table th:first-child{position:sticky!important;left:0!important;z-index:4!important;box-shadow:1px 0 0 var(--s-line)!important;}
.work-table th:first-child{z-index:7!important;background:linear-gradient(180deg,#092f38,#06252c)!important;}
.work-table td:first-child{background:#f3fbfb!important;font-weight:800!important;color:#14383f!important;}
.time-cell,input,select{height:26px!important;border:1px solid #b7c9ce!important;border-radius:4px!important;background:#fff!important;color:#172a2f!important;font-size:12px!important;box-shadow:none!important;}
.time-cell:focus,input:focus,select:focus{outline:2px solid rgba(0,160,168,.23)!important;border-color:var(--s-teal)!important;}
.day-ok{background:#e8fbf3!important;color:#087a58!important;font-weight:900!important;}
.day-warn,.warn{background:#fff5d6!important;color:#9a6500!important;font-weight:900!important;}
.day-error,.error{background:#ffe7e7!important;color:#b42318!important;font-weight:900!important;}
.empty{color:#667b80!important;text-align:center!important;padding:20px!important;background:#f8fafb!important;}
.modal-panel{border-radius:8px!important;border:1px solid var(--s-line)!important;box-shadow:0 18px 42px rgba(0,43,54,.22)!important;}
.modal-head{background:linear-gradient(180deg,var(--s-head-2),var(--s-head))!important;color:white!important;border-radius:8px 8px 0 0!important;}
.choice-grid button,.unit-tools button{height:auto!important;min-height:30px!important;}
@media(max-width:760px){
  .stat-grid{grid-template-columns:repeat(2,1fr)!important;}
  .bar{gap:5px!important;}
  button,.btn,.action-btn,.logout-btn{height:28px!important;padding:0 9px!important;font-size:12px!important;}
  .table-wrap{max-height:calc(100vh - 230px)!important;}
  .work-table{font-size:11px!important;}
  .work-table td,.work-table th{padding:3px 5px!important;height:28px!important;}
}
</style>

function colgroup(extra=false){return `<colgroup>${extra?'<col style="width:58px"><col style="width:58px"><col style="width:48px">':''}<col class="c-type"><col class="c-project"><col class="c-unit"><col class="c-remark">${'<col class="c-time">'.repeat(12)}<col class="c-sum"><col class="c-sum"><col class="c-sum">${extra?'':'<col class="c-action"><col class="c-action">'}</colgroup>`}function tableHead(extra=false){return`${colgroup(extra)}<thead><tr>${extra?"<th rowspan='2'>员工</th><th rowspan='2'>工号</th><th rowspan='2'>周数</th>":''}<th rowspan="2">工时类别</th><th rowspan="2">项目号</th><th rowspan="2">单元号</th><th rowspan="2">备注</th><th colspan="2">周一</th><th colspan="2">周二</th><th colspan="2">周三</th><th colspan="2">周四</th><th colspan="2">周五</th><th rowspan="2">周六<br>加班</th><th rowspan="2">周日<br>加班</th><th colspan="3">汇总</th>${extra?'':"<th rowspan='2'>编辑</th><th rowspan='2'>删除</th>"}</tr><tr class="sub"><th>正常</th><th>加班</th><th>正常</th><th>加班</th><th>正常</th><th>加班</th><th>正常</th><th>加班</th><th>正常</th><th>加班</th><th>正常</th><th>工作日</th><th>周末</th></tr></thead>`}function rowCells(r,i,admin=false){const tn=normalTotal(r),tw=weekdayOT(r),te=weekendOT(r);return`${admin?`<td>${r.employee||''}</td><td>${r.empNo||''}</td><td>${r.week||''}</td>`:''}<td>${r.type||''}</td><td>${r.project||''}</td><td title="${r.unit||''}">${r.unit||''}</td><td>${r.remark||''}</td>${timeInputCell(i,'monN',r.monN,admin,r)}${timeInputCell(i,'monO',r.monO,admin,r)}${timeInputCell(i,'tueN',r.tueN,admin,r)}${timeInputCell(i,'tueO',r.tueO,admin,r)}${timeInputCell(i,'wedN',r.wedN,admin,r)}${timeInputCell(i,'wedO',r.wedO,admin,r)}${timeInputCell(i,'thuN',r.thuN,admin,r)}${timeInputCell(i,'thuO',r.thuO,admin,r)}${timeInputCell(i,'friN',r.friN,admin,r)}${timeInputCell(i,'friO',r.friO,admin,r)}${timeInputCell(i,'satO',r.satO,admin,r)}${timeInputCell(i,'sunO',r.sunO,admin,r)}<td class="${admin?'':totalNormalClass(tn)}">${tn}</td><td>${tw}</td><td>${te}</td>${admin?'':`<td><button class="action-btn" onclick="editRow(${i})">编辑</button></td><td><button class="action-btn danger" onclick="delRow(${i})">删除</button></td>`}`}function renderEmp(){const t=document.getElementById('empTable');let b='<tbody>';if(!records.length)b+=`<tr><td colspan="23" class="empty">暂无数据，请点击“新增一行”</td></tr>`;records.forEach((r,i)=>b+=`<tr>${rowCells(r,i,false)}</tr>`);b+='</tbody>';t.innerHTML=tableHead(false)+b+sumFoot(false)}function getFilteredAdminList(){return records}
function renderAdminStats(list=records){const box=document.getElementById('adminStats');if(!box)return;const empSet=new Set(list.map(r=>r.empNo).filter(Boolean));let n=0,w=0,e=0;list.forEach(r=>{n+=normalTotal(r);w+=weekdayOT(r);e+=weekendOT(r)});const days=['monN','tueN','wedN','thuN','friN'];let abnormal=0;empSet.forEach(emp=>{days.forEach(k=>{const t=list.filter(r=>r.empNo===emp).reduce((a,r)=>a+num(r[k]),0);if(t!==0&&t!==8)abnormal++})});box.innerHTML=`<div class="stat-grid"><div class="stat-card"><div class="stat-num">${empSet.size}</div><div class="stat-label">员工数</div></div><div class="stat-card"><div class="stat-num">${list.length}</div><div class="stat-label">明细行</div></div><div class="stat-card"><div class="stat-num">${n}</div><div class="stat-label">正常工时</div></div><div class="stat-card"><div class="stat-num">${w}</div><div class="stat-label">工作日加班</div></div><div class="stat-card"><div class="stat-num">${e}</div><div class="stat-label">周末加班</div></div></div><div class="notice" style="margin-top:7px">异常天数：${abnormal}（按员工+日期校验，不按全员汇总误判）</div>`}function renderAdmin(){const list=getFilteredAdminList();let b='<tbody>';if(!list.length)b+=`<tr><td colspan="26" class="empty">没有符合条件的数据</td></tr>`;list.forEach((r,i)=>b+=`<tr>${rowCells(r,i,true)}</tr>`);b+='</tbody>';document.getElementById('adminTable').innerHTML=tableHead(true)+b+sumFoot(true,list);renderAdminStats(list)}function sumFoot(admin=false,list=records){const s={monN:0,monO:0,tueN:0,tueO:0,wedN:0,wedO:0,thuN:0,thuO:0,friN:0,friO:0,satO:0,sunO:0,n:0,w:0,e:0};list.forEach(r=>{['monN','monO','tueN','tueO','wedN','wedO','thuN','thuO','friN','friO','satO','sunO'].forEach(k=>s[k]+=num(r[k]));s.n+=normalTotal(r);s.w+=weekdayOT(r);s.e+=weekendOT(r)});const clsN=k=>admin?'':((isFutureKey(k)&&s[k]===0)?'day-ok':normalClass(s[k])),clsO=k=>admin?'':((isFutureKey(k)&&s[k]===0)?'day-ok':otClass(s[k]));return`<tfoot><tr>${admin?'<td></td><td></td><td></td>':''}<td></td><td></td><td></td><td>汇总</td><td class="${clsN('monN')}">${s.monN}</td><td class="${clsO('monO')}">${s.monO}</td><td class="${clsN('tueN')}">${s.tueN}</td><td class="${clsO('tueO')}">${s.tueO}</td><td class="${clsN('wedN')}">${s.wedN}</td><td class="${clsO('wedO')}">${s.wedO}</td><td class="${clsN('thuN')}">${s.thuN}</td><td class="${clsO('thuO')}">${s.thuO}</td><td class="${clsN('friN')}">${s.friN}</td><td class="${clsO('friO')}">${s.friO}</td><td>${s.satO}</td><td>${s.sunO}</td><td class="${admin?'':totalNormalClass(s.n)}">${s.n}</td><td>${s.w}</td><td>${s.e}</td>${admin?'':'<td></td><td></td>'}</tr></tfoot>`}
let autoRefreshTimer=null;
async function reloadData(){try{await loadData();renderEmp();if(document.getElementById('adminView').style.display!=='none'){renderAdmin()}const now=new Date(),hh=String(now.getHours()).padStart(2,"0"),mm=String(now.getMinutes()).padStart(2,"0"),ss=String(now.getSeconds()).padStart(2,"0");document.querySelectorAll('.autosaveText').forEach(e=>e.innerText=`已刷新 ${hh}:${mm}:${ss}`)}catch(e){console.error(e);toast('刷新失败，请检查云函数 timesheetApi')}}
function startAutoRefresh(){stopAutoRefresh();autoRefreshTimer=setInterval(async()=>{try{if(document.getElementById('adminView').style.display==='none')return;if(document.activeElement&&['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName))return;await loadData();renderAdmin();const now=new Date(),hh=String(now.getHours()).padStart(2,"0"),mm=String(now.getMinutes()).padStart(2,"0"),ss=String(now.getSeconds()).padStart(2,"0");document.querySelectorAll('.autosaveText').forEach(e=>e.innerText=`已自动刷新 ${hh}:${mm}:${ss}`)}catch(e){console.error('自动刷新失败',e)}},30000)}
function stopAutoRefresh(){if(autoRefreshTimer){clearInterval(autoRefreshTimer);autoRefreshTimer=null}}function showEmp(){document.getElementById('empView').style.display='block';document.getElementById('adminView').style.display='none';stopAutoRefresh();renderEmp()}function showAdmin(){if(currentUserRole!=='admin')return toast('只有管理员可以进入后台');document.getElementById('empView').style.display='none';document.getElementById('adminView').style.display='block';renderAdmin();startAutoRefresh()}function clearFilter(){renderAdmin()}async function delRow(i){if(isLocked())return toast('本周已锁定，不能删除');if(!confirm('确认删除这一行？'))return;records.splice(i,1);await saveData();renderEmp()}function editRow(i){if(isLocked())return toast('本周已锁定，不能编辑');const r=records[i];modalState={type:r.type||workTypes[0],project:r.project||Object.keys(projectUnits)[0],units:r.unit?[r.unit]:[],remark:r.remark||'',editIndex:i};document.getElementById('customRemark').value=modalState.remark;document.getElementById('addModal').style.display='flex';renderModalAll()}function resetModal(){modalState={type:workTypes[0],project:Object.keys(projectUnits)[0],units:[],remark:remarkMap[workTypes[0]][0]};document.getElementById('customRemark').value=modalState.remark;document.getElementById('splitEnabled').checked=false;document.getElementById('splitTotal').value=''}function openAddModal(){if(isLocked())return toast('本周已锁定，不能新增');resetModal();document.getElementById('addModal').style.display='flex';renderModalAll()}function closeAddModal(){document.getElementById('addModal').style.display='none'}function renderModalAll(){renderModalTypes();renderModalProjects();renderModalUnits();renderModalRemarks();updateModalSummary()}function updateModalSummary(){document.getElementById('modalSummary').innerText=`工时类别：${modalState.type||'-'} ｜ 项目：${modalState.project||'-'} ｜ 单元：${modalState.units.length}个 ｜ 备注：${modalState.remark||'-'}`;document.getElementById('selectedCount').innerText=`已选 ${modalState.units.length} 个`;document.getElementById('generateBtn').innerText=modalState.editIndex!==undefined?'保存前置信息':`确定生成 ${modalState.units.length} 条`}function makeBtn(t,a,fn){const b=document.createElement('button');b.className='choice-btn'+(a?' active':'');b.innerText=t;b.onclick=fn;return b}function renderModalTypes(){const box=document.getElementById('modalTypeBox');box.innerHTML='';workTypes.forEach(t=>box.appendChild(makeBtn(t,modalState.type===t,()=>{modalState.type=t;modalState.remark=(remarkMap[t]||[])[0]||'';document.getElementById('customRemark').value=modalState.remark;renderModalTypes();renderModalRemarks();updateModalSummary()})))}function renderModalProjects(){const box=document.getElementById('modalProjectBox');box.innerHTML='';Object.keys(projectUnits).forEach(p=>box.appendChild(makeBtn(p,modalState.project===p,()=>{modalState.project=p;modalState.units=[];renderModalProjects();renderModalUnits();updateModalSummary()})))}function renderModalUnits(){const n=document.getElementById('unitNormalBox'),c=document.getElementById('unitContainerBox');n.innerHTML='';c.innerHTML='';const us=projectUnits[modalState.project]||[],normal=us.filter(u=>!String(u).startsWith('NIN-')),cont=us.filter(u=>String(u).startsWith('NIN-'));function add(box,u){box.appendChild(makeBtn(u,modalState.units.includes(u),()=>{modalState.units.includes(u)?modalState.units=modalState.units.filter(x=>x!==u):modalState.units.push(u);renderModalUnits();updateModalSummary()}))}normal.forEach(u=>add(n,u));cont.forEach(u=>add(c,u));if(!normal.length)n.innerHTML='<div class="empty">暂无</div>';if(!cont.length)c.innerHTML='<div class="empty">暂无</div>'}function renderModalRemarks(){const box=document.getElementById('modalRemarkBox');box.innerHTML='';(remarkMap[modalState.type]||[]).forEach(r=>box.appendChild(makeBtn(r,modalState.remark===r,()=>{modalState.remark=r;document.getElementById('customRemark').value=r;renderModalRemarks();updateModalSummary()})))}function applyCustomRemark(){modalState.remark=document.getElementById('customRemark').value.trim();renderModalRemarks();updateModalSummary()}function selectAllUnits(){modalState.units=[...(projectUnits[modalState.project]||[])];renderModalUnits();updateModalSummary()}function clearUnits(){modalState.units=[];renderModalUnits();updateModalSummary()}function applySplit(rows){if(!document.getElementById('splitEnabled').checked)return;const total=num(document.getElementById('splitTotal').value);if(total<=0||!rows.length)return;const each=Math.round(total/rows.length*100)/100,day=document.getElementById('splitDay').value,type=document.getElementById('splitType').value,map={mon:{normal:'monN',weekdayOT:'monO'},tue:{normal:'tueN',weekdayOT:'tueO'},wed:{normal:'wedN',weekdayOT:'wedO'},thu:{normal:'thuN',weekdayOT:'thuO'},fri:{normal:'friN',weekdayOT:'friO'},sat:{weekendOT:'satO'},sun:{weekendOT:'sunO'}},key=map[day]&&map[day][type];if(key)rows.forEach(r=>r[key]=each)}async function generateRowsFromModal(){applyCustomRemark();if(!modalState.type)return toast('请选择工时类别');if(!modalState.project)return toast('请选择项目号');if(!modalState.units.length)return toast('请选择至少一个单元');if(modalState.editIndex!==undefined){const i=modalState.editIndex;records[i].type=modalState.type;records[i].project=modalState.project;records[i].unit=modalState.units[0];records[i].remark=modalState.remark;await saveData();renderEmp();closeAddModal();return}const rows=modalState.units.map(u=>({...defaultRecord(),type:modalState.type,project:modalState.project,unit:u,remark:modalState.remark}));applySplit(rows);records.push(...rows);await saveData();renderEmp();closeAddModal()}function exportCSV(){const headers=['员工','工号','周数','工时类别','项目号','单元号','备注','周一正常','周一加班','周二正常','周二加班','周三正常','周三加班','周四正常','周四加班','周五正常','周五加班','周六加班','周日加班','正常汇总','工作日加班','周末加班'],lines=[headers];records.forEach(r=>lines.push([r.employee,r.empNo,r.week,r.type,r.project,r.unit,r.remark,r.monN,r.monO,r.tueN,r.tueO,r.wedN,r.wedO,r.thuN,r.thuO,r.friN,r.friO,r.satO,r.sunO,normalTotal(r),weekdayOT(r),weekendOT(r)]));const csv='\ufeff'+lines.map(a=>a.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n'),blob=new Blob([csv],{type:'text/csv;charset=utf-8;'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='车间工时_V5.1.csv';a.click();URL.revokeObjectURL(a.href)}function initFilters(){const sel=document.getElementById('typeFilter');if(!sel||sel.dataset.ready==='1')return;workTypes.forEach(t=>{const o=document.createElement('option');o.value=t;o.innerText=t;sel.appendChild(o)});sel.dataset.ready='1'}initLogin();
</script></body></html>
