<script>
const STORAGE_PREFIX="workHours_V4_7",LOCK_PREFIX="workHours_V4_7_locked";let records=[],currentWeekOffset=0,currentLoginId="";
// ===== CloudBase 配置区 =====
// 这里填腾讯云 CloudBase 环境ID，例如：cloud1-xxxxxx。为空时自动使用本地缓存模式。
const CLOUD_ENV_ID="timesheet-d6g9cfu6c9d0e7fce";
const CLOUD_COLLECTION="work_hours_weeks";
let cloudApp=null,cloudDb=null,cloudReady=false;
function setCloudStatus(text,mode="local"){
  ["cloudText","cloudTextAdmin"].forEach(id=>{const el=document.getElementById(id);if(el)el.innerText=text});
  ["cloudBadge","cloudBadgeAdmin"].forEach(id=>{const el=document.getElementById(id);if(el){el.classList.remove("online","error");if(mode==="online")el.classList.add("online");if(mode==="error")el.classList.add("error")}});
}
async function initCloudBase(){
  if(!CLOUD_ENV_ID){setCloudStatus("本地模式","local");return false;}
  if(typeof tcb==="undefined"){setCloudStatus("SDK未加载","error");return false;}
  try{
    cloudApp=tcb.init({env:CLOUD_ENV_ID});
    const auth=cloudApp.auth({persistence:"local"});
    await auth.anonymousAuthProvider().signIn();
    cloudDb=cloudApp.database();
    cloudReady=true;
    setCloudStatus("数据库已连接","online");
    return true;
  }catch(e){console.error("CloudBase init failed",e);setCloudStatus("数据库连接失败","error");cloudReady=false;return false;}
}
function cloudDocId(empNo,week){return `${empNo}_${week}`.replace(/[^a-zA-Z0-9_-]/g,"_");}
async function cloudSaveRecords(){
  if(!cloudReady||!cloudDb||!currentLoginId)return;
  const week=getWeekNo(currentWeekOffset);
  const docId=cloudDocId(currentLoginId,week);
  const payload={
    _id:docId,empNo:currentLoginId,employee:employeeMap[currentLoginId]||"",week,
    records,updatedAt:new Date().toISOString()
  };
  try{await cloudDb.collection(CLOUD_COLLECTION).doc(docId).set(payload);setCloudStatus("数据库已同步","online");}
  catch(e){console.error("cloud save failed",e);setCloudStatus("同步失败，本地已保存","error");}
}
async function cloudLoadRecords(){
  if(!cloudReady||!cloudDb||!currentLoginId)return;
  const week=getWeekNo(currentWeekOffset);
  try{
    if(currentLoginId==="1237794"){
      const res=await cloudDb.collection(CLOUD_COLLECTION).where({week}).get();
      const docs=(res&&res.data)||[];
      records=[];
      docs.forEach(d=>{if(Array.isArray(d.records))records.push(...d.records)});
      setCloudStatus("数据库已读取","online");
      renderAdmin();
    }else{
      const docId=cloudDocId(currentLoginId,week);
      const res=await cloudDb.collection(CLOUD_COLLECTION).doc(docId).get();
      if(res&&res.data&&Array.isArray(res.data.records)){records=res.data.records;localStorage.setItem(storageKey(),JSON.stringify(records));renderEmp();}
      setCloudStatus("数据库已读取","online");
    }
  }catch(e){console.warn("cloud load fallback local",e);setCloudStatus("读取失败，用本地缓存","error");}
}
const employeeMap={"991001":"林泽学","991005":"邓茂胜","991008":"曹珪","991009":"侯自峰","991012":"唐先发","991013":"梁庄华","1177215":"官辉","1177235":"王家伟","1177264":"李剑锋","1177265":"李建军","1177266":"李念亭","1177310":"师海芳","1177333":"黄维昆","1177336":"席新永","1177338":"叶峰","1177339":"虞志胜","1177342":"庄允吉","1235746":"丁允志","1236416":"张道仅","1237794":"Manager","1239728":"郭振宗","1254596":"候海晴","1259740":"汪保平","1262912":"向波"};
