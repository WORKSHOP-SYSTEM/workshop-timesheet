<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>车间工时填报系统 - V11.0最终版</title>
  <style>
    :root{
      --brand:#0078d4;
      --ok:#16833b;
      --danger:#b91c1c;
      --warn:#b45309;
      --line:#d1d5db;
      --chip:#eaf4ff;
      --chip-border:#b7d5fb;
      --text:#111827;
      --sub:#6b7280;
      --shadow:0 8px 24px rgba(0,0,0,.08);
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial,"Microsoft YaHei",sans-serif;
      background:linear-gradient(180deg,#eef7ff,#f4f6f8);
      color:var(--text);
    }

    .header{
      background:var(--brand);
      color:#fff;
      text-align:center;
      padding:14px;
      font-size:22px;
      font-weight:900;
    }

    .wrap{
      max-width:1120px;
      margin:14px auto;
      padding:0 10px 24px;
    }

    .card{
      background:#fff;
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:10px 8px 8px;
    }

    .sec-title{
      margin:6px 0 6px;
      color:var(--brand);
      font-weight:900;
      border-left:4px solid var(--brand);
      padding-left:8px;
    }

/* ✅ 身份整体 */
.id-row{
  display:flex;
  background:#ffffff;              /* ✅ 白底 */
  padding:10px 8px;
  border-radius:12px;
  gap:8px;
  min-height:60px;

  /* ✅ 卡片效果 */
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
  border:1px solid #e5e7eb;
}

/* ✅ 每个块 */
.id-card{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#111;     /* ✅ 文字恢复黑色 */
}

/* ✅ 标签 */
.id-label{
  font-size:11px;
  color:#aaa;
}

/* ✅ 核心信息（大字） */
.id-value{
  font-size:20px;
  font-weight:900;
  line-height:1.2;
  margin-top:2px;
}

/* ✅ 状态颜色（醒目） */
.id-value.ok{
  color:#2ecc71;
}

.id-value.err{
  color:#ff4d4f;
}

.id-value.warn{
  color:#ffa940;
}

/* ✅ 状态加图标（高级版重点） */
.id-value.ok::before{
  content:"✅ ";
}

.id-value.err::before{
  content:"❌ ";
}

.id-value.warn::before{
  content:"⚠ ";
}

/* ✅ 管理员特殊高亮 */
.id-value.admin{
  color:#ff4d4f;
  background:rgba(255,77,79,0.15);
  padding:2px 6px;
  border-radius:6px;
}


    .tip{
      margin:12px 0;
      padding:10px 12px;
      border-radius:12px;
      background:#f8fbff;
      border:1px solid #dbeafe;
      color:#1f4b7a;
      font-size:13px;
      line-height:1.7;
    }

    .field{
      margin-bottom:12px;
    }

    .field label{
      display:block;
      font-weight:900;
      font-size:14px;
      margin-bottom:6px;
    }

    .req{
      color:#d97706;
      margin-left:4px;
    }

    .chip-grid{
      display:grid;
      gap:4px;
    }

    .week-grid{
      grid-template-columns:repeat(5,1fr);
    }

    .weekday-grid{
      grid-template-columns:repeat(7,1fr);
    }

    .task-grid{
      grid-template-columns:repeat(4,1fr);
    }

    .project-grid{
      grid-template-columns:repeat(6,1fr);
    }

    .unit-grid{
      grid-template-columns:repeat(5,1fr);
    }

    .chip{
      border:1px solid var(--chip-border);
      background:var(--chip);
      color:#174b80;
      border-radius:8px;
      padding:4px 2px;
      min-height:34px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-weight:900;
      font-size:13px;
      cursor:pointer;
      user-select:none;
      word-break:break-word;
    }
/* ✅ U类（单元） */
.unit-u{
  background:#e8f4ff;
  border:1px solid #9cc9f5;
  color:#0f4c81;
}

/* ✅ NIN类（容器） */
.unit-n{
  background:#fff4e6;
  border:1px solid #f7c58a;
  color:#b45309;
}

/* ✅ hover增强（更明显） */
.unit-u:hover{
  background:#d6ecff;
}

.unit-n:hover{
  background:#ffe8cc;
}

/* ✅ 工时类别区域放大 */
.task-grid .chip{
  font-size:15px;
  min-height:40px;
}

/* ✅ 项目号区域放大 */
.project-grid .chip{
  font-size:15px;
  min-height:42px;
}

/* ✅ 专门压缩 Week 按钮 */
.week-grid .chip{
  min-height:30px;
  padding:3px 2px;
  font-size:12px;
}
/* ✅ 星期按钮再压一点 */
.weekday-grid .chip{
  min-height:28px;
  font-size:12px;
}


/* ✅ 单元号按钮更大、更适合手机点击 */
.unit-grid .chip{
  font-size:17px;
  min-height:46px;
  line-height:1.2;
  padding:6px 4px;
  word-break:break-all;
}

/* ✅ 单元号分组标题 */
.unit-group-title{
  grid-column:1 / -1;
  font-size:12px;
  font-weight:900;
  color:#64748b;
  background:#f8fafc;
  border:1px solid #e5e7eb;
  border-radius:8px;
  padding:5px 8px;
  margin-top:4px;
}

.unit-group-title.unit-group-u{
  color:#0f4c81;
  background:#e8f4ff;
  border-color:#9cc9f5;
}

.unit-group-title.unit-group-n{
  color:#b45309;
  background:#fff4e6;
  border-color:#f7c58a;
}

/* ✅ 手机端单元号每行3个，更清楚 */
@media(max-width:560px){
  .unit-grid{
    grid-template-columns:repeat(3,1fr)!important;
  }

  .unit-grid .chip{
    font-size:18px;
    min-height:48px;
  }
}

    .chip.active{
      background:var(--brand);
      border-color:var(--brand);
      color:#fff;
      box-shadow:0 6px 16px rgba(0,120,212,.22);
    }

    .chip.disabled{
      background:#f3f4f6;
      color:#9ca3af;
      border-color:#e5e7eb;
      cursor:not-allowed;
      box-shadow:none;
    }

    .hours-box{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .hour-card{
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      background:#fcfcfd;
    }

    .hour-title{
      font-weight:900;
      font-size:14px;
      margin-bottom:8px;
    }

    .count-row{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .count-btn{
      width:42px;
      height:42px;
      border:none;
      border-radius:12px;
      background:#e8f1fb;
      color:#0f4c81;
      font-size:24px;
      font-weight:900;
      cursor:pointer;
      flex:0 0 42px;
    }

    .count-btn:disabled{
      background:#f3f4f6;
      color:#aaa;
      cursor:not-allowed;
    }

    .count-value{
      flex:1;
      text-align:center;
      font-size:24px;
      font-weight:900;
    }

    .quick-row{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .quick-btn{
      border:1px solid #dbeafe;
      background:#fff;
      color:#2563eb;
      border-radius:9px;
      padding:5px 8px;
      font-size:12px;
      font-weight:900;
      cursor:pointer;
      min-height:30px;
    }

    .quick-btn:disabled{
      background:#f3f4f6;
      color:#aaa;
      cursor:not-allowed;
    }

    .remark-template-title{
      font-size:12px;
      color:#6b7280;
      font-weight:900;
      margin:6px 0 3px;
      width:100%;
    }

    textarea,
    input{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      font-size:15px;
      font-family:inherit;
    }

    textarea{
      min-height:72px;
      resize:vertical;
    }

    .btn-area{
      margin-top:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:15px;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
    }

    .btn-primary{
      background:var(--brand);
      color:#fff;
    }

    .btn-primary:disabled{
      background:#aaa;
      cursor:not-allowed;
    }

    .btn-secondary{
      background:#e5e7eb;
      color:#111827;
    }

    .admin-panel{
      display:none;
      gap:8px;
      margin:10px 0 14px;
      grid-template-columns:repeat(3,1fr);
    }

    .admin-panel.show{
      display:grid;
    }

    .admin-btn{
      border:none;
      border-radius:12px;
      padding:12px;
      font-size:15px;
      font-weight:900;
      cursor:pointer;
    }

    .lock-btn{
      background:#fee2e2;
      color:#991b1b;
    }

    .unlock-btn{
      background:#dcfce7;
      color:#166534;
    }
    .export-btn{
      background:#dbeafe;
      color:#1d4ed8;
    }

    .msg{
      display:none;
      margin-top:12px;
      padding:12px;
      border-radius:12px;
      font-size:14px;
      line-height:1.6;
    }

    .msg.ok{
      display:block;
      background:#ecfdf5;
      border:1px solid #bbf7d0;
      color:#166534;
    }

    .msg.err{
      display:block;
      background:#fef2f2;
      border:1px solid #fecaca;
      color:#991b1b;
    }

    .anomaly-box{
      margin:10px 0 14px;
      border:1px solid #fecaca;
      background:#fff1f2;
      color:#991b1b;
      border-radius:12px;
      padding:10px 12px;
      font-size:13px;
      line-height:1.7;
      display:none;
    }

    .anomaly-title{
      font-weight:900;
      margin-bottom:5px;
      color:#7f1d1d;
    }

    .anomaly-item{
      display:inline-block;
      background:#fee2e2;
      border:1px solid #fecaca;
      color:#991b1b;
      border-radius:999px;
      padding:4px 8px;
      margin:3px;
      font-weight:900;
    }

    .table-scroll{
      overflow-x:auto;
      border:1px solid #d7dde5;
      border-radius:12px;
      background:#fff;
      margin-bottom:12px;
    }

    table{
      border-collapse:collapse;
      min-width:100%;
      width:max-content;
      font-size:13px;
    }

    th,
    td{
      border:1px solid #444;
      padding:2px 4px;
      text-align:center;
      min-width:52px;
      height:26px;
      line-height:1.2;
    }

    th{
      background:#f3f4f6;
    }

    .cell-left{
      text-align:left;
      font-weight:900;
    }

    .warn-cell{
      background:#fee2e2!important;
      color:#991b1b!important;
      font-weight:900;

    }
    .warn-soft{

    }

    .locked-cell{

    .record-empty{

    .small-btn{

      padding:4px 8px;
      font-size:12px;
      font-weight:900;
      margin:0;

    }
    .filter-area{
      margin:8px 0 10px;
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }
    .filter-btn::before{
  content:none !important;
}
    .filter-btn{
      width:auto;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      border:none;
      border-radius:10px;
      padding:8px 12px;
      font-size:13px;
      font-weight:900;
      cursor:pointer;
      background:#dbeafe;
      color:#1d4ed8;
    }
    .filter-btn.active{
      background:#fde68a;
      color:#92400e;
      box-shadow:0 2px 8px rgba(146,64,14,.18);
    }

    .missing-row td{  
      background:#fff1f2!important;  
      color:#991b1b!important;  
      font-weight:900;  
    }  
    .filter-area.hidden{  
      display:none!important;  
    }  
    .filter-note{
      font-size:12px;
      color:#64748b;
      font-weight:900;
    }

    .edit-btn{
      background:#e0f2fe;
      color:#075985;
    }

    .delete-btn{
      background:#fee2e2;
      color:#991b1b;
    }

    .row-lock-btn{
      background:#fee2e2;
      color:#991b1b;
    }

    .row-unlock-btn{
      background:#dcfce7;
      color:#166534;
    }

    .hidden{
      display:none!important;
    }

    .modal-mask{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      z-index:99;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:12px;
    }

    .modal{
      background:#fff;
      border-radius:18px 18px 12px 12px;
      max-width:760px;
      width:100%;
      padding:14px;
      max-height:92vh;
      overflow:auto;
    }

    .modal-title{
      font-size:18px;
      font-weight:900;
      margin-bottom:10px;
    }

    .modal-actions{
      display:flex;
      gap:10px;
    }

    .foot{
      text-align:center;
      color:#9ca3af;
      font-size:12px;
      margin-top:16px;
    }


    .integrated-action-bar{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      margin:8px 0 10px;
    }
    .integrated-note{
      color:#64748b;
      font-size:12px;
      font-weight:900;
      line-height:1.5;
    }
    .integrated-input-row td{
      background:#f8fbff!important;
      vertical-align:middle;

    .integrated-input-row select,
    .integrated-input-row input{
      width:100%;
      min-width:48px;

      font-family:inherit;
      background:#ffffff;

    .integrated-input-row input.hour-input{
      width:48px;
      text-align:center;
      font-weight:900;
      padding:4px 2px;
    }
    .integrated-input-row input.remark-input{
      min-width:130px;
    }
    .integrated-input-row select:focus,
    .integrated-input-row input:focus{
      outline:2px solid #16a34a;
      border-color:#16a34a;
    }
    .integrated-meta-cell{min-width:105px;}
    .integrated-project-cell{min-width:128px;}
    .integrated-unit-cell{min-width:82px;}
    .integrated-remark-cell{min-width:160px;}
    .integrated-total-cell{
      background:#eef6ff!important;
      font-weight:900;
      color:#111827;
    }
    .integrated-row-tag{
      display:inline-block;
      background:#dcfce7;
      color:#166534;
      border-radius:999px;
      padding:2px 6px;
      margin-bottom:4px;
      font-size:11px;
      font-weight:900;
    }
    .integrated-mini-btn{
      border:none;
      border-radius:8px;
      padding:7px 10px;
      font-size:12px;
      font-weight:900;

    }
    .integrated-add-btn{background:#dbeafe;color:#1d4ed8;}
    .integrated-del-btn{background:#fee2e2;color:#991b1b;margin-top:4px;}
    @media(max-width:560px){
      .integrated-input-row select,
      .integrated-input-row input{font-size:11px;padding:4px 3px;}
      .integrated-input-row input.hour-input{width:44px;}
    }
    @media(max-width:560px){
      .wrap{padding:0 8px 18px;}
      .week-grid{grid-template-columns:repeat(4,1fr);}
      .task-grid,.project-grid,.unit-grid{grid-template-columns:repeat(3,1fr);}
      .hours-box{grid-template-columns:1fr 1fr;}
      .id-row{grid-template-columns:repeat(3,1fr);}
      .id-value{font-size:15px;}
      .chip{font-size:12px;min-height:38px;}
      .admin-panel{grid-template-columns:1fr;}
      .modal-actions{flex-direction:row;}
      table{font-size:11px;}
      th,td{min-width:42px;height:28px;padding:2px;}
    }

    /* =========================================================
       V7.3 CLEAN：统一最终样式层
       说明：旧版多套冲突 CSS 已清理，只保留这一套最终参数。
       如需手动调手机端前4列宽度，只改下面 :root 里的 --m-* 和 --pc-* 即可。
       left 会自动按变量计算，不再手算。
       ========================================================= */
    :root{
      --pc-task-w:68px;
      --pc-project-w:86px;
      --pc-unit-w:94px;
      --pc-remark-w:86px;
      --m-task-w:45px;
      --m-project-w:50px;
      --m-unit-w:50px;
      --m-remark-w:60px;
      --m-project-left:var(--m-task-w);
      --m-unit-left:calc(var(--m-task-w) + var(--m-project-w));
      --m-remark-left:calc(var(--m-task-w) + var(--m-project-w) + var(--m-unit-w));
    }
    .integrated-note{display:none!important;}
    .today-badge{display:inline-block;margin-top:2px;padding:1px 5px;border-radius:999px;background:#0078d4;color:#fff;font-size:11px;font-weight:900;line-height:1.2;white-space:nowrap;}
    .hour-input.maxed,.inline-hour-input.maxed{background:#f3f4f6!important;color:#9ca3af!important;border-color:#cbd5e1!important;}
    .hour-input.pending,.inline-hour-input.pending{background:#dcfce7!important;border-color:#16a34a!important;color:#111827!important;}
    .main-timesheet-table{table-layout:fixed!important;border-collapse:collapse!important;border-spacing:0!important;width:max-content!important;min-width:0!important;}
    .main-timesheet-table th,.main-timesheet-table td{padding:2px 4px!important;height:28px!important;min-height:28px!important;line-height:1.15!important;font-size:13px!important;vertical-align:middle!important;min-width:0!important;text-align:center;}
    .main-timesheet-table thead th{font-size:13px!important;font-weight:900!important;background:#f3f4f6!important;}
    .main-timesheet-table thead tr:first-child th:nth-child(1),.main-timesheet-table tbody td:nth-child(1){width:var(--pc-task-w)!important;min-width:var(--pc-task-w)!important;max-width:var(--pc-task-w)!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:clip!important;word-break:keep-all!important;}
    .main-timesheet-table thead tr:first-child th:nth-child(2),.main-timesheet-table tbody td:nth-child(2){width:var(--pc-project-w)!important;min-width:var(--pc-project-w)!important;max-width:var(--pc-project-w)!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:clip!important;word-break:keep-all!important;}
    .main-timesheet-table thead tr:first-child th:nth-child(3),.main-timesheet-table tbody td:nth-child(3){width:var(--pc-unit-w)!important;min-width:var(--pc-unit-w)!important;max-width:var(--pc-unit-w)!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:clip!important;word-break:keep-all!important;}
    .main-timesheet-table thead tr:first-child th:nth-child(4),.main-timesheet-table tbody td:nth-child(4){width:var(--pc-remark-w)!important;min-width:var(--pc-remark-w)!important;max-width:var(--pc-remark-w)!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:clip!important;word-break:keep-all!important;}
    .main-timesheet-table .picker-btn,.main-timesheet-table .task-picker-btn,.main-timesheet-table .project-picker-btn,.main-timesheet-table .unit-picker-btn{width:100%!important;max-width:100%!important;height:26px!important;min-height:26px!important;padding:2px 3px!important;border:1px solid #bcd0e5!important;border-radius:6px!important;background:#fff!important;font-size:12px!important;font-weight:900!important;line-height:1.1!important;color:#111827!important;cursor:pointer!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:clip!important;box-sizing:border-box!important;box-shadow:none!important;}

const CLOUD_BASE_FUNCTION_URL = "https://timesheet-d6g9cfu6c9d0e7fce-1448165566.ap-shanghai.app.tcloudbase.com/timesheetApi";

  const BASEROW_TABLE_ID = "1030254";
  const API_MATCH = "/api/database/rows/table/" + BASEROW_TABLE_ID + "/";
  const originalFetchV103CloudBase = window.fetch.bind(window);

  function normalizeUrl(input){
    return typeof input === "string" ? input : (input && input.url ? input.url : String(input || ""));
  }
  function isCloudBaseConfigured(){
    return CLOUD_BASE_FUNCTION_URL && /^https?:\/\//i.test(CLOUD_BASE_FUNCTION_URL);

  function jsonResponse(data, status=200){
    return Promise.resolve(new Response(JSON.stringify(data), {
      status,
      headers:{"Content-Type":"application/json;charset=utf-8"}
    }));
  }
  function parseBody(options){
    if(!options || !options.body) return {};
    try{ return JSON.parse(options.body); }catch(e){ return {}; }

  function getRowIdFromUrl(url){
    // ✅ V10.3：CloudBase 的 _id 是字母数字混合，必须匹配任意非 / 字符
    const m = String(url).match(/\/api\/database\/rows\/table\/1030254\/([^\/]+)\//);
    return m ? decodeURIComponent(String(m[1])) : "";
  }
  function getQueryParams(url){
    const out = {};
    try{
      const u = new URL(url, location.href);
      u.searchParams.forEach((v,k)=>out[k]=v);
    }catch(e){}
    return out;
  }
  function normalizeCloudBasePayload(payload){
    // 兼容 CloudBase HTTP 网关返回 {statusCode, body}
    if(payload && payload.body && typeof payload.body === "string"){
      try{ return JSON.parse(payload.body); }catch(e){}
    }
    if(payload && payload.data !== undefined) return payload.data;
    if(payload && payload.result !== undefined) return payload.result;
    return payload;
  }

  async function callCloudBase(action, payload){
    if(!isCloudBaseConfigured()){
      return {ok:false, status:500, data:{error:"CloudBase接口未配置"}};
    }
    try{
      const res = await originalFetchV103CloudBase(CLOUD_BASE_FUNCTION_URL, {
        method:"POST",
        headers:{"Content-Type":"application/json;charset=utf-8"},
        body:JSON.stringify(Object.assign({action}, payload || {}))
      });
      let data = null;
      try{ data = await res.json(); }catch(e){ data = {}; }
      data = normalizeCloudBasePayload(data);
      return {ok:res.ok, status:res.status, data};
    }catch(e){
      return {ok:false, status:502, data:{error:"CloudBase请求失败", detail:(e && e.message) ? e.message : String(e)}};
    }
  }

  window.fetch = async function(input, options={}){
    const url = normalizeUrl(input);
    if(!CLOUD_BASE_ENABLED || !url.includes(API_MATCH)){
      return originalFetchV103CloudBase(input, options);
    }

    const method = String((options && options.method) || "GET").toUpperCase();
    const rowId = getRowIdFromUrl(url);
    const params = getQueryParams(url);

    if(method === "GET"){

      if(!ret.ok) return jsonResponse(ret.data, ret.status || 500);
      const data = ret.data || {};
      if(rowId) return jsonResponse(data, 200);
      if(Array.isArray(data)) return jsonResponse({count:data.length,next:null,previous:null,results:data}, 200);
      if(Array.isArray(data.results)) return jsonResponse(data, 200);
      if(Array.isArray(data.rows)) return jsonResponse({count:data.rows.length,next:null,previous:null,results:data.rows}, 200);
      return jsonResponse({count:0,next:null,previous:null,results:[]}, 200);
    }

    if(method === "POST"){
      const body = parseBody(options);
      const ret = await callCloudBase("create", {body, data: body, params});
      return jsonResponse(ret.data || {}, ret.ok ? 200 : (ret.status || 500));
    }

    if(method === "PATCH"){
      const body = parseBody(options);
      const finalId = rowId || body.id || body._id || "";

      return jsonResponse(ret.data || {}, ret.ok ? 200 : (ret.status || 500));
    }

    if(method === "DELETE"){
      const body = parseBody(options);
      const finalId = rowId || body.id || body._id || "";
      const ret = await callCloudBase("delete", {rowId: finalId, id: finalId, _id: finalId, body, data: body, params});

      }
      return jsonResponse(ret.data || {}, ret.status || 400);
    }

    return jsonResponse({error:"unsupported method", method}, 405);
  };

let toastTimer = null;
function ensureStatusModal(){
  let modal = document.getElementById("statusModal");
  if(modal) return modal;
  modal = document.createElement("div");
  modal.id = "statusModal";
  modal.className = "status-modal hidden";
  modal.innerHTML = '<div class="status-card"><div id="statusIcon" class="status-icon"></div><div id="statusText" class="status-text"></div><button id="statusOkBtn" type="button" class="status-ok" onclick="closeStatusModal()">知道了</button></div>';
  document.body.appendChild(modal);
  return modal;
}
function closeStatusModal(){
  const modal = document.getElementById("statusModal");
  if(modal) modal.classList.add("hidden");
  if(toastTimer){ clearTimeout(toastTimer); toastTimer = null; }
}
function showStatusModal(message, ok=true){
  const modal = ensureStatusModal();
  const icon = document.getElementById("statusIcon");
  const textBox = document.getElementById("statusText");
  const okBtn = document.getElementById("statusOkBtn");
  const msg = String(message || "");
  const isLoading = msg.includes("正在") || msg.includes("请稍候");
  modal.className = "status-modal " + (ok ? "ok" : "err");
  icon.innerHTML = isLoading ? '<span class="status-spinner"></span>' : (ok ? '✅' : '⚠️');
  textBox.innerHTML = msg;
  okBtn.style.display = isLoading ? "none" : (ok ? "none" : "inline-block");
  modal.classList.remove("hidden");
  if(toastTimer){ clearTimeout(toastTimer); toastTimer = null; }
  if(ok && !isLoading){
    toastTimer = setTimeout(()=>closeStatusModal(), 1600);
  }
}
function showMsg(text, ok=true){
  const el = $("msg");
  if(el){
    el.className = "msg " + (ok ? "ok" : "err");
    el.innerHTML = text;
  }
  showStatusModal(text, ok);
}
function isWeekendDay(day){ return day === "六" || day === "日"; }
function shouldCheckMissingWorkdays(){
  if(!state.week) return false;
  const selected = weekNum(state.week);
  const current = weekNum(getCurrentWeek());
  if(selected < current) return true;       // 过去周：周一到周五都检查
  if(selected === current) return "partial"; // 当前周：只检查今天及之前
  return false;
}
function shouldCheckMissingDay(day){
  const mode = shouldCheckMissingWorkdays();
  if(mode === true) return true;
  if(mode !== "partial") return false;
  const workdays = ["一","二","三","四","五"];
  const today = getTodayWeekday();
  const dayIndex = workdays.indexOf(day);
  const todayIndex = workdays.indexOf(today);
  if(dayIndex < 0) return false;
  // 当前周如果今天是周六/周日，说明周一~周五都已经过去，都需要检查。
  if(todayIndex < 0 && (today === "六" || today === "日")) return true;
  if(todayIndex < 0) return false;
  return dayIndex <= todayIndex;
}

// ✅ 三级异常颜色规则：0=正常，1=轻微异常（黄色），2=严重异常（红色）
function getRegularLevel(v){
  v = num(v);
  if(v === 8) return 0;
  if(v > 0 && v < 8) return 1;
  return 2;
}
function getOTLevel(v){
  v = num(v);
  if(v === 0 || v === 4) return 0;
  if(v > 0 && v < 4) return 1;
  return 2;
}
function maxLevel(a,b){ return Math.max(num(a), num(b)); }
function levelClass(level){
  level = num(level);
  if(level === 1) return 'warn-soft';
  if(level >= 2) return 'warn-cell';
  return '';
}
function tdClass(level){
  const cls = levelClass(level);
  return cls ? ' class="' + cls + '"' : '';
}
function mergeClass(level, extra=""){
  const cls = [levelClass(level), extra].filter(Boolean).join(" ");
  return cls ? ' class="' + cls + '"' : '';
}

function apiUrl(){

}
function apiUrlWithParams(params={}){
  const base = "https://api.baserow.io/api/database/rows/table/" + TABLE_ID + "/";
  const q = new URLSearchParams();
  q.set("user_field_names", "true");
  q.set("size", "200");
  Object.keys(params || {}).forEach(k=>{
    if(params[k] !== undefined && params[k] !== null && params[k] !== "") q.set(k, params[k]);
  });
  return base + "?" + q.toString();
}

function isEmployeeKeyValid(key){ return String(key || "").trim() === String(employeeKeyMap[empId] || "").trim() && !!employeeKeyMap[empId]; }
function verifyEmployeeKey(){
  if(!empId || !empName) return false;

  const saved = localStorage.getItem(authKeyName());
  if(saved && isEmployeeKeyValid(saved)){
    employeeAuthorized = true;
    return true;
  }

  if(saved && !isEmployeeKeyValid(saved)){
    localStorage.removeItem(authKeyName());
  }

  const input = prompt("请输入你的个人验证码：");
  if(isEmployeeKeyValid(input)){
    employeeAuthorized = true;
    localStorage.setItem(authKeyName(), String(input).trim());
    return true;
  }

  employeeAuthorized = false;
  localStorage.removeItem(authKeyName());
  return false;
}

  if(alertMode) alert(msg);
  else showMsg(msg,false);
  return false;
}
function getCurrentWeek(){
  const d = new Date();
  const tmp = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = tmp.getUTCDay() || 7;
  tmp.setUTCDate(tmp.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(tmp.getUTCFullYear(),0,1));
  const week = Math.ceil((((tmp-yearStart)/86400000)+1)/7);
  return "W" + week;
}
function weekNum(w){
  const n = Number(String(w).replace(/[^0-9]/g,""));
  return Number.isFinite(n) ? n : 0;
}
function detectLockField(row){
  if(row && Object.prototype.hasOwnProperty.call(row,"Lock Status")) return "Lock Status";
  if(row && Object.prototype.hasOwnProperty.call(row,"Locked")) return "Locked";
  return LOCK_FIELD;
}
function isLocked(record){
  const f = detectLockField(record);
  return record[f] === true || record[f] === "true" || record[f] === 1 || record[f] === "1";
}
function refreshLockedWeeks(rows){
  lockedWeeks = new Set();
  (rows || []).forEach(row=>{
    if(row && row.week && isLocked(row)) lockedWeeks.add(String(row.week));
  });
}
function isWeekLocked(week){
  return lockedWeeks.has(String(week || ""));
}
async function fetchRowsFromUrl(url){
  let all = [];
  while(url){
    const res = await fetch(url, { headers:headers() });
    if(!res.ok) throw new Error("读取记录失败：" + res.status);
    const data = await res.json();
    if(Array.isArray(data)){
      all = all.concat(data);
      break;
    }
    const rows = data.results || [];
    all = all.concat(rows);
    url = data.next || "";
  }
  return all;
}
async function fetchRows(){
  return fetchRowsFromUrl(apiUrl());
}
async function fetchRowsByWeek(week){
  // ✅ 性能优化：优先让 Baserow 只返回当前 Week；失败则自动回退全量读取后前端过滤
  try{
    const rows = await fetchRowsFromUrl(apiUrlWithParams({["filter__week__equal"]: String(week || "")}));
    return rows.filter(row=>String(row.week || "") === String(week));
  }catch(e){
    const rows = await fetchRows();
    return rows.filter(row=>String(row.week || "") === String(week));
  }
}
async function fetchAllWeekRows(week){
  return fetchRowsByWeek(week);
}
async function loadAllWeeks(){
  try{
    const rows = await fetchRows();
    if(rows.length) LOCK_FIELD = detectLockField(rows[0]);
    refreshLockedWeeks(rows);
    const set = new Set();
    rows.forEach(r=>{ if(r.week) set.add(r.week); });
    const current = getCurrentWeek();
    const currentNum = Number(current.replace("W", ""));
    // ✅ 只显示当前周及之前3周；不显示本周后面的 Week
    for(let i=-3;i<=0;i++){
      const w = currentNum + i;
      if(w > 0) set.add("W" + w);
    }
    allWeeks = Array.from(set)
      .filter(w=>weekNum(w) <= currentNum)
      .sort((a,b)=>weekNum(a)-weekNum(b));
  }catch(e){
    const current = getCurrentWeek();
    const currentNum = Number(current.replace("W", ""));
    const arr = [];
    for(let i=-4;i<=0;i++){
      const w = currentNum + i;
      if(w > 0) arr.push("W" + w);
    }
    allWeeks = arr;
    showMsg("读取历史周失败，仅显示当前周及之前4周：" + e.message, false);
  }
}

function sortUnitsByType(units){
  const uList = [];
  const nList = [];
  const other = [];

  (units || []).forEach(unit=>{
    const val = String(unit || "").toUpperCase();
    if(val.startsWith("U")){
      uList.push(unit);
    }else if(val.startsWith("NIN")){
      nList.push(unit);
    }else{
      other.push(unit);
    }
  });

  const sorter = (a,b)=>String(a).localeCompare(String(b), undefined, {numeric:true, sensitivity:"base"});
  uList.sort(sorter);
  nList.sort(sorter);
  other.sort(sorter);

  return {uList,nList,other};
}

function unitChipClass(unit, selected){
  const val = String(unit || "").toUpperCase();
  let cls = "chip";

  if(val.startsWith("U")) cls += " unit-u";
  else if(val.startsWith("NIN")) cls += " unit-n";

  if(selected === unit) cls += " active";
  return cls;
}

function maxHours(field){
  if(field === "regularHours") return 8;
  if(field === "otWeekday") return 4;
  if(field === "otWeekend") return 8;
  return 8;
}
function submittedRegularHoursForCurrentDay(){
  if(!state.week || !state.weekday || !empId) return 0;
  return (currentWeekRecords || []).reduce((sum, record)=>{
    if(String(record.employeeId || "") !== String(empId)) return sum;
    if(String(record.week || "") !== String(state.week)) return sum;
    if(String(record.weekday || "") !== String(state.weekday)) return sum;
    return sum + num(record.regularHours);
  }, 0);
}
function remainingRegularHoursForCurrentDay(){
  if(!state.weekday || isWeekendDay(state.weekday)) return 0;
  const remain = 8 - submittedRegularHoursForCurrentDay();
  return Math.max(0, Math.min(8, Math.round(remain * 2) / 2));
}
function maxSubmitHours(field){
  if(field === "regularHours") return remainingRegularHoursForCurrentDay();
  return maxHours(field);
}
function changeNumber(field, delta){
  const max = maxSubmitHours(field);
  let next = Math.round((num(state[field]) + delta) * 2) / 2;
  state[field] = Math.max(0, Math.min(next, max));
  refreshDisplays();
}
function setNumber(field, value){
  const max = maxSubmitHours(field);
  state[field] = Math.max(0, Math.min(num(value), max));
  refreshDisplays();
}
function disableRegularInputs(disabled){

function getTodayWeekday(){
  const d = new Date().getDay(); // 0=周日
  return ["日","一","二","三","四","五","六"][d];
}

function applyAutoHoursByWeekday(){
  if(!state.weekday){
    refreshDisplays();
    return;
  }

  if(isWeekendDay(state.weekday)){
    // ✅ 周末：正常工时和工作日加班自动归零，只显示周末加班
    state.regularHours = 0;
    state.otWeekday = 0;
    state.otWeekend = Math.max(0, Math.min(num(state.otWeekend), maxHours("otWeekend")));
    $("weekdayOTCard").classList.add("hidden");
    $("weekendOTCard").classList.remove("hidden");
    disableRegularInputs(true);
  }else{
    // ✅ 工作日：正常工时自动填“当天剩余可填工时”
    // 例：当天已提交3h，则默认填5h；当天已提交8h，则默认填0h。
    state.regularHours = remainingRegularHoursForCurrentDay();
    state.otWeekend = 0;
    state.otWeekday = Math.max(0, Math.min(num(state.otWeekday), maxHours("otWeekday")));
    $("weekdayOTCard").classList.remove("hidden");
    $("weekendOTCard").classList.add("hidden");
    disableRegularInputs(false);
  }

  refreshDisplays();
}

function calcEmployeeDailyTotals(rows){
  const map = {};
  Object.keys(employeeMap).forEach(id=>{
    if(id === ADMIN_ID) return;
    map[id] = {
      employeeId:id,
      employeeName:employeeMap[id],
      days:{}
    };
    weekdayOptions.forEach(day=>{
      map[id].days[day] = {
        regular:0,
        otWeekday:0,
        otWeekend:0,
        overtime:0,
        hasRecord:false
      };
    });
  });
  rows.forEach(record=>{
    const id = String(record.employeeId || "");
    if(!map[id]){
      map[id] = {
        employeeId:id,
        employeeName:record.employeeName || employeeMap[id] || id,
        days:{}
      };
      weekdayOptions.forEach(day=>{
        map[id].days[day] = {
          regular:0,
          otWeekday:0,
          otWeekend:0,
          overtime:0,
          hasRecord:false
        };
      });
    }
    const day = record.weekday;
    if(map[id].days[day]){
      map[id].days[day].regular += num(record.regularHours);
      map[id].days[day].otWeekday += num(record.otWeekday);
      map[id].days[day].otWeekend += num(record.otWeekend);
      map[id].days[day].overtime += num(record.otWeekday) + num(record.otWeekend);
      map[id].days[day].hasRecord = true;
    }
  });
  return map;
}
function calcEmployeeAnomalies(rows){
  const totals = calcEmployeeDailyTotals(rows);
  const anomalies = {};
  const checkMissingWorkdays = shouldCheckMissingWorkdays();

  Object.keys(employeeMap).forEach(id=>{
    if(id === ADMIN_ID) return;
    if(isAdmin()){
      const activeEmployee = getAdminFilterEmployeeId();
      if(activeEmployee && String(id) !== String(activeEmployee)) return;
    }
    const item = totals[id];
    if(!item) return;

    let hasAnyRecord = false;
    weekdayOptions.forEach(day=>{
      const d = item.days[day];
      if(d && d.hasRecord) hasAnyRecord = true;
    });

    // ✅ 名单里有，但所选 Week 整周一条都没提交 = 严重异常
    if(!hasAnyRecord){
      if(isAdmin() && hasAdminProjectOrUnitFilter()) return;
      const checkableDays = ["一","二","三","四","五"].filter(day=>shouldCheckMissingDay(day));
      if(checkableDays.length){
        const levels = {};
        checkableDays.forEach(day=>levels[day] = 2);
        anomalies[id] = {
          employeeId:id,
          employeeName:item.employeeName,
          days:checkableDays,
          levels:levels,
          level:2,
          missingAllWeek:true
        };
      }
      return;
    }

    const badDays = [];
    const levels = {};
    let maxBadLevel = 0;

    ["一","二","三","四","五"].forEach(day=>{
      const d = item.days[day];
      // ✅ 已过去的 Week：工作日没填也算严重异常；本周不提前标红未来未填日期
      if(!d || !d.hasRecord){
        if(shouldCheckMissingDay(day)){
          badDays.push(day);
          levels[day] = 2;
          maxBadLevel = 2;
        }
        return;
      }
      const regularLevel = getRegularLevel(d.regular);
      const overtimeLevel = getOTLevel(d.otWeekday);
      const level = maxLevel(regularLevel, overtimeLevel);
      if(level > 0){
        badDays.push(day);
        levels[day] = level;
        maxBadLevel = Math.max(maxBadLevel, level);
      }
    });

    if(badDays.length){
      anomalies[id] = {
        employeeId:id,
        employeeName:item.employeeName,
        days:badDays,
        levels:levels,
        level:maxBadLevel,
        missingAllWeek:false
      };
    }
  });

  return anomalies;
}

let inlineEditDrafts = {};
let inlineEditMeta = {};
function inlineEditKey(rowKey, day, field){
  return String(rowKey) + "||" + String(day) + "||" + String(field);
}
function inlineDraftValue(rowKey, day, field, originalValue){
  const k = inlineEditKey(rowKey, day, field);
  return Object.prototype.hasOwnProperty.call(inlineEditDrafts, k) ? inlineEditDrafts[k] : originalValue;
}

function fieldRecordValue(record, field){
  if(field === "regular") return num(record.regularHours);
  if(field === "otWeekday") return num(record.otWeekday);
  if(field === "otWeekend") return num(record.otWeekend);
  return 0;
}
function fieldLimit(day, field){
  if(field === "regular") return isWeekendDay(day) ? 0 : 8;
  if(field === "otWeekday") return isWeekendDay(day) ? 0 : 4;
  if(field === "otWeekend") return isWeekendDay(day) ? 8 : 0;
  return 0;
}
function inlineDayTotal(day, field){
  return (currentWeekRecords || []).reduce((sum, record)=>{
    if(String(record.employeeId || "") !== String(empId)) return sum;
    if(String(record.week || "") !== String(state.week)) return sum;
    if(String(record.weekday || "") !== String(day)) return sum;
    return sum + fieldRecordValue(record, field);
  }, 0);
}
function parseInlineKey(k){
  const parts = String(k || "").split("||");
  const field = parts.pop();
  const day = parts.pop();
  const rowKey = parts.join("||");
  return {rowKey, day, field};
}
function inlineOriginalValue(rowKey, day, field){
  const meta = inlineEditMeta[rowKey];
  return num(meta && meta.originals && meta.originals[day] ? meta.originals[day][field] : 0);
}
function inlineDraftAdjustmentTotal(day, field, excludeInlineKey=""){
  return Object.keys(inlineEditDrafts || {}).reduce((sum,k)=>{
    if(String(k) === String(excludeInlineKey || "")) return sum;
    const p = parseInlineKey(k);
    if(p.day !== day || p.field !== field) return sum;
    const original = inlineOriginalValue(p.rowKey, p.day, p.field);
    const next = num(inlineEditDrafts[k]);
    return sum + (next - original);
  }, 0);
}
function integratedDraftFieldTotal(day, field, excludeRowId="", excludeField=""){
  if(typeof integratedDraftTotals !== "function") return 0;
  const totals = integratedDraftTotals(day, excludeRowId, excludeField);
  return num(totals[field]);
}
function inlineMaxValue(rowKey, day, field, originalValue){
  const limit = fieldLimit(day, field);
  const inlineKey = inlineEditKey(rowKey, day, field);
  const totalExceptThisCell = inlineDayTotal(day, field) - num(originalValue) + inlineDraftAdjustmentTotal(day, field, inlineKey) + integratedDraftFieldTotal(day, field);
  return Math.max(0, Math.min(limit, Math.round((limit - totalExceptThisCell) * 4) / 4));
}
function unifiedMaxForIntegratedCell(day, field, rowId){
  const limit = fieldLimit(day, field);
  const max = limit - inlineDayTotal(day, field) - inlineDraftAdjustmentTotal(day, field) - integratedDraftFieldTotal(day, field, rowId, field);
  return Math.max(0, Math.min(limit, Math.round(max * 4) / 4));
}
function unifiedEffectiveTotal(day, field){
  return Math.round((inlineDayTotal(day, field) + inlineDraftAdjustmentTotal(day, field) + integratedDraftFieldTotal(day, field)) * 4) / 4;
}
function validateUnifiedDraftTotals(){
  for(const day of weekdayOptions){
    for(const field of ["regular","otWeekday","otWeekend"]){
      const limit = fieldLimit(day, field);
      const total = unifiedEffectiveTotal(day, field);
      if(total > limit + 0.0001){
        const label = field === "regular" ? "正常出勤" : (field === "otWeekday" ? "工作日加班" : "周末加班");
        return "周" + day + " " + label + " 合计 " + total + "h，超过上限 " + limit + "h，请检查后再提交。";
      }
    }
  }
  return "";
}
function inlineCellInput(rowKey, day, field, originalValue, className){
  if(isAdmin()) return '<td'+className+'>'+(originalValue || "")+'</td>';
  const max = inlineMaxValue(rowKey, day, field, originalValue);
  const k = inlineEditKey(rowKey, day, field);
  const v = inlineDraftValue(rowKey, day, field, originalValue);
  const pending = Object.prototype.hasOwnProperty.call(inlineEditDrafts, k) && num(inlineEditDrafts[k]) !== num(originalValue);
  const maxed = max <= 0 && num(originalValue) <= 0;
  return '<td'+className+'><input class="inline-hour-input '+(pending?'pending ':'')+(maxed?'maxed':'')+'" type="text" inputmode="decimal" readonly data-kind="inline" data-row-key="'+safe(rowKey)+'" data-day="'+day+'" data-field="'+field+'" data-original="'+num(originalValue)+'" data-max="'+max+'" value="'+safe(v || "")+'" placeholder="0" '+(maxed?'disabled':'')+' onclick="openHourPickerFromInput(this)" onfocus="openHourPickerFromInput(this)"></td>';
}
function updateInlineEdit(rowKey, day, field, value, originalValue){
  const k = inlineEditKey(rowKey, day, field);
  const max = inlineMaxValue(rowKey, day, field, originalValue);
  let v = Math.round(num(value) * 4) / 4;
  if(v < 0) v = 0;
  if(v > max) v = max;
  inlineEditDrafts[k] = v === 0 ? "" : String(v);
  renderWeekRecordsKeepScroll();
}
function registerInlineMeta(rowKey, meta){
  inlineEditMeta[String(rowKey)] = meta;
}
function collectInlineChanges(){
  const items = [];
  Object.keys(inlineEditDrafts).forEach(k=>{
    const parts = k.split("||");
    const field = parts.pop();
    const day = parts.pop();
    const rowKey = parts.join("||");
    const meta = inlineEditMeta[rowKey];
    if(!meta) return;
    const dayMeta = meta.originals && meta.originals[day] ? meta.originals[day] : {};
    const original = num(dayMeta[field]);
    const next = num(inlineEditDrafts[k]);
    if(next === original) return;
    const recs = dayMeta[field + "Records"] || [];
    if(recs.length === 1){
      const patch = {};
      if(field === "regular") patch.regularHours = next;
      if(field === "otWeekday") patch.otWeekday = next;
      if(field === "otWeekend") patch.otWeekend = next;
      items.push({patchId:recs[0].id, patchBody:patch, weekday:day});
      return;
    }
    if(recs.length > 1){
      items.push({error:"该格子由多条原始记录合并而来，请在下方“原始记录管理”中修改具体记录。"});
      return;
    }
    if(next <= 0) return;
    const payload = {
      submitTime:new Date().toISOString(),
      employeeId:empId,
      employeeName:empName,
      week:state.week,
      weekday:day,
      task:meta.task,
      project:meta.project,
      unit:meta.unit,
      regularHours:0,
      otWeekday:0,
      otWeekend:0,
      remark:meta.remark || ""
    };
    if(field === "regular") payload.regularHours = next;
    if(field === "otWeekday") payload.otWeekday = next;
    if(field === "otWeekend") payload.otWeekend = next;
    items.push({payload});
  });
  return items;
}
async function submitInlineAndIntegratedRows(){
  if(isAdmin()) return showMsg("管理员账号不允许填报工时。",false);
  if(isSubmitting) return showMsg("正在提交中，请勿重复点击。",false);
  if(!requireAuth(false)) return;
  if(isWeekLocked(state.week)) return showMsg("该 Week 已被管理员锁定，禁止新增、修改或删除。",false);
  const inlineItems = collectInlineChanges();
  const errItem = inlineItems.find(x=>x.error);
  if(errItem) return showMsg(errItem.error, false);
  const inputItems = typeof buildIntegratedPayloads === "function" ? buildIntegratedPayloads() : [];
  const all = inlineItems.concat(inputItems);
  const totalErr = validateUnifiedDraftTotals();
  if(totalErr) return showMsg(totalErr, false);
  if(!all.length) return showMsg("请先在表格中填写需要提交的工时。", false);
  const seen = new Set();
  for(const item of all){
    if(item.patchId) continue;
    const payload = item.payload;
    const err = validatePayload(payload, "");
    if(err) return showMsg("周" + payload.weekday + "：" + err, false);
    const sig = signature(payload);
    if(seen.has(sig)) return showMsg("存在重复记录，请合并或删除重复输入。", false);
    seen.add(sig);
  }
  try{
    isSubmitting = true;
    showMsg("正在提交，请稍候…", true);
    for(const item of all){
      let res;
      if(item.patchId){
        res = await fetch(rowUrl(item.patchId), {method:"PATCH",headers:headers(),body:JSON.stringify(item.patchBody)});
        if(!res.ok) throw new Error("周" + item.weekday + " 修改失败：" + res.status);
      }else{
        res = await fetch(apiUrl(), {method:"POST",headers:headers(),body:JSON.stringify(item.payload)});
        if(!res.ok) throw new Error("周" + item.payload.weekday + " 提交失败：" + res.status);
      }
    }
    showMsg("✅ 提交成功，共提交 " + all.length + " 条记录。", true);
    inlineEditDrafts = {};
    inlineEditMeta = {};
    if(typeof integratedRows !== "undefined") integratedRows = [];
    await loadWeekRecords();
  }catch(e){
    showMsg("❌ 提交失败：" + e.message, false);
  }finally{
    isSubmitting = false;
  }
}

  weekdayOptions.forEach(day=>summary[day]={regular:0,overtime:0});
  const grouped = new Map();
  let totalRegular = 0;
  let totalEveningOt = 0;
  let totalWeekendOt = 0;
  rows.forEach(record=>{
    const empPart = isAdmin() ? (String(record.employeeId || "") + "||" + String(record.employeeName || employeeMap[record.employeeId] || "")) : "";
    const key = [empPart, record.task || "", record.project || "", record.unit || "", String(record.remark || "").trim()].join("||");
    if(!grouped.has(key)){
      const days = {};
      weekdayOptions.forEach(day=>days[day]={regular:0,overtime:0,regularOriginal:0,otWeekdayOriginal:0,otWeekendOriginal:0,regularRecords:[],otWeekdayRecords:[],otWeekendRecords:[]});
      grouped.set(key, {
        rowKey:key,
        employeeId:record.employeeId || "",
        employeeName:record.employeeName || employeeMap[record.employeeId] || "",
        task:record.task || "",
        project:record.project || "",
        unit:record.unit || "",
        remark:String(record.remark || "").trim(),
        days:days,
        totalRegular:0,
        totalEveningOt:0,
        totalWeekendOt:0
      });
    }
    const row = grouped.get(key);
    const day = record.weekday;
    const regular = num(record.regularHours);
    const overtime = num(record.otWeekday) + num(record.otWeekend);
    if(row.days[day]){
      row.days[day].regular += regular;
      row.days[day].overtime += overtime;
      row.days[day].regularOriginal += regular;
      row.days[day].otWeekdayOriginal += num(record.otWeekday);
      row.days[day].otWeekendOriginal += num(record.otWeekend);
      if(regular > 0) row.days[day].regularRecords.push(record);
      if(num(record.otWeekday) > 0) row.days[day].otWeekdayRecords.push(record);
      if(num(record.otWeekend) > 0) row.days[day].otWeekendRecords.push(record);
    }
    row.totalRegular += regular;
    row.totalEveningOt += num(record.otWeekday);
    row.totalWeekendOt += num(record.otWeekend);
    if(summary[day]){
      summary[day].regular += regular;
      summary[day].overtime += overtime;
    }
    totalRegular += regular;
    totalEveningOt += num(record.otWeekday);
    totalWeekendOt += num(record.otWeekend);
  });

  // ✅ 管理员主表补入“整周未提交”的名单人员，让异常真正综合到本周明细表里
  if(isAdmin()){
    Object.keys(adminAnomalies).forEach(id=>{
      const a = adminAnomalies[id];
      if(!a || !a.missingAllWeek) return;
      const key = String(id) + "||__MISSING_ALL_WEEK__";
      if(grouped.has(key)) return;
      const days = {};
      weekdayOptions.forEach(day=>days[day]={regular:"",overtime:""});
      grouped.set(key,{
        employeeId:id,
        employeeName:a.employeeName,
        task:"未提交",
        project:"",
        unit:"",
        remark:"整周未提交",
        days:days,
        totalRegular:0,
        totalEveningOt:0,
        totalWeekendOt:0,
        missingAllWeek:true
      });
    });
  }
  // ✅ 员工界面：如果已过去的 Week 整周未填，也在本周明细表中显示红色“未提交”行
  if(!isAdmin() && employeeMissingAllWeek){
    const key = String(empId) + "||__EMPLOYEE_MISSING_ALL_WEEK__";
    if(!grouped.has(key)){
      const days = {};
      weekdayOptions.forEach(day=>days[day]={regular:"",overtime:""});
      grouped.set(key,{
        employeeId:empId,
        employeeName:empName,
        task:"未提交",
        project:"",
        unit:"",
        remark:"整周未提交",
        days:days,
        totalRegular:0,
        totalEveningOt:0,
        totalWeekendOt:0,
        missingAllWeek:true
      });
    }
  }

  const employeeHead = isAdmin() ? '<th rowspan="2">员工</th><th rowspan="2">工号</th>' : '';
  const head = '<thead><tr>' + employeeHead + '<th rowspan="2">工时类别</th><th rowspan="2">项目号</th><th rowspan="2">单元号</th><th rowspan="2">备注</th>' + ['一','二','三','四','五'].map(x=>'<th colspan="2">'+dayHeaderLabel('周'+x,x)+'</th>').join('') + '<th>'+dayHeaderLabel('周六','六')+'</th><th>'+dayHeaderLabel('周日','日')+'</th><th colspan="3">汇总</th></tr><tr>' + Array(5).fill('<th>正常<br>出勤</th><th>实际<br>加班</th>').join('') + '<th>实际<br>加班</th><th>实际<br>加班</th><th>正常<br>出勤</th><th>实际晚<br>上加班</th><th>实际周<br>末加班</th></tr></thead>';
  let body = "";
  Array.from(grouped.values()).sort((a,b)=>{
    const am = a.missingAllWeek ? 1 : 0;
    const bm = b.missingAllWeek ? 1 : 0;
    if(am !== bm) return bm - am;
    return String(a.employeeName || "").localeCompare(String(b.employeeName || ""), "zh-Hans-CN");
  }).forEach(row=>{
    const anomaly = isAdmin() ? adminAnomalies[String(row.employeeId || "")] : employeeAnomaly;
    const hasError = !!anomaly;
    if(onlyShowAnomaly && isAdmin() && !hasError) return;
    const empLevel = anomaly ? anomaly.level : 0;
    const empCells = isAdmin() ? '<td'+mergeClass(empLevel)+'>'+safe(row.employeeName)+'</td><td'+mergeClass(empLevel)+'>'+safe(row.employeeId)+'</td>' : '';
    const rowKey = row.rowKey || [row.employeeId || "", row.task || "", row.project || "", row.unit || "", row.remark || ""].join("||");
    const originals = {};
    weekdayOptions.forEach(d=>{
      originals[d] = {
        regular: row.days[d] ? num(row.days[d].regularOriginal || row.days[d].regular) : 0,
        otWeekday: row.days[d] ? num(row.days[d].otWeekdayOriginal) : 0,
        otWeekend: row.days[d] ? num(row.days[d].otWeekendOriginal) : 0,
        regularRecords: row.days[d] ? (row.days[d].regularRecords || []) : [],
        otWeekdayRecords: row.days[d] ? (row.days[d].otWeekdayRecords || []) : [],
        otWeekendRecords: row.days[d] ? (row.days[d].otWeekendRecords || []) : []
      };
    });
    registerInlineMeta(rowKey, {task:row.task, project:row.project, unit:row.unit, remark:row.remark, originals:originals});
    body += '<tr' + (row.missingAllWeek ? ' class="missing-row"' : '') + '>' + empCells + '<td class="cell-left">'+safe(row.task)+'</td><td>'+safe(row.project)+'</td><td>'+safe(row.unit)+'</td><td>'+safe(row.remark)+'</td>' + ['一','二','三','四','五'].map(day=>{
      let level = anomaly && anomaly.levels ? (anomaly.levels[day] || 0) : 0;
      if(isAdmin() && anomaly && shouldCheckMissingDay(day) && !hasRawRecordForEmployeeDay(row.employeeId, day)) level = Math.max(level, 2);
      const cls = tdClass(level);
      const r = row.days[day] || {};
      return inlineCellInput(rowKey, day, 'regular', num(r.regularOriginal || r.regular), cls) + inlineCellInput(rowKey, day, 'otWeekday', num(r.otWeekdayOriginal), cls);
    }).join('') + inlineCellInput(rowKey, '六', 'otWeekend', num((row.days['六']||{}).otWeekendOriginal || (row.days['六']||{}).overtime), '') + inlineCellInput(rowKey, '日', 'otWeekend', num((row.days['日']||{}).otWeekendOriginal || (row.days['日']||{}).overtime), '') + '<td>'+(row.totalRegular || "")+'</td><td>'+(row.totalEveningOt || "")+'</td><td>'+(row.totalWeekendOt || "")+'</td></tr>';
  });
  if(!isAdmin()){
    body += buildIntegratedInputRowsHtml();
  }
  const blankPrefix = isAdmin() ? '<td></td><td></td>' : '';
  const sumRow = '<tr>' + blankPrefix + '<td></td><td></td><td></td><td><b>汇总</b></td>' + ['一','二','三','四','五'].map(day=>{
    const hasData = summary[day].regular > 0 || summary[day].overtime > 0;
    const missingLevel = (!isAdmin() && employeeAnomaly && employeeAnomaly.levels) ? (employeeAnomaly.levels[day] || 0) : 0;
    let regularLevel = 0;
    let otLevel = 0;
    if(!isAdmin()){
      if(missingLevel > 0 && !hasData){
        // ✅ 已过去 Week 的工作日完全没填：正常/加班两个格子都标红，提醒缺填
        regularLevel = 2;
        otLevel = 2;
      }else if(hasData){
        regularLevel = getRegularLevel(summary[day].regular);
        otLevel = getOTLevel(summary[day].overtime);
      }
    }
    const draftRegular = !isAdmin() ? integratedDraftGrand(day,'regular') : 0;
    const draftOt = !isAdmin() ? integratedDraftGrand(day,'otWeekday') : 0;
    const inlineRegular = !isAdmin() ? inlineDraftAdjustmentTotal(day,'regular') : 0;
    const inlineOt = !isAdmin() ? inlineDraftAdjustmentTotal(day,'otWeekday') : 0;
    const regularTotal = summary[day].regular + draftRegular + inlineRegular;
    const otTotal = summary[day].overtime + draftOt + inlineOt;
    regularLevel = getRegularLevel(regularTotal);
    otLevel = getOTLevel(otTotal);
    return '<td'+tdClass(regularLevel)+'>'+(regularTotal || 0)+'</td><td'+tdClass(otLevel)+'>'+(otTotal || 0)+'</td>';
  }).join('') + '<td>'+((summary['六'].overtime || 0) + (!isAdmin()?integratedDraftGrand('六','otWeekend') + inlineDraftAdjustmentTotal('六','otWeekend'):0))+'</td><td>'+((summary['日'].overtime || 0) + (!isAdmin()?integratedDraftGrand('日','otWeekend') + inlineDraftAdjustmentTotal('日','otWeekend'):0))+'</td><td>'+((totalRegular || 0) + (!isAdmin()?integratedRows.reduce((s,row)=>s+integratedRowRegularTotal(row),0) + ['一','二','三','四','五'].reduce((s,day)=>s+inlineDraftAdjustmentTotal(day,'regular'),0):0))+'</td><td>'+((totalEveningOt || 0) + (!isAdmin()?integratedRows.reduce((s,row)=>s+integratedRowEveningTotal(row),0) + ['一','二','三','四','五'].reduce((s,day)=>s+inlineDraftAdjustmentTotal(day,'otWeekday'),0):0))+'</td><td>'+((totalWeekendOt || 0) + (!isAdmin()?integratedRows.reduce((s,row)=>s+integratedRowWeekendTotal(row),0) + ['六','日'].reduce((s,day)=>s+inlineDraftAdjustmentTotal(day,'otWeekend'),0):0))+'</td></tr>';
  function hasRawRecordForEmployeeDay(employeeId, day){
    return (rows || []).some(r=>String(r.employeeId || "") === String(employeeId) && String(r.weekday || "") === String(day));
  }
  let missingRawRows = "";
  if(isAdmin()){
    Object.keys(adminAnomalies || {}).forEach(id=>{
      const anomaly = adminAnomalies[id];
      if(!anomaly) return;
      if(onlyShowAnomaly && anomaly.level <= 0) return;
      const empNameForMissing = anomaly.employeeName || employeeMap[id] || id;
      if(anomaly.missingAllWeek){
        missingRawRows += '<tr class="missing-row"><td>'+safe(empNameForMissing)+'</td><td>'+safe(id)+'</td><td colspan="10">整周未提交</td></tr>';
        return;
      }
      (anomaly.days || []).forEach(day=>{
        if(!shouldCheckMissingDay(day)) return;
        if(hasRawRecordForEmployeeDay(id, day)) return;
        missingRawRows += '<tr class="missing-row"><td>'+safe(empNameForMissing)+'</td><td>'+safe(id)+'</td><td>'+safe(day)+'</td><td>未提交</td><td></td><td></td><td></td><td></td><td></td><td>当天未提交</td><td></td><td></td></tr>';
      });
    });
  }
  let rawRows = missingRawRows;
  rows.forEach(record=>{
    const locked = isLocked(record);
    const anomaly = isAdmin() ? adminAnomalies[String(record.employeeId || "")] : employeeAnomaly;
    const rowDayLevel = anomaly && anomaly.levels ? (anomaly.levels[record.weekday] || 0) : 0;
    if(onlyShowAnomaly && isAdmin() && rowDayLevel === 0) return;
    const empLevel = anomaly ? anomaly.level : 0;
    const empCells = isAdmin() ? '<td'+mergeClass(empLevel)+'>'+safe(record.employeeName || employeeMap[record.employeeId] || "")+'</td><td'+mergeClass(empLevel)+'>'+safe(record.employeeId || "")+'</td>' : '';
    const lockCell = locked ? '<td class="locked-cell">已锁定</td>' : '<td>未锁定</td>';
    let actionCell = "";
    if(isAdmin()){
      actionCell = locked ? '<button class="small-btn row-unlock-btn" onclick="unlockOne(\''+safe(record.id)+'\')">解锁</button>' : '<button class="small-btn row-lock-btn" onclick="lockOne(\''+safe(record.id)+'\')">锁定</button>';
    }else if(locked){
      actionCell = '<span class="locked-cell">已锁定</span>';
    }else{
      actionCell = '<button class="small-btn edit-btn" onclick="openEditModal(\''+safe(record.id)+'\')">修改</button><button class="small-btn delete-btn" onclick="deleteRecord(\''+safe(record.id)+'\')">删除</button>';
    }
    rawRows += '<tr>' + empCells + '<td'+mergeClass(rowDayLevel)+'>'+safe(record.weekday)+'</td><td class="cell-left">'+safe(record.task)+'</td><td>'+safe(record.project)+'</td><td>'+safe(record.unit)+'</td><td'+mergeClass(rowDayLevel)+'>'+num(record.regularHours)+'</td><td'+mergeClass(rowDayLevel)+'>'+num(record.otWeekday)+'</td><td>'+num(record.otWeekend)+'</td><td>'+safe(record.remark || "")+'</td>' + lockCell + '<td>'+actionCell+'</td></tr>';
  });
  if(!rawRows){
    const rawColspan = isAdmin() ? 12 : 10;
    rawRows = '<tr><td colspan="' + rawColspan + '" class="record-empty">无原始提交记录</td></tr>';
  }
  const rawEmpHead = isAdmin() ? '<th>员工</th><th>工号</th>' : '';
  const inputActions = !isAdmin() ? '<div class="integrated-action-bar"><button type="button" id="integratedAddBtn" class="btn add-row-btn" onclick="addIntegratedRow()">＋ 新增单条或多条工时</button><button type="button" class="btn btn-primary submit-row-btn" onclick="submitInlineAndIntegratedRows()">↑ 提交</button><span class="integrated-note">已统一实时防错：每天正常≤8h、工作日加班≤4h、周末加班≤8h；达到上限后对应格子会自动锁定。</span></div>' : '';
  box.innerHTML = inputActions + '<div class="table-scroll"><table class="main-timesheet-table">'+head+'<tbody>'+body+sumRow+'</tbody></table></div><div class="sec-title">原始记录管理</div><div class="table-scroll"><table class="raw-record-table"><thead><tr>'+rawEmpHead+'<th>星期</th><th>工时类别</th><th>项目号</th><th>单元号</th><th>正常</th><th>工作日<br>加班</th><th>周末<br>加班</th><th>备注</th><th>锁定状态</th><th>操作</th></tr></thead><tbody>'+rawRows+'</tbody></table></div>';
  updateIntegratedAddButtonState();
}

let integratedRows = [];
function createIntegratedRow(){
  const days = {};
  weekdayOptions.forEach(day=>days[day]={regular:"",otWeekday:"",otWeekend:""});
  return {
    id:"I" + Date.now() + "_" + Math.random().toString(16).slice(2),
    task:"",
    project:"",
    unit:"",
    remark:"",
    days:days
  };
}
function ensureIntegratedRows(){
  // 不默认生成填写行，必须点击“＋ 新增一条工时”才出现。
  return;
}
function optionHtml(value, selected){
  return '<option value="' + safe(value) + '"' + (String(value)===String(selected)?' selected':'') + '>' + safe(value) + '</option>';
}
function integratedExistingTotals(day){
  const totals = {regular:0, otWeekday:0, otWeekend:0};
  (currentWeekRecords || []).forEach(record=>{
    if(String(record.employeeId || "") !== String(empId)) return;
    if(String(record.week || "") !== String(state.week)) return;
    if(String(record.weekday || "") !== String(day)) return;
    totals.regular += num(record.regularHours);
    totals.otWeekday += num(record.otWeekday);
    totals.otWeekend += num(record.otWeekend);
  });
  return totals;
}
function integratedDraftTotals(day, excludeRowId="", excludeField=""){
  const totals = {regular:0, otWeekday:0, otWeekend:0};
  integratedRows.forEach(row=>{
    const d = row.days && row.days[day] ? row.days[day] : {};
    if(!(String(row.id)===String(excludeRowId) && excludeField === "regular")) totals.regular += num(d.regular);
    if(!(String(row.id)===String(excludeRowId) && excludeField === "otWeekday")) totals.otWeekday += num(d.otWeekday);
    if(!(String(row.id)===String(excludeRowId) && excludeField === "otWeekend")) totals.otWeekend += num(d.otWeekend);
  });
  return totals;
}
function integratedMaxForCell(day, field, rowId){
  return unifiedMaxForIntegratedCell(day, field, rowId);
}
function clampHalfHour(v, max){
  let n = Math.round(num(v) * 4) / 4;
  n = Math.max(0, Math.min(n, max));
  return n === 0 ? "" : String(n);
}
function integratedRowHasHours(row){
  return weekdayOptions.some(day=>{
    const d = row.days[day];
    return num(d.regular)>0 || num(d.otWeekday)>0 || num(d.otWeekend)>0;
  });
}
function integratedRowRegularTotal(row){
  return ["一","二","三","四","五"].reduce((s,day)=>s+num(row.days[day].regular),0);
}
function integratedRowEveningTotal(row){
  return ["一","二","三","四","五"].reduce((s,day)=>s+num(row.days[day].otWeekday),0);
}
function integratedRowWeekendTotal(row){
  return ["六","日"].reduce((s,day)=>s+num(row.days[day].otWeekend),0);
}
function integratedDraftGrand(day, field){
  return integratedRows.reduce((s,row)=>s+num(row.days[day][field]),0);
}
function updateIntegratedMeta(rowId, field, value){
  const row = integratedRows.find(r=>String(r.id)===String(rowId));
  if(!row) return;
  row[field] = value;
  // 备注输入时不重绘整张表，避免手机输入法每删/输一个字就关闭。
  if(field === "remark") return;
  if(field === "task"){
    if(!needsProjectByTask(value)){
      row.project = "";
      row.unit = "";
    }else if(!needsUnitByTask(value)){
      row.unit = "";
    }
  }
  if(field === "project") row.unit = "";
  renderWeekRecordsKeepScroll();
}
function updateIntegratedHour(rowId, day, field, value){
  const row = integratedRows.find(r=>String(r.id)===String(rowId));
  if(!row || !row.days[day]) return;
  row.days[day][field] = clampHalfHour(value, integratedMaxForCell(day, field, rowId));
  renderWeekRecordsKeepScroll();
}
function hasIntegratedDraftRow(){
  return Array.isArray(integratedRows) && integratedRows.length > 0;
}
function updateIntegratedAddButtonState(){
  const btn = document.getElementById("integratedAddBtn");
  if(!btn) return;
  const locked = hasIntegratedDraftRow();
  btn.disabled = locked;
  btn.title = locked ? "当前已有未提交工时，请先提交或删除后再批量新增" : "新增一条工时";
}
let batchDraft = {task:"", project:"", units:[], remark:""};

function batchNeedsUnit(){ return needsUnitByTask(batchDraft.task); }

function batchSelectProject(project){
  batchDraft.project = project;

  return (projectUnits[batchDraft.project] || []).slice().sort((a,b)=>String(a).localeCompare(String(b), undefined, {numeric:true, sensitivity:"base"}));

function batchSelectedSummary(){

  if(batchDraft.task) parts.push("工时类别：" + batchDraft.task);
  if(batchNeedsProject()) parts.push("项目：" + (batchDraft.project || "未选"));

    projectHtml = '<div class="picker-empty">该工时类别无需项目号</div>';

    unitHtml = '<div class="batch-unit-tools"><button type="button" class="batch-mini-btn" onclick="batchDraft.units=batchCurrentUnits().map(String);renderBatchCreatePicker();">全选</button><button type="button" class="batch-mini-btn" onclick="batchDraft.units=[];renderBatchCreatePicker();">清空</button><span>已选 '+batchDraft.units.length+' 个</span></div>'
      + '<div class="picker-columns"><div class="picker-col unit"><div class="picker-col-title">单元类（可多选）</div><div class="picker-list batch-multi-list">'+makeUnit(unitList,'unit')+'</div></div><div class="picker-col container"><div class="picker-col-title">容器类（可多选）</div><div class="picker-list batch-multi-list">'+makeUnit(containerList,'container')+'</div></div></div>';
  }
  const remarks = batchDraft.task ? combinedRemarkOptionsForRow({task:batchDraft.task, remark:batchDraft.remark}) : [];

function buildIntegratedPayloads(){
  const items = [];
  integratedRows.forEach((row, index)=>{
    if(!integratedRowHasHours(row)) return;
    weekdayOptions.forEach(day=>{
      const d = row.days[day];
      const weekend = isWeekendDay(day);
      const regular = weekend ? 0 : num(d.regular);
      const otWeekday = weekend ? 0 : num(d.otWeekday);
      const otWeekend = weekend ? num(d.otWeekend) : 0;
      if(regular === 0 && otWeekday === 0 && otWeekend === 0) return;
      items.push({
        rowIndex:index+1,
        payload:{
          submitTime:new Date().toISOString(),
          employeeId:empId,
          employeeName:empName,
          week:state.week,
          weekday:day,
          task:row.task,
          project:needsProjectByTask(row.task)?row.project:"",
          unit:needsUnitByTask(row.task)?row.unit:"",
          regularHours:regular,
          otWeekday:otWeekday,
          otWeekend:otWeekend,
          remark:row.remark || ""
        }
      });
    });
  });
  return items;
}
async function submitIntegratedRows(){
  if(isAdmin()) return showMsg("管理员账号不允许填报工时。",false);
  if(isSubmitting) return showMsg("正在提交中，请勿重复点击。",false);
  if(!requireAuth(false)) return;
  if(isWeekLocked(state.week)) return showMsg("该 Week 已被管理员锁定，禁止新增、修改或删除。",false);
  const items = buildIntegratedPayloads();
  if(!items.length) return showMsg("请至少填写一个工时格。", false);
  const seen = new Set();
  for(const item of items){
    const err = validatePayload(item.payload, "");
    if(err) return showMsg("填写行 " + item.rowIndex + " / 周" + item.payload.weekday + "：" + err, false);
    const sig = signature(item.payload);
    if(seen.has(sig)) return showMsg("填写行 " + item.rowIndex + " / 周" + item.payload.weekday + "：存在重复记录，请合并或删除重复输入。", false);
    seen.add(sig);
  }
  try{
    isSubmitting = true;
    showMsg("正在提交，请稍候…", true);
    for(const item of items){
      const res = await fetch(apiUrl(), {method:"POST",headers:headers(),body:JSON.stringify(item.payload)});
      if(!res.ok) throw new Error("填写行 " + item.rowIndex + " / 周" + item.payload.weekday + " 提交失败：" + res.status);
    }
    showMsg("✅ 提交成功，共提交 " + items.length + " 条记录。", true);
    integratedRows = [createIntegratedRow()];
    await loadWeekRecords();
  }catch(e){
    showMsg("❌ 提交失败：" + e.message, false);
  }finally{
    isSubmitting = false;
  }
}
function dayTotals(week, day, excludeRowId){
  const totals = {regular:0,otWeekday:0,otWeekend:0};
  currentWeekRecords.forEach(record=>{
    if(String(record.id) === String(excludeRowId || "")) return;
    if(String(record.employeeId) !== String(empId)) return;
    if(record.week !== week || record.weekday !== day) return;
    totals.regular += num(record.regularHours);
    totals.otWeekday += num(record.otWeekday);
    totals.otWeekend += num(record.otWeekend);
  });
  return totals;
}
function hasLockedSameDay(payload){
  if(isAdmin()) return false;
  return currentWeekRecords.some(record=>String(record.employeeId) === String(empId) && String(record.week) === String(payload.week) && String(record.weekday) === String(payload.weekday) && isLocked(record));
}
function signature(payload){
  return JSON.stringify({employeeId:payload.employeeId,week:payload.week,weekday:payload.weekday,task:payload.task,project:payload.project,unit:payload.unit,regularHours:num(payload.regularHours),otWeekday:num(payload.otWeekday),otWeekend:num(payload.otWeekend),remark:String(payload.remark || "").trim()});
}
function duplicate(signatureText, excludeRowId){
  return currentWeekRecords.some(record=>String(record.id) !== String(excludeRowId || "") && String(record.employeeId) === String(empId) && signature(record) === signatureText);
}
function validatePayload(payload, excludeRowId){
  if(isAdmin()) return "管理员账号不允许填报或修改工时数据。";
  if(isWeekLocked(payload.week)) return "该 Week 已被管理员锁定，禁止新增、修改或删除。";
  if(!payload.employeeId || !employeeMap[payload.employeeId]) return "未识别到有效员工信息，请使用员工专属二维码扫码。";
  if(!payload.week) return "请选择 Week。";
  if(!payload.weekday) return "请选择星期。";
  if(!payload.task) return "请选择工时类别。";
// ✅ V9.8：只有工作日才强制备注；周六/周日允许备注为空
  if(!isWeekendDay(payload.weekday) && (!payload.remark || !payload.remark.trim())) return "备注不能为空，请填写或选择备注。";
  if(needsProjectByTask(payload.task) && !payload.project) return "请选择项目号。";
  if(needsUnitByTask(payload.task) && !payload.unit) return "请选择单元号。";
  if(hasLockedSameDay(payload)) return "当天数据已被管理员锁定，不能新增、修改或删除。";
  const regular = num(payload.regularHours);
  const otWeekday = num(payload.otWeekday);
  const otWeekend = num(payload.otWeekend);
  const weekend = isWeekendDay(payload.weekday);
  if(regular < 0 || regular > 8) return "正常工时单条记录必须在 0~8 小时之间。";
  if(otWeekday < 0 || otWeekday > 4) return "工作日加班单条记录必须在 0~4 小时之间。";
  if(otWeekend < 0 || otWeekend > 8) return "周末加班单条记录必须在 0~8 小时之间。";
  if(weekend && (regular !== 0 || otWeekday !== 0)) return "周末不能填写正常工时或工作日加班。";
  if(!weekend && otWeekend !== 0) return "工作日不能填写周末加班。";
  const totals = dayTotals(payload.week, payload.weekday, excludeRowId);
  if(totals.regular + regular > 8) return "提交后当天正常工时汇总为 " + (totals.regular + regular) + "h，超过 8h，禁止提交。";
  if(!weekend && totals.otWeekday + otWeekday > 4) return "提交后当天工作日加班汇总为 " + (totals.otWeekday + otWeekday) + "h，超过 4h，禁止提交。";
  if(weekend && totals.otWeekend + otWeekend > 8) return "提交后当天周末加班汇总为 " + (totals.otWeekend + otWeekend) + "h，超过 8h，禁止提交。";
  if(duplicate(signature(payload), excludeRowId)) return "已存在一条完全相同的记录，无需重复提交。";
  return "";
}

function excelEscape(value){
  return String(value ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
function excelCell(value, className=""){
  return '<td class="' + className + '">' + excelEscape(value) + '</td>';
}
function excelHeader(value){
  return '<th>' + excelEscape(value) + '</th>';
}
function exportDateText(){
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  const hh = String(d.getHours()).padStart(2,"0");
  const mi = String(d.getMinutes()).padStart(2,"0");
  return yyyy + mm + dd + "_" + hh + mi;
}
function buildSelectedWeekExportSummary(rows){
  const result = {};

  // ✅ 管理员导出：先把名单内所有员工放进去，整周未提交也会导出
  Object.keys(employeeMap).forEach(id=>{
    if(id === ADMIN_ID) return;
    result[id] = {
      employeeId:id,
      employeeName:employeeMap[id],
      days:{},
      totalRegular:0,
      totalOtWeekday:0,
      totalOtWeekend:0,
      anomaly:[],
      levels:{},
      level:0,
      hasAnyRecord:false
    };
    weekdayOptions.forEach(day=>{
      result[id].days[day] = {regular:0, otWeekday:0, otWeekend:0, hasRecord:false};
    });
  });

  rows.forEach(record=>{
    const id = String(record.employeeId || "");
    const name = record.employeeName || employeeMap[id] || id;
    if(!result[id]){
      result[id] = {
        employeeId:id,
        employeeName:name,
        days:{},
        totalRegular:0,
        totalOtWeekday:0,
        totalOtWeekend:0,
        anomaly:[],
        levels:{},
        level:0,
        hasAnyRecord:false
      };
      weekdayOptions.forEach(day=>{
        result[id].days[day] = {regular:0, otWeekday:0, otWeekend:0, hasRecord:false};
      });
    }
    result[id].hasAnyRecord = true;
    const day = record.weekday;
    if(result[id].days[day]){
      result[id].days[day].regular += num(record.regularHours);
      result[id].days[day].otWeekday += num(record.otWeekday);
      result[id].days[day].otWeekend += num(record.otWeekend);
      result[id].days[day].hasRecord = true;
    }
    result[id].totalRegular += num(record.regularHours);
    result[id].totalOtWeekday += num(record.otWeekday);
    result[id].totalOtWeekend += num(record.otWeekend);
  });

  Object.keys(result).forEach(id=>{
    const emp = result[id];
    if(!emp.hasAnyRecord){
      emp.anomaly.push("整周未提交");
      emp.level = 2;
      return;
    }
    ["一","二","三","四","五"].forEach(day=>{
      const d = emp.days[day];
      if(!d || !d.hasRecord) return;
      const regularLevel = getRegularLevel(d.regular);
      const otLevel = getOTLevel(d.otWeekday);
      const dayLevel = maxLevel(regularLevel, otLevel);
      if(dayLevel > 0){
        emp.levels[day] = dayLevel;
        emp.level = Math.max(emp.level, dayLevel);
      }
      if(regularLevel > 0) emp.anomaly.push("周" + day + "正常=" + d.regular + "h" + (regularLevel === 1 ? "（轻微）" : "（严重）"));
      if(otLevel > 0) emp.anomaly.push("周" + day + "工作日加班=" + d.otWeekday + "h" + (otLevel === 1 ? "（轻微）" : "（严重）"));
    });
  });
  return result;
}
function exportSelectedWeekExcel(){
  if(!isAdmin()){
    alert("只有管理员可以导出所选 Week 数据。");
    return;
  }
  if(!state.week){
    alert("请先选择 Week。");
    return;
  }

  const rows = getAdminFilteredRows();
  const filterText = adminFilterDescription();
  const adminAnomalies = calcEmployeeAnomalies(rows);
  const summary = {};
  weekdayOptions.forEach(day=>summary[day]={regular:0,overtime:0});
  const grouped = new Map();
  let totalRegular = 0;
  let totalEveningOt = 0;
  let totalWeekendOt = 0;

  // ✅ 与页面“本周已提交工时明细”完全一致的分组：员工 + 工时类别 + 项目号 + 单元号 + 备注
  rows.forEach(record=>{
    const empPart = String(record.employeeId || "") + "||" + String(record.employeeName || employeeMap[record.employeeId] || "");
    const key = [empPart, record.task || "", record.project || "", record.unit || "", String(record.remark || "").trim()].join("||");
    if(!grouped.has(key)){
      const days = {};
      weekdayOptions.forEach(day=>days[day]={regular:0,overtime:0});
      grouped.set(key,{
        employeeId:record.employeeId || "",
        employeeName:record.employeeName || employeeMap[record.employeeId] || "",
        task:record.task || "",
        project:record.project || "",
        unit:record.unit || "",
        remark:String(record.remark || "").trim(),
        days:days,
        totalRegular:0,
        totalEveningOt:0,
        totalWeekendOt:0,
        missingAllWeek:false
      });
    }
    const row = grouped.get(key);
    const day = record.weekday;
    const regular = num(record.regularHours);
    const overtime = num(record.otWeekday) + num(record.otWeekend);
    if(row.days[day]){
      row.days[day].regular += regular;
      row.days[day].overtime += overtime;
    }
    row.totalRegular += regular;
    row.totalEveningOt += num(record.otWeekday);
    row.totalWeekendOt += num(record.otWeekend);
    if(summary[day]){
      summary[day].regular += regular;
      summary[day].overtime += overtime;
    }
    totalRegular += regular;
    totalEveningOt += num(record.otWeekday);
    totalWeekendOt += num(record.otWeekend);
  });

  // ✅ 整周未提交保持页面同款红色行
  Object.keys(adminAnomalies).forEach(id=>{
    const a = adminAnomalies[id];
    if(!a || !a.missingAllWeek) return;
    const key = String(id) + "||__MISSING_ALL_WEEK__";
    if(grouped.has(key)) return;
    const days = {};
    weekdayOptions.forEach(day=>days[day]={regular:"",overtime:""});
    grouped.set(key,{
      employeeId:id,
      employeeName:a.employeeName,
      task:"未提交",
      project:"",
      unit:"",
      remark:"整周未提交",
      days:days,
      totalRegular:0,
      totalEveningOt:0,
      totalWeekendOt:0,
      missingAllWeek:true
    });
  });

  function excelClassForLevel(level){
    level = num(level);
    if(level === 1) return "soft";
    if(level >= 2) return "bad";
    return "";
  }
  function exportCell(value, className=""){
    return '<td class="' + className + '">' + excelEscape(value) + '</td>';
  }

  let html = '';
  html += '<!DOCTYPE html><html><head><meta charset="UTF-8">';
  html += '<style>';
  html += 'body{font-family:Arial,"Microsoft YaHei",sans-serif;color:#111827;margin:0;}';
  html += 'table{border-collapse:collapse;font-size:12px;}';
  // ✅ 按你截图：黑色细线、不加粗、颜色和页面接近
  html += 'th,td{border:1px solid #000000;padding:3px 5px;text-align:center;font-weight:400;white-space:nowrap;}';
  html += 'th{background:#ffffff;font-weight:400;}';
  html += '.title{font-size:16px;font-weight:400;text-align:left;background:#ffffff;}';
  html += '.subTitle{font-size:12px;font-weight:400;text-align:left;background:#ffffff;}';
  html += '.left{text-align:left;}';
  html += '.soft{background:#fff2cc;color:#7c4a03;font-weight:400;}';
  html += '.bad{background:#ffdede;color:#b91c1c;font-weight:400;}';
  html += '.missing td{background:#fff1f2;color:#b91c1c;font-weight:400;}';
  html += '</style></head><body>';
  html += '<table>';
  html += '<tr><td class="title" colspan="21">车间工时明细 - ' + excelEscape(state.week) + '</td></tr>';
  html += '<tr><td class="subTitle" colspan="21">导出时间：' + excelEscape(new Date().toLocaleString()) + '</td></tr>';
  html += '<tr><td class="subTitle" colspan="21">筛选条件：' + excelEscape(filterText) + '</td></tr>';
  html += '<tr><td colspan="21"></td></tr>';

  html += '<tr>';
  html += '<th rowspan="2">员工</th><th rowspan="2">工号</th><th rowspan="2">工时类别</th><th rowspan="2">项目号</th><th rowspan="2">单元号</th><th rowspan="2">备注</th>';
  ['周一','周二','周三','周四','周五'].forEach(day=>{ html += '<th colspan="2">' + day + '</th>'; });
  html += '<th>周六</th><th>周日</th><th colspan="3">汇总</th></tr>';
  html += '<tr>';
  for(let i=0;i<5;i++) html += '<th>正常<br>出勤</th><th>实际<br>加班</th>';
  html += '<th>实际<br>加班</th><th>实际<br>加班</th><th>正常<br>出勤</th><th>实际晚<br>上加班</th><th>实际周<br>末加班</th></tr>';

  Array.from(grouped.values()).sort((a,b)=>{

function batchSplitAmounts(total, count){
  const n = Math.max(1, Number(count) || 1);
  const totalQ = Math.round(num(total) * 4) / 4;
  const base = Math.floor((totalQ / n) * 4) / 4;
  let remainQ = Math.round((totalQ - base * n) * 4);
  const arr = Array(n).fill(base);
  for(let i=0;i<n && remainQ>0;i++,remainQ--){
    arr[i] = Math.round((arr[i] + 0.25) * 4) / 4;
  }
  return arr;
}

      catch(e){ results[i] = {ok:false, error:e}; }
