function isWorkOpenStatus(s){

}
function isProjectUnitOpen(project,unit){
  if(!project)return true;
  const key=String(project||'')+'|'+String(unit||'');
  if(unit&&projectUnitStatusMap&&Object.prototype.hasOwnProperty.call(projectUnitStatusMap,key))return isWorkOpenStatus(projectUnitStatusMap[key]);
  const ps=projectStatusMap?projectStatusMap[project]:'';
  if(String(ps||'').trim()==='混合')return true;
  return isWorkOpenStatus(ps);
}
function activeProjectList(){
  return Object.keys(projectUnits||{}).filter(p=>(projectUnits[p]||[]).some(u=>isProjectUnitOpen(p,u))||isProjectUnitOpen(p,''));
}
function activeUnitList(project){
  return (projectUnits[project]||[]).filter(u=>isProjectUnitOpen(project,u));
}
function activeDefaultProject(){
  const list=activeProjectList();
  return list[0]||Object.keys(projectUnits||{})[0]||'';
}
function isRecordProjectClosed(r){
  if(!r||isNoProjectType(r.type))return false;

function num(v){let n=parseFloat(v);return isNaN(n)?0:n}function getISOWeek(d){const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())),dayNum=date.getUTCDay()||7;date.setUTCDate(date.getUTCDate()+4-dayNum);const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));return Math.ceil((((date-yearStart)/86400000)+1)/7)}function getWeekNo(o=0){const d=new Date();d.setDate(d.getDate()+o*7);return "W"+String(getISOWeek(d)).padStart(2,"0")}function defaultRecord(){return {employee:currentUserName||employeeMap[currentLoginId]||"",empNo:currentLoginId,week:getWeekNo(currentWeekOffset),type:"机械组装",project:"",unit:"",remark:"",monN:0,monO:0,tueN:0,tueO:0,wedN:0,wedO:0,thuN:0,thuO:0,friN:0,friO:0,satO:0,sunO:0}}function toast(m){alert(m)}

/* ===== V6.3 相同前置信息自动合并 =====
   合并规则：同一员工、同一周、同一工时类别、项目号、单元号、备注完全一致时，
   周一到周日的工时数据自动汇总到同一行。
*/
function mergeRecordsByFrontInfo(list){
  if(!Array.isArray(list)||!list.length)return [];
  const fields=['monN','monO','tueN','tueO','wedN','wedO','thuN','thuO','friN','friO','satO','sunO'];
  const map=new Map();
  const out=[];
  list.forEach(r=>{
    if(!r)return;
    if(r.__empty){out.push(r);return;}
    const key=[r.empNo||'',r.employee||'',r.week||'',r.type||'',r.project||'',r.unit||'',r.remark||''].map(v=>String(v).trim()).join('\u0001');
    if(!map.has(key)){
      const nr={...r};
      fields.forEach(f=>nr[f]=num(nr[f]));
      map.set(key,nr);
      out.push(nr);
    }else{
      const nr=map.get(key);
      fields.forEach(f=>nr[f]=Math.round((num(nr[f])+num(r[f]))*100)/100);
    }
  });
  return out;
}

function logout(){stopAutoRefresh();stopLockRefresh();currentLoginId='';records=[];document.getElementById('mainApp').classList.add('locked');ensureLoginScreen();const loginKey=document.getElementById('loginKey');if(loginKey)loginKey.value='';const loginError=document.getElementById('loginError');if(loginError)loginError.innerText=''}function initLogin(){captureLoginScreenTemplate();ensureLoginScreen();document.getElementById('mainApp').classList.add('locked')}function weekDisplayName(o){const w=getWeekNo(o),locked=lockCache[w]===true;return w+(o===0?'（本周）':'')+(locked?' 🔒':'')}function renderWeekCards(id){const box=document.getElementById(id);if(!box)return;box.innerHTML='';[-2,-1,0].forEach(o=>{const w=getWeekNo(o),locked=lockCache[w]===true,b=document.createElement('button');b.className='week-card'+(o===currentWeekOffset?' current':'')+(locked?' locked':'');b.innerText=weekDisplayName(o);b.onclick=()=>setWeekOffset(o);box.appendChild(b)})}function refreshWeekDisplay(){renderWeekCards('weekCardRow');renderWeekCards('adminWeekCardRow')}async function refreshVisibleLockStates(){try{const weeks=[-2,-1,0].map(o=>getWeekNo(o));const d=await apiCall('getLocks',{weeks});lockCache=d.locks||{};currentWeekLocked=lockCache[getWeekNo(currentWeekOffset)]===true}catch(e){lockCache={};currentWeekLocked=false}}async function setWeekOffset(o){await saveData();currentWeekOffset=o;await refreshVisibleLockStates();refreshWeekDisplay();await loadData();renderEmp();if(document.getElementById('adminView').style.display!=='none')renderAdmin()}async function lockWeek(){try{const week=getWeekNo(currentWeekOffset);await apiCall('setLock',{week,locked:true,lockedBy:currentLoginId});lockCache[week]=true;currentWeekLocked=true;refreshWeekDisplay();renderAdminStats(records);toast('已锁定')}catch(e){toast('云端锁定失败')}}async function unlockWeek(){try{const week=getWeekNo(currentWeekOffset);await apiCall('setLock',{week,locked:false,lockedBy:currentLoginId});lockCache[week]=false;currentWeekLocked=false;refreshWeekDisplay();renderAdminStats(records);toast('已解锁')}catch(e){toast('云端解锁失败')}}function isLocked(){return currentWeekLocked===true}
const WORKDAY_FIELD_INDEX={monN:1,monO:1,tueN:2,tueO:2,wedN:3,wedO:3,thuN:4,thuO:4,friN:5,friO:5};
function weekNumberOnly(w){const n=parseInt(String(w||'').replace(/[^0-9]/g,''),10);return isNaN(n)?0:n}
function shouldCheckFieldForAnomaly(k){
  const dayIndex=WORKDAY_FIELD_INDEX[k];
  if(!dayIndex)return true;
  const selected=weekNumberOnly(getWeekNo(currentWeekOffset));
  const current=weekNumberOnly(getWeekNo(0));
  if(selected<current)return true;
  if(selected>current)return false;
  const today=new Date().getDay();
  if(today===0||today===6)return true;
  return dayIndex<today;
}
function checkedNormalFields(){return ['monN','tueN','wedN','thuN','friN'].filter(k=>shouldCheckFieldForAnomaly(k))}
function expectedNormalHours(){return checkedNormalFields().length*8}
function normalTotal(r){return num(r.monN)+num(r.tueN)+num(r.wedN)+num(r.thuN)+num(r.friN)}function weekdayOT(r){return num(r.monO)+num(r.tueO)+num(r.wedO)+num(r.thuO)+num(r.friO)}function weekendOT(r){return num(r.satO)+num(r.sunO)}function normalClass(v){v=num(v);if(v===8)return'day-ok';if(v===0)return'day-over';if(v>0&&v<8)return'day-warn';if(v>8)return'day-over';return'day-ok'}function otClass(v){v=num(v);if(v===0||v===4)return'day-ok';if(v>0&&v<4)return'day-warn';if(v>4)return'day-over';return'day-ok'}function totalNormalClass(v){v=num(v);const exp=expectedNormalHours();if(v===exp)return'day-ok';if(v===0)return exp===0?'day-ok':'day-over';if(v>0&&v<exp)return'day-warn';if(v>exp)return'day-over';return'day-ok'}function sumField(f,l=records){return l.reduce((a,r)=>a+num(r[f]),0)}const DAY_FIELDS={monN:{type:'N'},monO:{type:'O'},tueN:{type:'N'},tueO:{type:'O'},wedN:{type:'N'},wedO:{type:'O'},thuN:{type:'N'},thuO:{type:'O'},friN:{type:'N'},friO:{type:'O'}};function cellClass(k){const d=DAY_FIELDS[k];if(!d)return'';if(!shouldCheckFieldForAnomaly(k))return'day-ok';const t=sumField(k);return d.type==='N'?normalClass(t):otClass(t)}function employeeFieldTotal(r,k){const emp=String((r&&r.empNo)||'');return records.filter(x=>String(x.empNo||'')===emp).reduce((a,x)=>a+num(x[k]),0)}function adminCellClass(r,k){const d=DAY_FIELDS[k];if(!d)return'';if(!shouldCheckFieldForAnomaly(k))return'day-ok';const t=employeeFieldTotal(r,k);return d.type==='N'?normalClass(t):otClass(t)}
function timeInputCell(i,k,v,admin=false,r=null){if(admin){const dis=(isLocked()||!r||r.__empty)?'disabled':'';return `<td class="${adminCellClass(r,k)}"><input class="admin-time-input no-password-manager" type="number" inputmode="decimal" min="0" step="0.25" value="${num(v)}" ${dis} onchange="adminUpdateCell(${i},'${k}',this.value)" onfocus="this.select()"></td>`;}return `<td class="${cellClass(k)}"><div class="time-wrap"><input class="time-cell no-password-manager" type="number" inputmode="decimal" min="0" step="0.25" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" data-lpignore="true" data-1p-ignore="true" data-bwignore="true" data-form-type="other" aria-autocomplete="none" value="${num(v)===0?'':num(v)}" ${isLocked()?'disabled':''} onchange="updateCell(${i},'${k}',this.value)" onfocus="this.select();setActiveCell(this)"></div></td>`}async function updateCell(i,k,value){if(isLocked())return toast('本周已锁定，不能修改工时');if(isRecordProjectClosed(records[i]))return toast('该项目/单元已完成或已发货，不能继续填写工时');let v=num(value);if(v<0)v=0;const limits={monN:8,tueN:8,wedN:8,thuN:8,friN:8,monO:4,tueO:4,wedO:4,thuO:4,friO:4};if(limits[k]!==undefined){const used=records.reduce((a,r,idx)=>idx===i?a:a+num(r[k]),0);const remain=Math.max(0,Math.round((limits[k]-used)*100)/100);if(v>remain){v=remain;toast('超出当天可填上限，已自动校正为剩余可填工时：'+remain)}}records[i][k]=v;await saveData();renderEmp()}function setActiveCell(input){document.querySelectorAll('.active-input').forEach(e=>e.classList.remove('active-input'));input.classList.add('active-input')}

function sumFoot(admin=false,list=records){
  const s={monN:0,monO:0,tueN:0,tueO:0,wedN:0,wedO:0,thuN:0,thuO:0,friN:0,friO:0,satO:0,sunO:0,n:0,w:0,e:0};

function employeeFieldTotalFromList(emp,k,list=records){return (list||records).filter(x=>String(x.empNo||'')===String(emp||'')).reduce((a,x)=>a+num(x[k]),0)}
function isEmployeeAnomalous(emp,list=records){
  emp=String(emp||'');
  if(!emp)return false;
  const nFields=['monN','tueN','wedN','thuN','friN'].filter(k=>shouldCheckFieldForAnomaly(k));
  const oFields=['monO','tueO','wedO','thuO','friO'].filter(k=>shouldCheckFieldForAnomaly(k));
  if(!nFields.length&&!oFields.length)return false;
  const normalSum=nFields.reduce((a,k)=>a+employeeFieldTotalFromList(emp,k,list),0);
  const expected=nFields.length*8;
  if(normalSum!==expected)return true;
  for(const k of nFields){
    if(employeeFieldTotalFromList(emp,k,list)!==8)return true;
  }
  for(const k of oFields){
    const v=employeeFieldTotalFromList(emp,k,list);
    if(v!==0&&v!==4)return true;
  }
  return false;
}
function makeEmptyAdminRecord(empNo){return {__empty:true,employee:employeeMap[empNo]||'',empNo:String(empNo),week:getWeekNo(currentWeekOffset),type:'未填报',project:'',unit:'',remark:'未填报',monN:0,monO:0,tueN:0,tueO:0,wedN:0,wedO:0,thuN:0,thuO:0,friN:0,friO:0,satO:0,sunO:0}}
function getAdminBaseRecords(){
  const list=Array.isArray(records)?[...records]:[];
  const has=new Set(list.map(r=>String(r.empNo||'')).filter(Boolean));
  adminEmployeeNos().forEach(no=>{if(!has.has(String(no)))list.push(makeEmptyAdminRecord(no))});
  return list;
}
function adminEmployeeSeverity(emp,list=records){
  emp=String(emp||'');
  if(!emp)return 0;
  const hasReal=(list||[]).some(r=>String(r.empNo||'')===emp&&!r.__empty);
  if(!hasReal)return 2;
  let warn=0;
  const nFields=['monN','tueN','wedN','thuN','friN'].filter(k=>shouldCheckFieldForAnomaly(k));
  const oFields=['monO','tueO','wedO','thuO','friO'].filter(k=>shouldCheckFieldForAnomaly(k));
  for(const k of nFields){const v=employeeFieldTotalFromList(emp,k,list);if(v===0||v>8)return 2;if(v>0&&v<8)warn=1;}
  for(const k of oFields){const v=employeeFieldTotalFromList(emp,k,list);if(v>4)return 2;if(v>0&&v<4)warn=1;}
  return warn;
}
function adminSeverityText(sev){return sev>=2?'严重异常':(sev===1?'轻微异常':'正常')}
function getAdminDisplayRecords(){
  const list=getAdminBaseRecords();
  return list.map((r,idx)=>({r,idx,sev:adminEmployeeSeverity(r.empNo,list)}))
    .filter(x=>!adminAnomalyOnly||x.sev>0)
    .sort((a,b)=>b.sev-a.sev||a.idx-b.idx)
    .map(x=>x.r);
}
function showAdminAbnormalList(){
  const list=getAdminBaseRecords();
  const lines=[];
  adminEmployeeNos().forEach(no=>{
    const sev=adminEmployeeSeverity(no,list);
    if(sev>0)lines.push(`${employeeMap[no]||''}（${no}） - ${adminSeverityText(sev)}`);
  });
  if(lines.length){
    alert('异常/未填报名单：\n\n'+lines.map((x,i)=>(i+1)+'. '+x).join('\n'));
  }else{
    alert('当前没有未填报或异常人员');
  }
}

function renderAdminStats(list=records){const box=document.getElementById('adminStats');if(!box)return;let n=0,w=0,e=0;list.forEach(r=>{n+=normalTotal(r);w+=weekdayOT(r);e+=weekendOT(r)});const saveText=currentAutoSaveText();box.innerHTML=`<div class="stat-grid admin-stat-grid"><div class="stat-card"><div class="stat-main"><span class="stat-icon">👥</span><span class="stat-num">${adminFilledTotalText()}</span></div><div class="stat-label">员工填报</div></div><div class="stat-card"><div class="stat-main"><span class="stat-icon">📋</span><span class="stat-num">${list.length}</span></div><div class="stat-label">明细行</div></div><div class="stat-card"><div class="stat-main"><span class="stat-icon">⏱️</span><span class="stat-num">${n}</span></div><div class="stat-label">正常工时</div></div><div class="stat-card"><div class="stat-main"><span class="stat-icon">🌙</span><span class="stat-num">${w}</span></div><div class="stat-label">工作日加班</div></div><div class="stat-card"><div class="stat-main"><span class="stat-icon">📅</span><span class="stat-num">${e}</span></div><div class="stat-label">周末加班</div></div><div class="stat-card stat-save-card"><div class="stat-main save-main"><span class="stat-icon">✅</span><span class="autosave-badge admin-save-badge"><span class="autosave-dot"></span><span class="autosaveText">${saveText}</span></span></div><div class="stat-label">保存状态</div></div></div>`}
async function reloadData(){try{await loadData();renderEmp();if(document.getElementById('adminView').style.display!=='none')renderAdmin()}catch(e){toast('刷新失败')}}
async function checkLockRealtime(silent=false){try{if(!currentLoginId)return;const weeks=[-2,-1,0].map(o=>getWeekNo(o));const currentWeek=getWeekNo(currentWeekOffset);const oldLocked=currentWeekLocked===true;const oldCache=JSON.stringify(lockCache||{});const d=await apiCall('getLocks',{weeks,_t:Date.now()});weeks.forEach(w=>{lockCache[w]=d.locks&&d.locks[w]===true});const newLocked=lockCache[currentWeek]===true;currentWeekLocked=newLocked;refreshWeekDisplay();if(newLocked!==oldLocked){if(currentUserRole==='employee'){renderEmp();if(!silent)toast(newLocked?'本周已被管理员锁定，已禁止新增、修改和删除':'本周已解锁，可以继续填写')}else{renderAdminStats(records)}}else if(JSON.stringify(lockCache||{})!==oldCache){refreshWeekDisplay()}}catch(e){console.error(e)}}function startLockRefresh(){stopLockRefresh();checkLockRealtime(true);lockRefreshTimer=setInterval(()=>checkLockRealtime(false),2000)}function stopLockRefresh(){if(lockRefreshTimer){clearInterval(lockRefreshTimer);lockRefreshTimer=null}}function startAutoRefresh(){stopAutoRefresh();autoRefreshTimer=setInterval(async()=>{if(document.getElementById('adminView').style.display==='none')return;await loadData();renderAdmin()},30000)}function stopAutoRefresh(){if(autoRefreshTimer){clearInterval(autoRefreshTimer);autoRefreshTimer=null}}function showEmp(){document.getElementById('mainApp').classList.remove('admin-mode');document.getElementById('empView').style.display='block';document.getElementById('adminView').style.display='none';stopAutoRefresh();renderEmp();startLockRefresh()}function showAdmin(){if(currentUserRole!=='admin')return toast('只有管理员可以进入后台');document.getElementById('mainApp').classList.add('admin-mode');document.getElementById('empView').style.display='none';document.getElementById('adminView').style.display='block';renderAdmin();startAutoRefresh();startLockRefresh()}
async function delRow(i){if(isLocked())return toast('本周已锁定');const r=records[i]||{};const msg=`确认删除该条工时记录吗？\n\n工时类别：${r.type||''}    项目号：${r.project||'无'}\n单元号：${r.unit||'无'}    备注：${r.remark||''}\n正常汇总：${normalTotal(r)}    工作日加班：${weekdayOT(r)}\n周末加班：${weekendOT(r)}`;if(!confirm(msg))return;records.splice(i,1);await saveData();renderEmp()}function editRow(i){const r=records[i];if(isRecordProjectClosed(r))return toast('该项目/单元已完成或已发货，不能编辑前置信息');modalState={type:r.type,project:r.project||activeDefaultProject(),units:r.unit?[r.unit]:[],remark:r.remark,editIndex:i};document.getElementById('customRemark').value=modalState.remark;document.getElementById('addModal').style.display='flex';renderModalAll()}const LAST_MODAL_SELECTION_KEY='timesheet_last_modal_selection_v5111';function loadLastModalSelection(){try{const d=JSON.parse(localStorage.getItem(LAST_MODAL_SELECTION_KEY)||'{}');if(d&&workTypes.includes(d.type)){return d}}catch(e){}return null}function saveLastModalSelection(){try{if(modalState.editIndex!==undefined)return;localStorage.setItem(LAST_MODAL_SELECTION_KEY,JSON.stringify({type:modalState.type,project:modalState.project,remark:modalState.remark}))}catch(e){}}function resetModal(){const saved=loadLastModalSelection();const t=saved&&workTypes.includes(saved.type)?saved.type:workTypes[0];const ap=activeProjectList();const p=saved&&saved.project&&ap.includes(saved.project)?saved.project:activeDefaultProject();const rm=saved&&saved.remark?saved.remark:(remarkMap[t]||[])[0]||'';modalState={type:t,project:noProjectTypes.includes(t)?'':p,units:[],remark:rm};document.getElementById('customRemark').value=modalState.remark;initSmartSplitDefaults()}function openAddModal(){if(isLocked())return toast('本周已锁定，不能新增');resetModal();document.getElementById('addModal').style.display='flex';renderModalAll()}function closeAddModal(){document.getElementById('addModal').style.display='none'}window.addEventListener('resize',()=>{if(document.getElementById('addModal')&&document.getElementById('addModal').style.display==='flex')updateModalSummary(false)});
function syncProjectUnitVisibility(){const noProject=isNoProjectType();['projectSection','unitSection'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.toggle('hidden-by-type',noProject)});const tip=document.getElementById('noProjectTip');if(tip)tip.style.display=noProject?'block':'none'}
function renderModalAll(){syncProjectUnitVisibility();renderModalTypes();renderModalProjects();renderModalUnits();renderModalRemarks();updateModalSummary();updateSplitRemaining();hardenMobileInputs()}function isMobileModal(){return window.matchMedia&&window.matchMedia('(max-width:760px)').matches}function generateButtonLabel(count){return isMobileModal()?`✅生成${count}条`:`✅ 确定生成 ${count} 条`}function saveButtonLabel(){return isMobileModal()?'保存':'保存前置信息'}function updateModalSummary(syncSplit=true){const noProject=isNoProjectType();const sc=document.getElementById('selectedCount');if(sc)sc.innerText=`已选 ${modalState.units.length} 个`;const btn=document.getElementById('generateBtn');const count=noProject?1:modalState.units.length;if(btn&&!btn.disabled)btn.innerText=modalState.editIndex!==undefined?saveButtonLabel():generateButtonLabel(count);syncProjectUnitVisibility();if(syncSplit)updateSplitRemaining(false)}function makeBtn(t,a,fn){const b=document.createElement('button');b.className='choice-btn'+(a?' active':'');b.innerText=t;b.onclick=fn;return b}function renderModalTypes(){const box=document.getElementById('modalTypeBox');box.innerHTML='';workTypes.forEach(t=>box.appendChild(makeBtn(t,modalState.type===t,()=>{modalState.type=t;modalState.remark=(remarkMap[t]||[])[0]||'';if(isNoProjectType(t)){modalState.project='';modalState.units=[]}else if(!modalState.project){modalState.project=Object.keys(projectUnits)[0]}document.getElementById('customRemark').value=modalState.remark;renderModalAll()})))}function renderModalProjects(){const box=document.getElementById('modalProjectBox');box.innerHTML='';const ps=activeProjectList();if(!ps.length){box.innerHTML='<div class="empty">暂无进行中项目</div>';return}if(!ps.includes(modalState.project)){modalState.project=ps[0];modalState.units=[]}ps.forEach(p=>box.appendChild(makeBtn(p,modalState.project===p,()=>{modalState.project=p;modalState.units=[];renderModalAll()})))}function renderModalUnits(){const n=document.getElementById('unitNormalBox'),c=document.getElementById('unitContainerBox');n.innerHTML='';c.innerHTML='';const columns=document.querySelector('.unit-columns'),containerPanel=c?c.closest('.unit-panel'):null;if(columns)columns.classList.add('single-unit-panel');if(containerPanel)containerPanel.style.display='none';if(isNoProjectType()){n.innerHTML='<div class="empty">无需选择</div>';return}const us=activeUnitList(modalState.project);function add(box,u){box.appendChild(makeBtn(u,modalState.units.includes(u),()=>{modalState.units.includes(u)?modalState.units=modalState.units.filter(x=>x!==u):modalState.units.push(u);renderModalUnits();updateModalSummary()}))}us.forEach(u=>add(n,u));if(!us.length)n.innerHTML='<div class="empty">暂无进行中单元/容器</div>'}function renderModalRemarks(){const box=document.getElementById('modalRemarkBox');box.innerHTML='';(remarkMap[modalState.type]||[]).forEach(r=>box.appendChild(makeBtn(r,modalState.remark===r,()=>{modalState.remark=r;document.getElementById('customRemark').value=r;renderModalRemarks();updateModalSummary()})))}function applyCustomRemark(){modalState.remark=document.getElementById('customRemark').value.trim();renderModalRemarks();updateModalSummary()}function selectAllUnits(){if(isNoProjectType())return;modalState.units=[...activeUnitList(modalState.project)];renderModalUnits();updateModalSummary()}function clearUnits(){modalState.units=[];renderModalUnits();updateModalSummary()}

function todaySplitDayKey(){const d=new Date().getDay();return ['sun','mon','tue','wed','thu','fri','sat'][d]||'mon'}
function splitFieldFor(day,type){const map={mon:{normal:'monN',weekdayOT:'monO'},tue:{normal:'tueN',weekdayOT:'tueO'},wed:{normal:'wedN',weekdayOT:'wedO'},thu:{normal:'thuN',weekdayOT:'thuO'},fri:{normal:'friN',weekdayOT:'friO'},sat:{weekendOT:'satO'},sun:{weekendOT:'sunO'}};return map[day]&&map[day][type]}
function splitLimitFor(type){if(type==='normal')return 8;if(type==='weekdayOT')return 4;if(type==='weekendOT')return 24;return 0}
function splitRemainingFor(day,type){const key=splitFieldFor(day,type),limit=splitLimitFor(type);if(!key||!limit)return 0;const used=records.reduce((a,r)=>a+num(r[key]),0);return Math.max(0,Math.round((limit-used)*100)/100)}
function chooseSmartSplitType(day){if(day==='sat'||day==='sun')return 'weekendOT';const normalRemain=splitRemainingFor(day,'normal');if(normalRemain>0)return 'normal';const otRemain=splitRemainingFor(day,'weekdayOT');if(otRemain>0)return 'weekdayOT';return 'normal'}
function initSmartSplitDefaults(){const enabled=document.getElementById('splitEnabled'),dayEl=document.getElementById('splitDay'),typeEl=document.getElementById('splitType'),totalEl=document.getElementById('splitTotal');const day=todaySplitDayKey();if(dayEl)dayEl.value=day;if(typeEl)typeEl.value=chooseSmartSplitType(day);if(enabled)enabled.checked=true;if(totalEl)totalEl.value='';updateSplitRemaining(true)}
function onSplitDayChange(){const dayEl=document.getElementById('splitDay'),typeEl=document.getElementById('splitType');if(dayEl&&typeEl)typeEl.value=chooseSmartSplitType(dayEl.value);updateSplitRemaining(true)}
function onSplitTypeChange(){updateSplitRemaining(true)}
function getSplitKey(){const day=document.getElementById('splitDay').value,type=document.getElementById('splitType').value;return splitFieldFor(day,type)}function getSplitLimit(){return splitLimitFor(document.getElementById('splitType').value)}function getSplitRemaining(){const day=document.getElementById('splitDay').value,type=document.getElementById('splitType').value;return splitRemainingFor(day,type)}function updateSplitRemaining(forceMax=false){const remain=getSplitRemaining(),txt=document.getElementById('splitRemainText'),inp=document.getElementById('splitTotal'),enabled=document.getElementById('splitEnabled'),btn=document.getElementById('generateBtn');if(txt)txt.innerText='最大可填：'+remain;if(inp&&(forceMax||!inp.value||num(inp.value)>remain))inp.value=remain>0?remain:'';if(btn&&enabled&&enabled.checked&&remain<=0){btn.disabled=true;btn.innerText=isMobileModal()?'无可填':'当前无可分配工时'}else if(btn){btn.disabled=false;updateModalSummary(false)}}function guardSplitTotal(){const inp=document.getElementById('splitTotal');const remain=getSplitRemaining();if(num(inp.value)>remain)inp.value=remain;if(num(inp.value)<0)inp.value=0}function applySplit(rows){if(!document.getElementById('splitEnabled').checked)return;const total=num(document.getElementById('splitTotal').value);const key=getSplitKey();const remain=getSplitRemaining();if(!key||!rows.length||remain<=0)return;let finalTotal=total<=0?remain:Math.min(total,remain);const unit=0.25,totalUnits=Math.round(finalTotal/unit),base=Math.floor(totalUnits/rows.length),extra=totalUnits%rows.length;rows.forEach((r,i)=>{let units=base+(i<extra?1:0);r[key]=units*unit})}
async function generateRowsFromModal(){applyCustomRemark();if(document.getElementById('splitEnabled')&&document.getElementById('splitEnabled').checked&&getSplitRemaining()<=0)return toast('当前日期和类型没有可分配工时');if(!modalState.type)return toast('请选择工时类别');const noProject=isNoProjectType();if(!noProject){if(!modalState.project)return toast('请选择项目号');if(!activeProjectList().includes(modalState.project))return toast('该项目已完成或已发货，不能新增工时');if(!modalState.units.length)return toast('请选择至少一个单元');if(modalState.units.some(u=>!isProjectUnitOpen(modalState.project,u)))return toast('所选单元包含已完成或已发货状态，不能新增工时')}if(modalState.editIndex!==undefined){const i=modalState.editIndex;Object.assign(records[i],{type:modalState.type,project:noProject?'':modalState.project,unit:noProject?'':(modalState.units[0]||''),remark:modalState.remark});records=mergeRecordsByFrontInfo(records);await saveData();renderEmp();closeAddModal();return}let rows=noProject?[{...defaultRecord(),type:modalState.type,project:'',unit:'',remark:modalState.remark}]:modalState.units.map(u=>({...defaultRecord(),type:modalState.type,project:modalState.project,unit:u,remark:modalState.remark}));applySplit(rows);records.push(...rows);records=mergeRecordsByFrontInfo(records);saveLastModalSelection();await saveData();renderEmp();closeAddModal()}function exportCSV(){
  const list=getAdminDisplayRecords();
  const esc=v=>String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const bgByClass=cls=>cls==='day-over'?'#ffd6d6':(cls==='day-warn'?'#fff3bf':'#ffffff');
  const td=(v,bg='#ffffff')=>`<td style="mso-number-format:'\@';border:1px solid #d7e0ea;background:${bg};padding:4px;text-align:center;">${esc(v)}</td>`;
  const headers=['姓名','周数','工时类别','项目号','单元号','正常汇总','工作日加班','周末加班','备注'];
  let rows=`<tr>${headers.map(h=>`<th style="border:1px solid #d7e0ea;background:#e8edf3;padding:5px;text-align:center;">${h}</th>`).join('')}</tr>`;
  list.forEach(r=>{
    const sev=adminEmployeeSeverity(r.empNo,getAdminBaseRecords());
    const frontBg=sev>=2?'#ffd6d6':(sev===1?'#fff3bf':'#ffffff');
    const n=normalTotal(r),w=weekdayOT(r),e=weekendOT(r);
    rows+=`<tr>${td(r.employee||'',frontBg)}${td(r.week||'',frontBg)}${td(r.type||'',frontBg)}${td(r.project||'',frontBg)}${td(r.unit||'',frontBg)}${td(n,bgByClass(totalNormalClass(n)))}${td(w,bgByClass(otClass(w)))}${td(e,'#e0f2fe')}${td(r.remark||'',frontBg)}</tr>`;
  });
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body><table>${rows}</table></body></html>`;
  const blob=new Blob(['\ufeff'+html],{type:'application/vnd.ms-excel;charset=utf-8;'}),a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='车间工时_V6.3_管理导出.xls';a.click();URL.revokeObjectURL(a.href)
}

function hardenMobileInputs(){
  document.querySelectorAll('input').forEach(inp=>{
    if(inp.id==='loginEmpNo'){
      inp.setAttribute('autocomplete','username');
      inp.setAttribute('autocorrect','off');
      inp.setAttribute('autocapitalize','off');
      inp.setAttribute('spellcheck','false');
      inp.removeAttribute('data-lpignore');
      inp.removeAttribute('data-form-type');
      inp.classList.remove('no-password-manager');
      return;
    }
    if(inp.id==='loginKey'){
      inp.setAttribute('type','password');
      inp.setAttribute('autocomplete','current-password');
      inp.setAttribute('autocorrect','off');
      inp.setAttribute('autocapitalize','off');
      inp.setAttribute('spellcheck','false');
      inp.removeAttribute('data-lpignore');
      inp.removeAttribute('data-form-type');
      inp.classList.remove('no-password-manager');
      return;
    }
    inp.setAttribute('autocomplete','off');
    inp.setAttribute('autocorrect','off');
    inp.setAttribute('autocapitalize','off');
    inp.setAttribute('spellcheck','false');
    inp.setAttribute('aria-autocomplete','none');
    inp.setAttribute('data-lpignore','true');
    inp.setAttribute('data-1p-ignore','true');
    inp.setAttribute('data-bwignore','true');
    inp.setAttribute('data-form-type','other');
    inp.setAttribute('data-np-autofill','false');
    if(inp.type!=='password')inp.setAttribute('inputmode',inp.type==='number'?'decimal':(inp.getAttribute('inputmode')||'text'));
    inp.classList.add('no-password-manager');
  });
}
function initLoginEnterKey(){
  ['loginEmpNo','loginKey'].forEach(id=>{
    const el=document.getElementById(id);
    if(!el || el.dataset.enterBound==='1')return;
    el.dataset.enterBound='1';
    el.addEventListener('keydown',e=>{
      if(e.key==='Enter'){
        e.preventDefault();
        doLogin();
      }
    });
  });
}
function adjustAdminStickyHeader(){
  const app=document.getElementById('mainApp');
  const adminView=document.getElementById('adminView');
  if(!app || !adminView || adminView.style.display==='none')return;
  const header=document.querySelector('.header');
  const top=document.querySelector('#adminView .admin-top-sticky');
  const headerH=header?Math.ceil(header.getBoundingClientRect().height):0;
  const topH=top?Math.ceil(top.getBoundingClientRect().height):0;
  app.style.setProperty('--admin-table-head-top',(headerH+topH)+'px');
}
initLogin();hardenMobileInputs();initLoginEnterKey();window.addEventListener('resize',adjustAdminStickyHeader);window.addEventListener('load',adjustAdminStickyHeader);
