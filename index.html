*{box-sizing:border-box;font-weight:normal}body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:13px}.app{width:100%;margin:0 auto}.header{background:linear-gradient(90deg,var(--primary),var(--primary2));color:#fff;text-align:center;padding:11px 8px;font-size:16px;letter-spacing:1px;position:sticky;top:0;z-index:200}.role-switch{display:flex;gap:8px;justify-content:center;padding:8px;background:#f8fafc;position:sticky;top:39px;z-index:190;border-bottom:1px solid var(--line)}button,select,input{font-family:inherit;font-size:13px}button{padding:7px 10px;border:none;border-radius:7px;background:#e7edf5;color:#123;cursor:pointer;min-height:32px}button.primary{background:var(--primary2);color:#fff}button.ok{background:var(--ok);color:#fff}button.danger{background:var(--danger);color:#fff}.card{background:var(--card);margin:7px;border-radius:10px;padding:8px;box-shadow:0 1px 3px rgba(0,0,0,.08)}.info{display:flex;gap:10px;flex-wrap:wrap;align-items:center;line-height:1.8}.badge{display:inline-block;padding:2px 8px;border-radius:99px;background:#e8f3ff;color:#1f4e79;font-size:12px}.bar{display:flex;gap:7px;flex-wrap:wrap;align-items:center}.notice{color:#607080;font-size:12px}.autosave-badge{display:inline-flex;align-items:center;gap:5px;height:28px;padding:0 10px;border-radius:999px;background:#eafaf0;color:#15803d;font-size:12px;font-weight:bold}.autosave-badge.saving{background:#fff7ed;color:#c2410c}.autosave-dot{width:7px;height:7px;border-radius:50%;background:#22c55e}.autosave-badge.saving .autosave-dot{background:#f97316}.week-section{background:#fff;margin:7px;border-radius:10px;padding:7px;box-shadow:0 1px 3px rgba(0,0,0,.08)}.week-title{font-weight:bold;color:#1f4e79;border-left:4px solid #2f75b5;padding-left:7px;margin-bottom:7px}.week-card-row{display:grid;grid-template-columns:repeat(4,minmax(72px,1fr));gap:5px}.week-card{height:32px;border-radius:7px;border:1px solid #b7d4f1;background:#e8f3ff;color:#1f y!important;left:114px!important;background:#fff;z-index:70}.work-table thead tr:first-child th:nth-child(4),.work-table tbody td:nth-child(4),.work-table tfoot td:nth-child(4){position:sticky!important;left:162px!important;background:#fff;z-index:70;box-shadow:3px 0 5px rgba(0,0,0,.08)}.work-table thead tr:first-child th:nth-child(-n+4){background:var(--head)!important;z-index:95!important}.work-table tfoot td:nth-child(-n+4){background:#f8fafc!important;z-index:90!important}.time-wrap{width:28px;min-width:28px;max-width:28px;margin:auto}.time-cell{width:28px;min-width:28px;max-width:28px;height:22px;border:1px solid #c7d2de;border-radius:5px;text-align:center;font-size:10.5px;padding:0;background:#fff}.time-cell:focus{outline:2px solid #1e90ff;background:#eef8ff}.day-ok{background:#fff!important}.day-zero{background:#ffe4e6!important}.day-warn{background:#fff7cc!important}.day-over{background:#ffd6d6!important;color:#991b1b;font-weight:bold}.action-btn{padding:3px 5px;min-height:25px;border-radius:5px;font-size:11px}.empty{padding:22px;text-align:center;color:#6b7280}.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.46);display:none;z-index:1000;align-items:flex-start;justify-content:center;padding:44px 8px 8px}.modal-panel{width:100%;max-width:880px;max-height:90vh;background:#fff;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.25);overflow:hidden;display:flex;flex-direction:column}.modal-head{height:50px;background:#eaf1f8;display:flex;align-items:center;justify-content:space-between;padding:0 12px;font-weight:bold}.modal-close{background:#eef0f3;color:#111}.modal-body{padding:10px;overflow:auto}.modal-summary{border:1px solid #aee0ff;background:#eefaff;color:#005a8d;border-radius:10px;padding:8px 10px;margin-bottom:8px;font-weight:bold}.section-title{border-left:4px solid var(--blue);padding-left:7px;margin:9px 0 7px;color:#0b4778;font-weight:bold}.choice-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.choice-btn{border:1px solid #d8e2ec;background:#f7fbff;color:#0b5286;border-radius:8px;padding:8px 4px;text-align:center;min-height:34px}.choice-btn.active{background:#d9f7e4;border:2px solid #16a34a;color:#137333;padding:7px 3px}.unit-tools{display:flex;gap:7px;align-items:center;margin:5px 0 7px}.small-pill{background:#eaf6ff;color:#0b5286;border-radius:8px;padding:5px 10px;min-height:28px}.unit-columns{display:grid;grid-template-columns:1fr 1fr;gap:7px}.unit-panel{border:1px solid #d6e2ee;border-radius:12px;overflow:hidden;background:#fff;min-height:240px}.unit-panel-title{padding:8px;text-align:center;background:#e8f5ff;color:#005a8d;font-weight:bold;border-bottom:1px solid #d6e2ee}.unit-panel.container .unit-panel-title{background:#fff3df;color:#b45f00}.unit-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;padding:6px}.remark-line{display:flex;gap:7px}.remark-line input{flex:1;border:1px solid #c7d7e7;border-radius:9px;padding:0 10px;height:36px;font-weight:bold}.apply-btn{background:#0078d4;color:#fff;min-width:64px}.split-box{border:1px solid #d6e2ee;border-radius:12px;padding:8px;background:#fbfdff}.split-row{display:flex;align-items:center;gap:4px;flex-wrap:nowrap;white-space:nowrap}.split-row label{font-size:11px;min-width:60px;white-space:nowrap}.split-row select{width:66px;min-width:60px;height:30px;font-size:11px;padding:0 5px;border:1px solid #d6e2ee;border-radius:8px;background:#fff}.split-row input{width:54px;min-width:50px;height:30px;font-size:11px;padding:0 5px;border:1px solid #d6e2ee;border-radius:8px;background:#fff}.muted{font-size:11px;color:#607080;margin-top:6px}.modal-foot{display:flex;gap:9px;padding:10px;background:#fff;border-top:1px solid #eef2f6;position:sticky;bottom:0}.modal-foot button{flex:1;height:40px}.generate-btn{background:#16a34a;color:#fff;font-weight:bold}.cancel-btn{background:#f3f4f6;color:#111}@media(min-width:1024px){.app,.header,.role-switch{max-width:1440px;margin-left:auto;margin-right:auto}.table-wrap{max-height:calc(100vh - 230px)}.work-table{min-width:1160px;font-size:12px}.work-table col.c-type{width:68px}.work-table col.c-project{width:70px}.work-table col.c-unit{width:60px}.work-table col.c-remark{width:76px}.work-table col.c-time{width:42px}.work-table col.c-sum{width:54px}.work-table col.c-action{width:56px}.work-table thead tr:first-child th:nth-child(2),.work-table tbody td:nth-child(2),.work-table tfoot td:nth-child(2){left:68px!important}.work-table thead tr:first-child th:nth-child(3),.work-table tbody td:nth-child(3),.work-table tfoot td:nth-child(3){left:138px!important}.work-table thead tr:first-child th:nth-child(4),.work-table tbody td:nth-child(4),.work-table tfoot td:nth-child(4){left:198px!important}.time-wrap{width:34px;min-width:34px;max-width:34px}.time-cell{width:34px;min-width:34px;max-width:34px;height:24px;font-size:12px}}
</style>

<body>
<div class="app">
<div class="header">车间工时填报系统 V4.4.3</div>
<div class="role-switch"><button class="primary" onclick="showEmp()">员工界面</button><button onclick="showAdmin()">管理员界面</button></div>
<div id="empView">
  <div class="card info"><span>员工：<b id="empName">测试</b></span><span>工号：<b id="empNo">000001</b></span><span class="badge">已验证</span></div>
  <div class="week-section"><div class="week-title">Week</div><div class="week-card-row" id="weekCardRow"></div></div>
  <div class="card bar"><button class="ok" onclick="openAddModal()">新增一行</button><span class="autosave-badge"><span class="autosave-dot"></span><span class="autosaveText">已自动保存</span></span><span class="notice">V4.4.3：统一列宽终极修复｜滑动稳定｜弹窗一行</span></div>
  <div class="card table-wrap"><table class="work-table" id="empTable"></table></div>
</div>
<div id="adminView" style="display:none;">
  <div class="card info"><span>管理员：Manager</span><span class="badge">本地数据后台</span></div>
  <div class="week-section"><div class="week-title">Week</div><div class="week-card-row" id="adminWeekCardRow"></div></div>
  <div class="card bar"><button onclick="lockWeek()">锁定</button><button onclick="unlockWeek()">解锁</button><button onclick="exportCSV()">导出CSV</button><span class="autosave-badge"><span class="autosave-dot"></span><span class="autosaveText">已自动保存</span></span><select id="typeFilter" onchange="renderAdmin()"><option value="all">全部工时类别</option></select><input id="projectFilter" placeholder="项目筛选" oninput="renderAdmin()"><input id="unitFilter" placeholder="单元筛选" oninput="renderAdmin()"><button onclick="clearFilter()">清除筛选</button></div>
  <div class="card table-wrap"><table class="work-table" id="adminTable"></table></div>
</div>
</div>
<div class="modal-mask" id="addModal"><div class="modal-panel"><div class="modal-head"><div id="modalTitle">新增单条或多条工时</div><button class="modal-close" onclick="closeAddModal()">关闭</button></div><div class="modal-body"><div class="modal-summary" id="modalSummary">工时类别：- ｜ 项目：- ｜ 单元：0个 ｜ 备注：-</div><div class="section-title">1. 工时类别</div><div class="choice-grid" id="modalTypeBox"></div><div class="section-title">2. 项目号</div><div class="choice-grid" id="modalProjectBox"></div><div class="section-title">3. 单元号</div><div class="unit-tools"><button class="small-pill" onclick="selectAllUnits()">全选</button><button class="small-pill" onclick="clearUnits()">清空</button><span id="selectedCount">已选 0 个</span></div><div class="unit-columns"><div class="unit-panel"><div class="unit-panel-title">单元类</div><div class="unit-grid" id="unitNormalBox"></div></div><div class="unit-panel container"><div class="unit-panel-title">容器类</div><div class="unit-grid" id="unitContainerBox"></div></div></div><div class="section-title">4. 备注</div><div class="remark-line"><input id="customRemark" placeholder="可选备注，也可输入"><button class="apply-btn" onclick="applyCustomRemark()">应用</button></div><div class="choice-grid" id="modalRemarkBox" style="margin-top:8px"></div><div class="section-title">5. 可选：平均工时</div><div class="split-box"><div class="split-row"><label><input type="checkbox" id="splitEnabled"> 平分工时</label><select id="splitType"><option value="normal">正常</option><option value="weekdayOT">加班</option><option value="weekendOT">周末</option></select><select id="splitDay"><option value="mon">周一</option><option value="tue">周二</option><option value="wed">周三</option><option value="thu">周四</option><option value="fri">周五</option><option value="sat">周六</option><option value="sun">周日</option></select><input id="splitTotal" type="number" step="0.5" min="0" placeholder="≤8"></div><div class="muted">可选：选择类型、日期和总工时后自动平分。</div></div></div><div class="modal-foot"><button class="cancel-btn" onclick="closeAddModal()">取消</button><button class="generate-btn" id="generateBtn" onclick="generateRowsFromModal()">确定生成 0 条</button></div></div></div>
<script>
const STORAGE_PREFIX="workHours_V4_4_3";const LOCK_PREFIX="workHours_V4_4_3_locked";let records=[];let currentWeekOffset=0;
const workTypes=["机械组装","保温作业","电气安装","额外工时","其它作业","请假","仓库作业"];
const remarkMap={"仓库作业":["点料入库","发料退料","装箱发货","仓库帮忙"],"机械组装":["下料组装","焊接","压力测试","配件打磨","气管安装"],"保温作业":["管道补漆","保温下料","保温安装","保温发泡","保温清理"],"电气安装":["桥架安装","布线","端子接线"],"额外工时":["设计问题","特殊支架","供应商问题","FAT帮忙","内部问题"],"其它作业":["整理5S等","培训","早会","精益改善","其它","车间管理"],"请假":["年假","病假","事假","出差"]};
const projectUnits={"P0351706":["U503","U451","U381","U361","U344","U343","U335","U123-1","U115-1","U114-1","U112-3","U112-1","U110-1","U104","U103"],"P0384374":["U641D","U641C","U641B","U641A","U451","U387","U381","U373","U371","U368-3","U368-1","U368","U361","U343","U335","U201A","U126-1","U126","U120","NIN-52981"],"P0373305":["U641","U611-D","U611-C","U611-B","U611-A","U611","U503","U387","U381","U368-3","U368-1","U368","U361","U342","U335","U142","U123-1","U123","U121"],"P88359":["U451","U381","U371","U361","U341","U335","U201-2","NIN-53054"],"P0382530":["U501","U401","U381","U361","U344","U335","U201B","U201A","U125","U114-1","NIN-53076","NIN-53073","NIN-53072","NIN-53071","NIN-53070","NIN-53069","NIN-53068","NIN-53067","NIN-53066","NIN-53065","NIN-53064","NIN-53061","NIN-53060","NIN-53053"],"P0407596":["U641C-1","U641C","U641B-1","U641B","U641A-1","U641A","U503","U451","U387","U382","U381","U373","U371","U368-3","U368-1","U368","U361","U343","U335","U123-1","U123","NIN-53063","NIN-53062"],"销售订单":["NIN-53111","NIN-53086","NIN-53085","NIN-53084","NIN-53083","NIN-53082"]};
let modalState={type:"",project:"",units:[],remark:""};
function getISOWeek(d){const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dayNum=date.getUTCDay()||7;date.setUTCDate(date.getUTCDate()+4-dayNum);const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));return Math.ceil((((date-yearStart)/86400000)+1)/7)}function getWeekNo(offset=0){const d=new Date();d.setDate(d.getDate()+offset*7);return "W"+String(getISOWeek(d)).padStart(2,"0")}function storageKey(){return STORAGE_PREFIX+"_"+getWeekNo(currentWeekOffset)}function lockKey(){return LOCK_PREFIX+"_"+getWeekNo(currentWeekOffset)}function num(v){let n=parseFloat(v);return isNaN(n)?0:n}function defaultRecord(){return {employee:"测试",empNo:"000001",week:getWeekNo(currentWeekOffset),type:"机械组装",project:"",unit:"",remark:"",monN:0,monO:0,tueN:0,tueO:0,wedN:0,wedO:0,thuN:0,thuO:0,friN:0,friO:0,satO:0,sunO:0}}function loadData(){try{const raw=localStorage.getItem(storageKey());records=raw?JSON.parse(raw):[];if(!Array.isArray(records))records=[]}catch(e){records=[]}}function setAutoSaveStatus(text,cls=""){document.querySelectorAll(".autosave-badge").forEach(b=>b.classList.toggle("saving",cls==="saving"));document.querySelectorAll(".autosaveText").forEach(el=>el.innerText=text)}function saveData(){setAutoSaveStatus("保存中...","saving");localStorage.setItem(storageKey(),JSON.stringify(records));const now=new Date();const hh=String(now.getHours()).padStart(2,"0"),mm=String(now.getMinutes()).padStart(2,"0"),ss=String(now.getSeconds()).padStart(2,"0");setAutoSaveStatus(`已自动保存 ${hh}:${mm}:${ss}`)}function isLocked(){return localStorage.getItem(lockKey())==="1"}function normalTotal(r){return num(r.monN)+num(r.tueN)+num(r.wedN)+num(r.thuN)+num(r.friN)}function weekdayOT(r){return num(r.monO)+num(r.tueO)+num(r.wedO)+num(r.thuO)+num(r.friO)}function weekendOT(r){return num(r.satO)+num(r.sunO)}function toast(msg){alert(msg)}
function weekDisplayName(offset){const w=getWeekNo(offset);const locked=localStorage.getItem(LOCK_PREFIX+"_"+w)==="1";return w+(offset===0?"（本周）":"")+(locked?" 🔒":"")}function renderWeekCards(id){const box=document.getElementById(id);if(!box)return;box.innerHTML="";[-3,-2,-1,0].forEach(off=>{const w=getWeekNo(off),locked=localStorage.getItem(LOCK_PREFIX+"_"+w)==="1";const b=document.createElement("button");b.className="week-card"+(off===currentWeekOffset?" current":"")+(locked?" locked":"");b.innerText=weekDisplayName(off);b.onclick=()=>setWeekOffset(off);box.appendChild(b)})}function refreshWeekDisplay(){renderWeekCards("weekCardRow");renderWeekCards("adminWeekCardRow")}function setWeekOffset(offset){saveData();currentWeekOffset=offset;refreshWeekDisplay();loadData();renderEmp();if(document.getElementById("adminView").style.display!=="none")renderAdmin()}function lockWeek(){localStorage.setItem(lockKey(),"1");refreshWeekDisplay();toast("已锁定")}function unlockWeek(){localStorage.setItem(lockKey(),"0");refreshWeekDisplay();toast("已解锁")}
const DAY_FIELDS={monN:{day:"mon",type:"N",limit:8},monO:{day:"mon",type:"O",limit:4},tueN:{day:"tue",type:"N",limit:8},tueO:{day:"tue",type:"O",limit:4},wedN:{day:"wed",type:"N",limit:8},wedO:{day:"wed",type:"O",limit:4},thuN:{day:"thu",type:"N",limit:8},thuO:{day:"thu",type:"O",limit:4},friN:{day:"fri",type:"N",limit:8},friO:{day:"fri",type:"O",limit:4}};function sumField(field,list=records){return list.reduce((a,r)=>a+num(r[field]),0)}function normalClass(v){v=num(v);if(v===8)return"day-ok";if(v===0)return"day-zero";if(v>0&&v<8)return"day-warn";if(v>8)return"day-over";return"day-ok"}function otClass(v){v=num(v);if(v===0||v===4)return"day-ok";if(v>0&&v<4)return"day-warn";if(v>4)return"day-over";return"day-ok"}function totalNormalClass(v){v=num(v);if(v===40)return"day-ok";if(v===0)return"day-zero";if(v>0&&v<40)return"day-warn";if(v>40)return"day-over";return"day-ok"}function isFutureKey(k){const d=DAY_FIELDS[k];if(!d||currentWeekOffset!==0)return false;const order={mon:1,tue:2,wed:3,thu:4,fri:5};const today=new Date().getDay()||7;return order[d.day]&&order[d.day]>today}function cellClass(k){const d=DAY_FIELDS[k];if(!d)return"";const t=sumField(k);if(isFutureKey(k)&&t===0)return"day-ok";return d.type==="N"?normalClass(t):otClass(t)}function timeInputCell(i,k,v,admin=false){if(admin)return`<td class="${cellClass(k)}">${num(v)}</td>`;return`<td class="${cellClass(k)}"><div class="time-wrap"><input class="time-cell" type="number" inputmode="decimal" step="0.5" min="0" value="${num(v)}" onchange="updateCell(${i},'${k}',this.value)" onfocus="this.select()"></div></td>`}function updateCell(i,k,value){if(isLocked())return toast("本周已锁定，不能修改工时");let v=num(value);const d=DAY_FIELDS[k];if(d){const used=records.reduce((a,r,idx)=>idx===i?a:a+num(r[k]),0);const remain=Math.max(0,Math.round((d.limit-used)*100)/100);if(v>remain)v=remain}records[i][k]=v;saveData();renderEmp()}
function colgroup(extra=false){return `<colgroup>${extra?'<col style="width:58px"><col style="width:58px"><col style="width:48px">':''}<col class="c-type"><col class="c-project"><col class="c-unit"><col class="c-remark">${'<col class="c-time">'.repeat(12)}<col class="c-sum"><col class="c-sum"><col class="c-sum">${extra?'':'<col class="c-action"><col class="c-action">'}</colgroup>`}function tableHead(extra=false){return `${colgroup(extra)}<thead><tr>${extra?"<th rowspan='2'>员工</th><th rowspan='2'>工号</th><th rowspan='2'>周数</th>":""}<th rowspan="2">工时类别</th><th rowspan="2">项目号</th><th rowspan="2">单元号</th><th rowspan="2">备注</th><th colspan="2">周一</th><th colspan="2">周二</th><th colspan="2">周三</th><th colspan="2">周四</th><th colspan="2">周五</th><th rowspan="2">周六<br>加班</th><th rowspan="2">周日<br>加班</th><th colspan="3">汇总</th>${extra?"":"<th rowspan='2'>编辑</th><th rowspan='2'>删除</th>"}</tr><tr class="sub"><th>正常</th><th>加班</th><th>正常</th><th>加班</th><th>正常</th><th>加班</th><th>正常</th><th>加班</th><th>正常</th><th>加班</th><th>正常</th><th>工作日</th><th>周末</th></tr></thead>`}function rowCells(r,i,admin=false){const tn=normalTotal(r),tw=weekdayOT(r),te=weekendOT(r);return`${admin?`<td>${r.employee||""}</td><td>${r.empNo||""}</td><td>${r.week||""}</td>`:""}<td>${r.type||""}</td><td>${r.project||""}</td><td title="${r.unit||""}">${r.unit||""}</td><td>${r.remark||""}</td>${timeInputCell(i,"monN",r.monN,admin)}${timeInputCell(i,"monO",r.monO,admin)}${timeInputCell(i,"tueN",r.tueN,admin)}${timeInputCell(i,"tueO",r.tueO,admin)}${timeInputCell(i,"wedN",r.wedN,admin)}${timeInputCell(i,"wedO",r.wedO,admin)}${timeInputCell(i,"thuN",r.thuN,admin)}${timeInputCell(i,"thuO",r.thuO,admin)}${timeInputCell(i,"friN",r.friN,admin)}${timeInputCell(i,"friO",r.friO,admin)}${timeInputCell(i,"satO",r.satO,admin)}${timeInputCell(i,"sunO",r.sunO,admin)}<td class="${totalNormalClass(tn)}">${tn}</td><td>${tw}</td><td>${te}</td>${admin?"":`<td><button class="action-btn" onclick="editRow(${i})">编辑</button></td><td><button class="action-btn danger" onclick="delRow(${i})">删除</button></td>`}`}function renderEmp(){const t=document.getElementById("empTable");let body="<tbody>";if(records.length===0)body+=`<tr><td colspan="23" class="empty">暂无数据，请点击“新增一行”</td></tr>`;records.forEach((r,i)=>body+=`<tr>${rowCells(r,i,false)}</tr>`);body+="</tbody>";t.innerHTML=tableHead(false)+body+sumFoot(false)}function renderAdmin(){const type=document.getElementById("typeFilter")?.value||"all",project=(document.getElementById("projectFilter")?.value||"").trim().toLowerCase(),unit=(document.getElementById("unitFilter")?.value||"").trim().toLowerCase();const list=records.filter(r=>(type==="all"||r.type===type)&&(!project||String(r.project).toLowerCase().includes(project))&&(!unit||String(r.unit).toLowerCase().includes(unit)));let body="<tbody>";if(list.length===0)body+=`<tr><td colspan="26" class="empty">没有符合条件的数据</td></tr>`;list.forEach((r,i)=>body+=`<tr>${rowCells(r,i,true)}</tr>`);body+="</tbody>";document.getElementById("adminTable").innerHTML=tableHead(true)+body+sumFoot(true,list)}function sumFoot(admin=false,list=records){const s={monN:0,monO:0,tueN:0,tueO:0,wedN:0,wedO:0,thuN:0,thuO:0,friN:0,friO:0,satO:0,sunO:0,n:0,w:0,e:0};list.forEach(r=>{["monN","monO","tueN","tueO","wedN","wedO","thuN","thuO","friN","friO","satO","sunO"].forEach(k=>s[k]+=num(r[k]));s.n+=normalTotal(r);s.w+=weekdayOT(r);s.e+=weekendOT(r)});const clsN=k=>(isFutureKey(k)&&s[k]===0)?"day-ok":normalClass(s[k]);const clsO=k=>(isFutureKey(k)&&s[k]===0)?"day-ok":otClass(s[k]);return `<tfoot><tr>${admin?"<td></td><td></td><td></td>":""}<td></td><td></td><td></td><td>汇总</td><td class="${clsN('monN')}">${s.monN}</td><td class="${clsO('monO')}">${s.monO}</td><td class="${clsN('tueN')}">${s.tueN}</td><td class="${clsO('tueO')}">${s.tueO}</td><td class="${clsN('wedN')}">${s.wedN}</td><td class="${clsO('wedO')}">${s.wedO}</td><td class="${clsN('thuN')}">${s.thuN}</td><td class="${clsO('thuO')}">${s.thuO}</td><td class="${clsN('friN')}">${s.friN}</td><td class="${clsO('friO')}">${s.friO}</td><td>${s.satO}</td><td>${s.sunO}</td><td class="${totalNormalClass(s.n)}">${s.n}</td><td>${s.w}</td><td>${s.e}</td>${admin?"":"<td></td><td></td>"}</tr></tfoot>`}
function showEmp(){document.getElementById("empView").style.display="block";document.getElementById("adminView").style.display="none";renderEmp()}function showAdmin(){document.getElementById("empView").style.display="none";document.getElementById("adminView").style.display="block";renderAdmin()}function clearFilter(){document.getElementById("typeFilter").value="all";document.getElementById("projectFilter").value="";document.getElementById("unitFilter").value="";renderAdmin()}function delRow(i){if(isLocked())return toast("本周已锁定，不能删除");if(!confirm("确认删除这一行？"))return;records.splice(i,1);saveData();renderEmp()}function editRow(i){if(isLocked())return toast("本周已锁定，不能编辑");const r=records[i];modalState={type:r.type||workTypes[0],project:r.project||Object.keys(projectUnits)[0],units:r.unit?[r.unit]:[],remark:r.remark||"",editIndex:i};document.getElementById("customRemark").value=modalState.remark;document.getElementById("addModal").style.display="flex";renderModalAll()}function resetModal(){modalState={type:workTypes[0],project:Object.keys(projectUnits)[0],units:[],remark:remarkMap[workTypes[0]][0]};document.getElementById("customRemark").value=modalState.remark;document.getElementById("splitEnabled").checked=false;document.getElementById("splitTotal").value=""}function openAddModal(){if(isLocked())return toast("本周已锁定，不能新增");resetModal();document.getElementById("addModal").style.display="flex";renderModalAll()}function closeAddModal(){document.getElementById("addModal").style.display="none"}function renderModalAll(){renderModalTypes();renderModalProjects();renderModalUnits();renderModalRemarks();updateModalSummary()}function updateModalSummary(){document.getElementById("modalSummary").innerText=`工时类别：${modalState.type||"-"} ｜ 项目：${modalState.project||"-"} ｜ 单元：${modalState.units.length}个 ｜ 备注：${modalState.remark||"-"}`;document.getElementById("selectedCount").innerText=`已选 ${modalState.units.length} 个`;document.getElementById("generateBtn").innerText=modalState.editIndex!==undefined?"保存前置信息":`确定生成 ${modalState.units.length} 条`}function makeBtn(text,active,fn){const b=document.createElement("button");b.className="choice-btn"+(active?" active":"");b.innerText=text;b.onclick=fn;return b}function renderModalTypes(){const box=document.getElementById("modalTypeBox");box.innerHTML="";workTypes.forEach(t=>box.appendChild(makeBtn(t,modalState.type===t,()=>{modalState.type=t;modalState.remark=(remarkMap[t]||[])[0]||"";document.getElementById("customRemark").value=modalState.remark;renderModalTypes();renderModalRemarks();updateModalSummary()})))}function renderModalProjects(){const box=document.getElementById("modalProjectBox");box.innerHTML="";Object.keys(projectUnits).forEach(p=>box.appendChild(makeBtn(p,modalState.project===p,()=>{modalState.project=p;modalState.units=[];renderModalProjects();renderModalUnits();updateModalSummary()})))}function renderModalUnits(){const n=document.getElementById("unitNormalBox"),c=document.getElementById("unitContainerBox");n.innerHTML="";c.innerHTML="";const us=projectUnits[modalState.project]||[],normal=us.filter(u=>!String(u).startsWith("NIN-")),cont=us.filter(u=>String(u).startsWith("NIN-"));function add(box,u){box.appendChild(makeBtn(u,modalState.units.includes(u),()=>{modalState.units.includes(u)?modalState.units=modalState.units.filter(x=>x!==u):modalState.units.push(u);renderModalUnits();updateModalSummary()}))}normal.forEach(u=>add(n,u));cont.forEach(u=>add(c,u));if(!normal.length)n.innerHTML='<div class="empty">暂无</div>';if(!cont.length)c.innerHTML='<div class="empty">暂无</div>'}function renderModalRemarks(){const box=document.getElementById("modalRemarkBox");box.innerHTML="";(remarkMap[modalState.type]||[]).forEach(r=>box.appendChild(makeBtn(r,modalState.remark===r,()=>{modalState.remark=r;document.getElementById("customRemark").value=r;renderModalRemarks();updateModalSummary()})))}function applyCustomRemark(){modalState.remark=document.getElementById("customRemark").value.trim();renderModalRemarks();updateModalSummary()}function selectAllUnits(){modalState.units=[...(projectUnits[modalState.project]||[])];renderModalUnits();updateModalSummary()}function clearUnits(){modalState.units=[];renderModalUnits();updateModalSummary()}function applySplit(rows){if(!document.getElementById("splitEnabled").checked)return;const total=num(document.getElementById("splitTotal").value);if(total<=0||!rows.length)return;const each=Math.round(total/rows.length*100)/100,day=document.getElementById("splitDay").value,type=document.getElementById("splitType").value;const map={mon:{normal:"monN",weekdayOT:"monO"},tue:{normal:"tueN",weekdayOT:"tueO"},wed:{normal:"wedN",weekdayOT:"wedO"},thu:{normal:"thuN",weekdayOT:"thuO"},fri:{normal:"friN",weekdayOT:"friO"},sat:{weekendOT:"satO"},sun:{weekendOT:"sunO"}};const key=map[day]&&map[day][type];if(key)rows.forEach(r=>r[key]=each)}function generateRowsFromModal(){applyCustomRemark();if(!modalState.type)return toast("请选择工时类别");if(!modalState.project)return toast("请选择项目号");if(modalState.units.length===0)return toast("请选择至少一个单元");if(modalState.editIndex!==undefined){const i=modalState.editIndex;records[i].type=modalState.type;records[i].project=modalState.project;records[i].unit=modalState.units[0];records[i].remark=modalState.remark;saveData();renderEmp();closeAddModal();return}const rows=modalState.units.map(u=>({...defaultRecord(),employee:document.getElementById("empName").innerText,empNo:document.getElementById("empNo").innerText,week:getWeekNo(currentWeekOffset),type:modalState.type,project:modalState.project,unit:u,remark:modalState.remark}));applySplit(rows);records.push(...rows);saveData();renderEmp();closeAddModal()}function exportCSV(){const headers=["员工","工号","周数","工时类别","项目号","单元号","备注","周一正常","周一加班","周二正常","周二加班","周三正常","周三加班","周四正常","周四加班","周五正常","周五加班","周六加班","周日加班","正常汇总","工作日加班","周末加班"];const lines=[headers];records.forEach(r=>lines.push([r.employee,r.empNo,r.week,r.type,r.project,r.unit,r.remark,r.monN,r.monO,r.tueN,r.tueO,r.wedN,r.wedO,r.thuN,r.thuO,r.friN,r.friO,r.satO,r.sunO,normalTotal(r),weekdayOT(r),weekendOT(r)]));const csv="\ufeff"+lines.map(a=>a.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\n");const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="车间工时_V4.4.3.csv";a.click();URL.revokeObjectURL(a.href)}function initFilters(){const sel=document.getElementById("typeFilter");workTypes.forEach(t=>{const o=document.createElement("option");o.value=t;o.innerText=t;sel.appendChild(o)})}refreshWeekDisplay();loadData();initFilters();renderEmp();
</script>
