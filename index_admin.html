<!DOCTYPE html>
<!-- VERSION: VAdmin 1.0 - Workshop Timesheet Admin Dashboard - UTF8 -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>车间工时管理员后台 VAdmin 1.0</title>
<style>
:root{--brand:#1f4e79;--ok:#16a34a;--warn:#f59e0b;--bad:#dc2626;--line:#d7dde5;--bg:#eef2f6;--text:#1f2937;}
*{box-sizing:border-box}body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}.header{background:var(--brand);color:#fff;padding:14px 16px;font-size:20px;font-weight:800;display:flex;justify-content:space-between;align-items:center;gap:12px;position:sticky;top:0;z-index:10}.header small{font-size:12px;opacity:.9;font-weight:500}.wrap{max-width:1280px;margin:14px auto;padding:0 10px 24px}.card{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 4px 14px rgba(15,23,42,.08);padding:12px;margin-bottom:12px}.toolbar{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px;align-items:end}label{font-size:12px;font-weight:800;color:#475569;display:block;margin-bottom:5px}select,input{width:100%;height:38px;border:1px solid #cbd5e1;border-radius:10px;padding:0 10px;font-size:14px;background:#fff}button{height:38px;border:0;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;touch-action:manipulation}.btn-primary{background:#2563eb;color:#fff}.btn-green{background:#16a34a;color:#fff}.btn-gray{background:#e5e7eb;color:#111827}.btn-red{background:#fee2e2;color:#991b1b}.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}.kpi{border:1px solid #dbeafe;background:#f8fbff;border-radius:12px;padding:10px;text-align:center}.kpi .num{font-size:24px;font-weight:900;color:#1f4e79}.kpi .txt{font-size:12px;font-weight:800;color:#64748b;margin-top:2px}.table-scroll{overflow:auto;max-height:70vh;border:1px solid var(--line);border-radius:12px;background:#fff}table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;font-size:13px}th,td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px 8px;text-align:center;white-space:nowrap}th{position:sticky;top:0;background:#e6edf5;color:#1f2937;z-index:3;font-weight:900}td.left,th.left{text-align:left}.sticky1{position:sticky;left:0;z-index:4;background:#fff}th.sticky1{z-index:6;background:#e6edf5}.sticky2{position:sticky;left:86px;z-index:4;background:#fff}th.sticky2{z-index:6;background:#e6edf5}.status-ok{background:#dcfce7;color:#166534;font-weight:900;border-radius:999px;padding:3px 8px}.status-warn{background:#fef3c7;color:#92400e;font-weight:900;border-radius:999px;padding:3px 8px}.status-bad{background:#fee2e2;color:#991b1b;font-weight:900;border-radius:999px;padding:3px 8px}.day-bad{background:#fee2e2!important;color:#991b1b!important;font-weight:900}.day-warn{background:#fff7ed!important;color:#9a3412!important;font-weight:900}.muted{color:#94a3b8}.msg{padding:10px 12px;border-radius:10px;margin-top:8px;font-size:13px;font-weight:700;display:none}.msg.ok{display:block;background:#ecfdf5;color:#166534;border:1px solid #bbf7d0}.msg.err{display:block;background:#fef2f2;color:#991b1b;border:1px solid #fecaca}@media(max-width:760px){.toolbar{grid-template-columns:repeat(2,1fr)}.kpis{grid-template-columns:repeat(3,1fr)}.header{font-size:17px}th,td{padding:5px 6px;font-size:12px}.sticky2{left:76px}}
</style>
</head>
<body>
<div class="header"><div>车间工时管理员后台 <small>VAdmin 1.0</small></div><small>数据源：CloudBase timesheet_records</small></div>
<div class="wrap">
  <div class="card">
    <div class="toolbar">
      <div><label>Week</label><select id="weekSelect"></select></div>
      <div><label>员工</label><select id="empSelect"><option value="">全部员工</option></select></div>
      <div><label>项目</label><select id="projectSelect"><option value="">全部项目</option></select></div>
      <div><label>单元</label><select id="unitSelect"><option value="">全部单元</option></select></div>
      <div><label>状态</label><select id="statusSelect"><option value="">全部状态</option><option value="missing">未提交</option><option value="warn">异常/不足</option><option value="ok">正常</option></select></div>
      <div style="display:flex;gap:8px"><button class="btn-primary" onclick="loadData()">刷新</button><button class="btn-green" onclick="exportCsv()">导出CSV</button></div>
    </div>
    <div id="msg" class="msg"></div>
  </div>
  <div class="kpis" id="kpis"></div>
  <div class="card">
    <div class="table-scroll"><table id="summaryTable"></table></div>
  </div>
</div>
<script>
const CLOUD_BASE_FUNCTION_URL = "https://timesheet-d6g9cfu6c9d0e7fce-1448165566.ap-shanghai.app.tcloudbase.com/timesheetApi";
const ADMIN_ID = "1237794";
const employeeMap = {
  "991001": "林泽学",
  "991005": "邓茂胜",
  "991008": "曹珪",
  "991009": "侯自峰",
  "991012": "唐先发",
  "991013": "梁庄华",
  "1177215": "官辉",
  "1177235": "王家伟",
  "1177264": "李剑锋",
  "1177265": "李建军",
  "1177266": "李念亭",
  "1177310": "师海芳",
  "1177333": "黄维昆",
  "1177336": "席新永",
  "1177338": "叶峰",
  "1177339": "虞志胜",
  "1177342": "庄允吉",
  "1235746": "丁允志",
  "1236416": "张道仅",
  "1237794": "Manager",
  "1239728": "郭振宗",
  "1254596": "候海晴",
  "1259740": "汪保平",
  "1262912": "向波"
};
const weekDays = ["一","二","三","四","五","六","日"];
let allRows = [];
let summaryRows = [];
function $(id){return document.getElementById(id)}
function msg(text, ok=true){const el=$('msg'); el.className='msg '+(ok?'ok':'err'); el.textContent=text;}
function num(v){const n=Number(v); return Number.isFinite(n)?n:0}
function safe(v){return String(v??'').replace(/[<>&"]/g,ch=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[ch]))}
function getCurrentWeek(){const d=new Date();const tmp=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=tmp.getUTCDay()||7;tmp.setUTCDate(tmp.getUTCDate()+4-day);const yearStart=new Date(Date.UTC(tmp.getUTCFullYear(),0,1));const week=Math.ceil((((tmp-yearStart)/86400000)+1)/7);return 'W'+week}
async function callCloudBase(action,payload={}){
  const res=await fetch(CLOUD_BASE_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json;charset=utf-8'},body:JSON.stringify(Object.assign({action},payload))});
  let data={}; try{data=await res.json()}catch(e){}
  if(data && typeof data.body==='string'){try{data=JSON.parse(data.body)}catch(e){}}
  if(data && data.data!==undefined) data=data.data;
  if(data && data.result!==undefined) data=data.result;
  if(!res.ok) throw new Error('CloudBase请求失败：'+res.status);
  return data;
}
async function fetchRows(){
  const data=await callCloudBase('list',{params:{}});
  if(Array.isArray(data)) return data;
  if(data && Array.isArray(data.results)) return data.results;
  if(data && Array.isArray(data.rows)) return data.rows;
  return [];
}
function initFilters(rows){
  const weeks=Array.from(new Set(rows.map(r=>r.week).filter(Boolean))).sort((a,b)=>Number(String(a).replace(/\D/g,''))-Number(String(b).replace(/\D/g,'')));
  if(!weeks.includes(getCurrentWeek())) weeks.push(getCurrentWeek());
  $('weekSelect').innerHTML=weeks.map(w=>'<option value="'+safe(w)+'">'+safe(w)+(w===getCurrentWeek()?'（本周）':'')+'</option>').join('');
  $('weekSelect').value=weeks[weeks.length-1]||getCurrentWeek();
  const empOpts=Object.keys(employeeMap).filter(id=>id!==ADMIN_ID).map(id=>'<option value="'+id+'">'+safe(employeeMap[id])+' / '+id+'</option>').join('');
  $('empSelect').innerHTML='<option value="">全部员工</option>'+empOpts;
  refreshProjectUnitFilters(rows);
}
function refreshProjectUnitFilters(rows){
  const projects=Array.from(new Set(rows.map(r=>r.project).filter(Boolean))).sort();
  const units=Array.from(new Set(rows.map(r=>r.unit).filter(Boolean))).sort((a,b)=>String(a).localeCompare(String(b),undefined,{numeric:true}));
  $('projectSelect').innerHTML='<option value="">全部项目</option>'+projects.map(v=>'<option>'+safe(v)+'</option>').join('');
  $('unitSelect').innerHTML='<option value="">全部单元</option>'+units.map(v=>'<option>'+safe(v)+'</option>').join('');
}
function calcSummary(rows){
  const week=$('weekSelect').value;
  const filtered=rows.filter(r=>String(r.week||'')===String(week));
  const map={};
  Object.keys(employeeMap).forEach(id=>{if(id!==ADMIN_ID) map[id]={employeeId:id,employeeName:employeeMap[id],days:{},regular:0,otWeekday:0,otWeekend:0,records:0,projects:new Set(),units:new Set()};});
  Object.values(map).forEach(x=>weekDays.forEach(d=>x.days[d]={regular:0,otWeekday:0,otWeekend:0,has:false}));
  filtered.forEach(r=>{
    const id=String(r.employeeId||''); if(!map[id]) map[id]={employeeId:id,employeeName:r.employeeName||id,days:{},regular:0,otWeekday:0,otWeekend:0,records:0,projects:new Set(),units:new Set()};
    weekDays.forEach(d=>{if(!map[id].days[d]) map[id].days[d]={regular:0,otWeekday:0,otWeekend:0,has:false}});
    const d=String(r.weekday||''); if(map[id].days[d]){map[id].days[d].regular+=num(r.regularHours);map[id].days[d].otWeekday+=num(r.otWeekday);map[id].days[d].otWeekend+=num(r.otWeekend);map[id].days[d].has=true;}
    map[id].regular+=num(r.regularHours); map[id].otWeekday+=num(r.otWeekday); map[id].otWeekend+=num(r.otWeekend); map[id].records++;
    if(r.project) map[id].projects.add(String(r.project)); if(r.unit) map[id].units.add(String(r.unit));
  });
  return Object.values(map).map(x=>{
    const total=x.regular+x.otWeekday+x.otWeekend; const missing=x.records===0; const warn=!missing && (x.regular<40 || weekDays.slice(0,5).some(d=>x.days[d].has && x.days[d].regular!==8));
    return Object.assign(x,{total,missing,warn,status:missing?'missing':(warn?'warn':'ok')});
  }).sort((a,b)=>a.status.localeCompare(b.status)||String(a.employeeName).localeCompare(String(b.employeeName),'zh-Hans-CN'));
}
function applyFilters(){
  const emp=$('empSelect').value, project=$('projectSelect').value, unit=$('unitSelect').value, status=$('statusSelect').value;
  summaryRows=calcSummary(allRows).filter(r=>{
    if(emp && r.employeeId!==emp) return false;
    if(status && r.status!==status) return false;
    if(project && !r.projects.has(project)) return false;
    if(unit && !r.units.has(unit)) return false;
    return true;
  });
  renderKpis(summaryRows); renderTable(summaryRows);
}
function renderKpis(rows){
  const total=rows.length, missing=rows.filter(r=>r.missing).length, warn=rows.filter(r=>r.warn).length, ok=rows.filter(r=>r.status==='ok').length;
  const reg=rows.reduce((s,r)=>s+r.regular,0), ot=rows.reduce((s,r)=>s+r.otWeekday+r.otWeekend,0);
  $('kpis').innerHTML=`<div class="kpi"><div class="num">${total}</div><div class="txt">员工数</div></div><div class="kpi"><div class="num">${ok}</div><div class="txt">正常</div></div><div class="kpi"><div class="num">${warn}</div><div class="txt">异常/不足</div></div><div class="kpi"><div class="num">${missing}</div><div class="txt">未提交</div></div><div class="kpi"><div class="num">${reg}</div><div class="txt">正常工时</div></div><div class="kpi"><div class="num">${ot}</div><div class="txt">加班工时</div></div>`;
}
function dayCell(dayObj, weekend=false){
  const val=weekend?dayObj.otWeekend:(dayObj.regular+'/'+dayObj.otWeekday);
  const cls=(!weekend && dayObj.has && dayObj.regular!==8)?'day-warn':'';
  return '<td class="'+cls+'">'+safe(val)+'</td>';
}
function renderTable(rows){
  const head='<thead><tr><th class="sticky1 left">员工</th><th class="sticky2">工号</th><th>状态</th>'+weekDays.map(d=>'<th>周'+d+'</th>').join('')+'<th>正常</th><th>晚加</th><th>周末</th><th>总计</th><th class="left">项目/单元</th></tr></thead>';
  const body=rows.map(r=>{
    const st=r.status==='ok'?'<span class="status-ok">正常</span>':(r.missing?'<span class="status-bad">未提交</span>':'<span class="status-warn">异常/不足</span>');
    return '<tr><td class="sticky1 left">'+safe(r.employeeName)+'</td><td class="sticky2">'+safe(r.employeeId)+'</td><td>'+st+'</td>'+weekDays.map(d=>dayCell(r.days[d],d==='六'||d==='日')).join('')+'<td>'+r.regular+'</td><td>'+r.otWeekday+'</td><td>'+r.otWeekend+'</td><td><b>'+r.total+'</b></td><td class="left">'+safe(Array.from(r.projects).join(', '))+' / '+safe(Array.from(r.units).join(', '))+'</td></tr>';
  }).join('');
  $('summaryTable').innerHTML=head+'<tbody>'+body+'</tbody>';
}
async function loadData(){
  try{msg('正在读取 CloudBase 数据...',true); allRows=await fetchRows(); initFilters(allRows); applyFilters(); msg('读取成功，共 '+allRows.length+' 条原始记录。',true);}
  catch(e){msg('读取失败：'+e.message,false)}
}
function exportCsv(){
  const rows=summaryRows||[]; const headers=['员工','工号','状态','周一','周二','周三','周四','周五','周六','周日','正常工时','晚加','周末加班','总计','项目','单元'];
  const lines=[headers.join(',')].concat(rows.map(r=>[r.employeeName,r.employeeId,r.status,...weekDays.map(d=>d==='六'||d==='日'?r.days[d].otWeekend:(r.days[d].regular+'/'+r.days[d].otWeekday)),r.regular,r.otWeekday,r.otWeekend,r.total,Array.from(r.projects).join('|'),Array.from(r.units).join('|')].map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')));
  const blob=new Blob(['﻿'+lines.join('
')],{type:'text/csv;charset=utf-8;'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='timesheet_admin_'+$('weekSelect').value+'.csv'; a.click(); URL.revokeObjectURL(a.href);
}
['weekSelect','empSelect','projectSelect','unitSelect','statusSelect'].forEach(id=>document.addEventListener('change',e=>{if(e.target&&e.target.id===id)applyFilters();}));
loadData();
</script>
</body>
</html>
